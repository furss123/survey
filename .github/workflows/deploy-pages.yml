# index 브랜치 push 시 GitHub Pages 자동 배포 + main 동기화
name: Deploy GitHub Pages

on:
  push:
    branches: [index]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout index
        uses: actions/checkout@v4
        with:
          ref: index

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Sync main branch to index (branch deploy 호환)
        uses: actions/checkout@v4
        with:
          ref: index
          fetch-depth: 1
      - name: Force-push main from index
        run: |
          git push origin HEAD:refs/heads/main --force
