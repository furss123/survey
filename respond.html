<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>설문 참여 · 남악고</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-text: #0f172a;
      --theme-text-muted: #475569;
      --theme-border: #c5d0de;
      --theme-heading: #1e3a5f;
      --theme-btn-top: #4a7ab0;
      --theme-btn-bottom: #1e3a5f;
      --radius-md: 12px;
      --content-max: 640px;
    }
    html[data-theme="dark"] {
      --theme-bg-page: #0c1220;
      --theme-bg-panel: #1a2435;
      --theme-text: #f1f5f9;
      --theme-text-muted: #cbd5e1;
      --theme-border: #5a6d85;
      --theme-heading: #e8f0fc;
      --theme-btn-top: #5b8fc9;
      --theme-btn-bottom: #2d5580;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--theme-bg-page);
      color: var(--theme-text);
      line-height: 1.55;
    }
    .wrap {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-md);
      padding: 22px 20px;
      box-shadow: 0 8px 24px rgba(15, 36, 64, 0.08);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      color: var(--theme-heading);
    }
    .sub {
      margin: 0 0 20px;
      font-size: 0.9rem;
      color: var(--theme-text-muted);
    }
    .step-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--theme-text-muted);
      margin: 0 0 10px;
    }
    .class-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .class-btn {
      padding: 12px 8px;
      border: 2px solid var(--theme-border);
      border-radius: 10px;
      background: transparent;
      color: var(--theme-text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .class-btn.active {
      border-color: var(--theme-btn-bottom);
      background: linear-gradient(180deg, var(--theme-btn-top), var(--theme-btn-bottom));
      color: #fff;
    }
    label.field {
      display: block;
      margin: 12px 0 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
    }
    textarea { min-height: 100px; resize: vertical; }
    .q-block {
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--theme-border);
    }
    .q-block:last-child { border-bottom: none; }
    .q-title {
      margin: 0 0 8px;
      font-weight: 700;
      color: var(--theme-heading);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--theme-btn-top), var(--theme-btn-bottom));
      color: #fff;
    }
    .error {
      color: #b91c1c;
      font-size: 0.875rem;
      margin-top: 10px;
    }
    .success {
      text-align: center;
      padding: 24px 12px;
    }
    .success h2 { color: var(--theme-heading); margin: 0 0 8px; }
    [hidden] { display: none !important; }
    @media (max-width: 480px) {
      .class-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="mainCard">
      <h1 id="surveyTitle">설문 불러오는 중…</h1>
      <p class="sub" id="surveyDesc">명렬표에서 반·번호를 선택한 뒤 설문을 작성합니다.</p>
      <p class="error" id="errorBox" hidden></p>

      <div id="stepIdentify">
        <p class="step-label">1단계 · 반 선택</p>
        <div class="class-grid" id="classGrid" role="group" aria-label="반 선택"></div>
        <p class="step-label" style="margin-top:14px">2단계 · 번호 · 이름 선택</p>
        <label class="field" for="studentPick">본인 선택</label>
        <select id="studentPick" disabled>
          <option value="">먼저 반을 선택하세요</option>
        </select>
        <div class="actions">
          <button type="button" class="btn btn-primary" id="btnToForm">설문 작성하기</button>
        </div>
      </div>

      <div id="stepForm" hidden>
        <p class="step-label">3단계 · 설문 작성</p>
        <div id="questionFields"></div>
        <div class="actions">
          <button type="button" class="btn" id="btnBack">이전</button>
          <button type="button" class="btn btn-primary" id="btnSubmit">제출하기</button>
        </div>
      </div>

      <div id="stepDone" class="success" hidden>
        <h2>제출 완료</h2>
        <p>응답이 저장되었습니다. 감사합니다.</p>
        <p><a href="index.html">조회 화면으로</a></p>
      </div>
    </div>
  </div>

  <script src="scripts/survey-form-shared.js"></script>
  <script>
(function () {
  "use strict";

  var params = new URLSearchParams(location.search);
  var surveyId = params.get("s") || params.get("survey") || params.get("id");
  var entry = null;
  var roster = [];
  var selectedBan = null;

  var elTitle = document.getElementById("surveyTitle");
  var elError = document.getElementById("errorBox");
  var elClassGrid = document.getElementById("classGrid");
  var elStudentPick = document.getElementById("studentPick");
  var selectedNum = null;
  var selectedName = "";
  var elQuestions = document.getElementById("questionFields");

  function showError(msg) {
    elError.textContent = msg;
    elError.hidden = !msg;
  }

  function renderClassGrid() {
    var classes = SurveyForm.deriveClassOptions(roster);
    if (!classes.length) {
      elClassGrid.innerHTML = "";
      showError(
        roster.length
          ? "명렬표에 반 정보가 없습니다. 관리자에게 「명렬표 입력」 시트 형식을 확인해 달라고 요청하세요."
          : "명렬표가 비어 있습니다. 관리자에게 「명렬표 입력」을 먼저 해 달라고 요청하세요."
      );
      return;
    }
    showError("");
    elClassGrid.innerHTML = classes
      .map(function (c) {
        return (
          '<button type="button" class="class-btn" data-ban="' +
          c.반 +
          '">' +
          SurveyForm.esc(c.label) +
          "</button>"
        );
      })
      .join("");
    elClassGrid.querySelectorAll(".class-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        selectedBan = parseInt(btn.getAttribute("data-ban"), 10);
        elClassGrid.querySelectorAll(".class-btn").forEach(function (b) {
          b.classList.toggle("active", b === btn);
        });
        fillStudentDropdown();
      });
    });
  }

  function fillStudentDropdown() {
    if (!elStudentPick) return;
    elStudentPick.innerHTML = "";
    selectedNum = null;
    selectedName = "";
    if (selectedBan == null) {
      elStudentPick.disabled = true;
      elStudentPick.appendChild(new Option("먼저 반을 선택하세요", ""));
      return;
    }
    var students = SurveyForm.studentsInClass(roster, selectedBan);
    if (!students.length) {
      elStudentPick.disabled = true;
      elStudentPick.appendChild(new Option("이 반에 등록된 학생이 없습니다", ""));
      return;
    }
    elStudentPick.disabled = false;
    elStudentPick.appendChild(new Option("번호 · 이름을 선택하세요", ""));
    students.forEach(function (s) {
      var label = (s.번호 != null ? s.번호 + "번" : "") + (s.이름 ? " " + s.이름 : "");
      var opt = new Option(label.trim() || String(s.번호), String(s.번호));
      opt.dataset.name = s.이름 || "";
      elStudentPick.appendChild(opt);
    });
  }

  function onStudentPickChange() {
    var val = elStudentPick.value;
    if (!val) {
      selectedNum = null;
      selectedName = "";
      return;
    }
    selectedNum = Number(val);
    var opt = elStudentPick.options[elStudentPick.selectedIndex];
    selectedName = (opt && opt.dataset.name) || "";
    var found = SurveyForm.lookupStudent(roster, selectedBan, selectedNum);
    if (found && found.이름) selectedName = found.이름;
  }

  function renderQuestions() {
    var qs = entry.questions || [];
    elQuestions.innerHTML = qs
      .map(function (q, idx) {
        var id = "q_" + q.id;
        var req = q.required !== false ? " *" : "";
        var inner = "";
        if (q.type === "textarea" || !q.type) {
          inner =
            '<textarea id="' +
            id +
            '" name="' +
            SurveyForm.esc(q.id) +
            '" rows="4"></textarea>';
        } else {
          inner =
            '<input type="text" id="' +
            id +
            '" name="' +
            SurveyForm.esc(q.id) +
            '" />';
        }
        return (
          '<div class="q-block"><p class="q-title">' +
          SurveyForm.esc(q.label || "문항 " + (idx + 1)) +
          req +
          "</p>" +
          inner +
          "</div>"
        );
      })
      .join("");
  }

  function collectAnswers() {
    var answers = {};
    (entry.questions || []).forEach(function (q) {
      var el = document.querySelector('[name="' + q.id + '"]');
      answers[q.id] = el ? String(el.value || "").trim() : "";
    });
    return answers;
  }

  function validateAnswers() {
    var missing = (entry.questions || []).filter(function (q) {
      if (q.required === false) return false;
      var el = document.querySelector('[name="' + q.id + '"]');
      return !el || !String(el.value || "").trim();
    });
    if (missing.length) {
      showError("필수 문항을 모두 작성해 주세요: " + missing.map(function (q) { return q.label; }).join(", "));
      return false;
    }
    showError("");
    return true;
  }

  document.getElementById("btnToForm").addEventListener("click", function () {
    onStudentPickChange();
    var num = selectedNum;
    if (selectedBan == null) {
      showError("반을 선택해 주세요.");
      return;
    }
    if (!Number.isFinite(num) || num < 1) {
      showError("번호·이름을 선택해 주세요.");
      return;
    }
    showError("");
    document.getElementById("stepIdentify").hidden = true;
    document.getElementById("stepForm").hidden = false;
    renderQuestions();
  });

  document.getElementById("btnBack").addEventListener("click", function () {
    document.getElementById("stepForm").hidden = true;
    document.getElementById("stepIdentify").hidden = false;
  });

  if (elStudentPick) elStudentPick.addEventListener("change", onStudentPickChange);

  document.getElementById("btnSubmit").addEventListener("click", async function () {
    if (!validateAnswers()) return;
    onStudentPickChange();
    var num = selectedNum;
    var 학번 = SurveyForm.formatStudentId(entry.grade || 1, selectedBan, num);
    var payload = {
      학번: 학번,
      반: selectedBan + "반",
      번호: num,
      이름: selectedName || "",
      answers: collectAnswers(),
      submittedAt: new Date().toISOString(),
    };
    try {
      await SurveyForm.submitSurveyResponse(entry, payload);
      document.getElementById("stepForm").hidden = true;
      document.getElementById("stepDone").hidden = false;
      showError("");
    } catch (err) {
      showError(err.message || "제출에 실패했습니다.");
    }
  });

  async function init() {
    if (!surveyId) {
      showError("설문 ID가 없습니다. index.html에서 설문 링크를 열어 주세요.");
      elTitle.textContent = "설문 참여";
      return;
    }
    entry = SurveyForm.findSurvey(surveyId);
    if (!entry || entry.type !== "form") {
      showError("등록된 설문을 찾을 수 없습니다. 관리자에게 문의하세요.");
      elTitle.textContent = "설문 없음";
      return;
    }
    if (SurveyForm.isSurveyCompleted(entry)) {
      showError("이 설문은 종료되었습니다. 새 응답은 받지 않습니다.");
      elTitle.textContent = entry.label || "설문 종료";
      document.getElementById("stepIdentify").hidden = true;
      return;
    }
    try {
      var cfg = await SurveyForm.fetchSurveyConfig(entry);
      if (cfg) entry = Object.assign({}, entry, cfg);
      roster = await SurveyForm.fetchRosterRows();
    } catch (err) {
      showError(err.message || "초기화 실패");
      elTitle.textContent = "오류";
      return;
    }
    elTitle.textContent = entry.label || "설문";
    renderClassGrid();
  }

  init();
})();
  </script>
</body>
</html>
