<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>설문 참여 · 남악고</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-text: #0f172a;
      --theme-text-muted: #475569;
      --theme-border: #c5d0de;
      --theme-heading: #1e3a5f;
      --theme-btn-top: #4a7ab0;
      --theme-btn-bottom: #1e3a5f;
      --radius-md: 12px;
      --content-max: 640px;
    }
    html[data-theme="dark"] {
      --theme-bg-page: #0c1220;
      --theme-bg-panel: #1a2435;
      --theme-text: #f1f5f9;
      --theme-text-muted: #cbd5e1;
      --theme-border: #5a6d85;
      --theme-heading: #e8f0fc;
      --theme-btn-top: #5b8fc9;
      --theme-btn-bottom: #2d5580;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--theme-bg-page);
      color: var(--theme-text);
      line-height: 1.55;
    }
    .wrap {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-md);
      padding: 22px 20px;
      box-shadow: 0 8px 24px rgba(15, 36, 64, 0.08);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      color: var(--theme-heading);
    }
    .sub {
      margin: 0 0 20px;
      font-size: 0.9rem;
      color: var(--theme-text-muted);
    }
    .step-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--theme-text-muted);
      margin: 0 0 10px;
    }
    .class-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .class-btn {
      padding: 12px 8px;
      border: 2px solid var(--theme-border);
      border-radius: 10px;
      background: transparent;
      color: var(--theme-text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .class-btn.active {
      border-color: var(--theme-btn-bottom);
      background: linear-gradient(180deg, var(--theme-btn-top), var(--theme-btn-bottom));
      color: #fff;
    }
    label.field {
      display: block;
      margin: 12px 0 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
    }
    textarea { min-height: 100px; resize: vertical; }
    .q-block {
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--theme-border);
    }
    .q-block:last-child { border-bottom: none; }
    .q-title {
      margin: 0 0 8px;
      font-weight: 700;
      color: var(--theme-heading);
    }
    .q-required-mark { color: #b91c1c; }
    .progress {
      margin: 0 0 14px;
      font-size: 0.85rem;
      color: var(--theme-text-muted);
      font-weight: 600;
    }
    .progress-bar {
      height: 6px;
      background: rgba(74, 122, 176, 0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--theme-btn-top), var(--theme-btn-bottom));
      border-radius: 999px;
      transition: width 0.2s ease;
    }
    .choice-list { display: grid; gap: 8px; margin-top: 8px; }
    .choice-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      cursor: pointer;
    }
    .choice-item input { width: auto; margin: 0; }
    .likert-wrap { margin-top: 10px; }
    .likert-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--theme-text-muted);
      margin-bottom: 8px;
    }
    .likert-scale {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }
    .likert-option {
      flex: 1;
      min-width: 44px;
      text-align: center;
    }
    .likert-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 6px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .likert-option input { width: auto; margin: 0; }
    .rank-list { display: grid; gap: 8px; margin-top: 8px; }
    .rank-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: rgba(74, 122, 176, 0.04);
    }
    .rank-badge {
      min-width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      background: var(--theme-btn-bottom);
      color: #fff;
    }
    .rank-label { flex: 1; font-weight: 600; }
    .rank-actions { display: flex; gap: 4px; }
    .rank-actions button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    .rank-hint {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--theme-text-muted);
    }
    .q-desc {
      margin: 0 0 10px;
      font-size: 0.88rem;
      color: var(--theme-text-muted);
    }
    .section-block {
      padding: 8px 0 4px;
    }
    .section-title {
      margin: 0 0 8px;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--theme-heading);
    }
    .section-desc {
      margin: 0;
      font-size: 0.92rem;
      color: var(--theme-text-muted);
      line-height: 1.6;
    }
    .other-input {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
    }
    .rating-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .rating-star {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      padding: 6px 8px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      min-width: 44px;
    }
    .rating-star input { position: absolute; opacity: 0; width: 0; height: 0; }
    .rating-star span[aria-hidden="true"] {
      font-size: 1.35rem;
      color: #cbd5e1;
      line-height: 1;
    }
    .rating-star:has(input:checked) span[aria-hidden="true"],
    .rating-star input:checked + span[aria-hidden="true"] {
      color: #eab308;
    }
    .rating-num { font-size: 0.72rem; color: var(--theme-text-muted); font-weight: 700; }
    .grid-wrap { margin-top: 8px; }
    .grid-scroll { overflow-x: auto; }
    .grid-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .grid-table th,
    .grid-table td {
      border: 1px solid var(--theme-border);
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }
    .grid-table thead th {
      background: rgba(74, 122, 176, 0.08);
      font-weight: 700;
      color: var(--theme-heading);
    }
    .grid-table tbody th {
      text-align: left;
      min-width: 120px;
      font-weight: 600;
    }
    .grid-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .grid-cell input { width: auto; margin: 0; }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--theme-btn-top), var(--theme-btn-bottom));
      color: #fff;
    }
    .error {
      color: #b91c1c;
      font-size: 0.875rem;
      margin-top: 10px;
    }
    .success {
      text-align: center;
      padding: 24px 12px;
    }
    .success h2 { color: var(--theme-heading); margin: 0 0 8px; }
    [hidden] { display: none !important; }
    @media (max-width: 480px) {
      .class-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="mainCard">
      <h1 id="surveyTitle">설문 불러오는 중…</h1>
      <p class="sub" id="surveyDesc">명렬표에서 반·번호를 선택한 뒤 설문을 작성합니다.</p>
      <p class="error" id="errorBox" hidden></p>

      <div id="stepIdentify">
        <p class="step-label">1단계 · 반과 번호 선택</p>
        <div class="class-grid" id="classGrid" role="group" aria-label="반 선택"></div>
        <label class="field" for="studentNum">번호</label>
        <input type="number" id="studentNum" min="1" max="45" placeholder="예: 12" />
        <label class="field" for="studentName">이름 (명렬표에서 자동 표시)</label>
        <input type="text" id="studentName" readonly placeholder="반·번호를 선택하세요" />
        <div class="actions">
          <button type="button" class="btn btn-primary" id="btnToForm">설문 작성하기</button>
        </div>
      </div>

      <div id="stepForm" hidden>
        <p class="step-label">2단계 · 설문 작성</p>
        <div class="progress" id="questionProgress">
          <span id="progressText">1 / 1</span>
          <div class="progress-bar"><span id="progressFill" style="width:0%"></span></div>
        </div>
        <div id="questionFields"></div>
        <div class="actions">
          <button type="button" class="btn" id="btnBack">이전</button>
          <button type="button" class="btn btn-primary" id="btnNext">다음</button>
        </div>
      </div>

      <div id="stepDone" class="success" hidden>
        <h2>제출 완료</h2>
        <p>응답이 저장되었습니다. 감사합니다.</p>
        <p><a href="index.html">조회 화면으로</a></p>
      </div>
    </div>
  </div>

  <script src="scripts/survey-form-shared.js"></script>
  <script>
(function () {
  "use strict";

  var params = new URLSearchParams(location.search);
  var surveyId = params.get("s") || params.get("survey") || params.get("id");
  var entry = null;
  var roster = [];
  var selectedBan = null;
  var currentQuestionIndex = 0;
  var answerStore = {};

  var elTitle = document.getElementById("surveyTitle");
  var elError = document.getElementById("errorBox");
  var elClassGrid = document.getElementById("classGrid");
  var elNum = document.getElementById("studentNum");
  var elName = document.getElementById("studentName");
  var elQuestions = document.getElementById("questionFields");
  var elProgressText = document.getElementById("progressText");
  var elProgressFill = document.getElementById("progressFill");
  var btnNext = document.getElementById("btnNext");

  function showError(msg) {
    elError.textContent = msg;
    elError.hidden = !msg;
  }

  function renderClassGrid() {
    var classes = SurveyForm.deriveClassOptions(roster);
    if (!classes.length) {
      for (var i = 1; i <= 8; i++) classes.push({ 반: i, label: i + "반" });
    }
    elClassGrid.innerHTML = classes
      .map(function (c) {
        return (
          '<button type="button" class="class-btn" data-ban="' +
          c.반 +
          '">' +
          SurveyForm.esc(c.label) +
          "</button>"
        );
      })
      .join("");
    elClassGrid.querySelectorAll(".class-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        selectedBan = parseInt(btn.getAttribute("data-ban"), 10);
        elClassGrid.querySelectorAll(".class-btn").forEach(function (b) {
          b.classList.toggle("active", b === btn);
        });
        syncNameFromRoster();
      });
    });
  }

  function syncNameFromRoster() {
    var num = Number(elNum.value);
    if (!selectedBan || !Number.isFinite(num)) {
      elName.value = "";
      return;
    }
    var found = SurveyForm.lookupStudent(roster, selectedBan, num);
    elName.value = found ? found.이름 : "";
  }

  function getQuestions() {
    return entry && entry.questions ? entry.questions : [];
  }

  function saveCurrentAnswer() {
    var qs = getQuestions();
    var q = qs[currentQuestionIndex];
    if (!q) return;
    answerStore[q.id] = SurveyForm.collectAnswerFromElement(q, elQuestions);
  }

  function bindRankControls(q) {
    elQuestions.querySelectorAll("[data-rank-item]").forEach(function (item) {
      var up = item.querySelector("[data-rank-up]");
      var down = item.querySelector("[data-rank-down]");
      if (up) {
        up.addEventListener("click", function () {
          var prev = item.previousElementSibling;
          if (!prev) return;
          item.parentNode.insertBefore(item, prev);
          refreshRankOrders(q.id);
        });
      }
      if (down) {
        down.addEventListener("click", function () {
          var next = item.nextElementSibling;
          if (!next) return;
          item.parentNode.insertBefore(next, item);
          refreshRankOrders(q.id);
        });
      }
    });
  }

  function refreshRankOrders(qid) {
    elQuestions.querySelectorAll('[data-rank-item="' + qid + '"]').forEach(function (item, idx) {
      item.setAttribute("data-order", String(idx));
      var badge = item.querySelector(".rank-badge");
      if (badge) badge.textContent = String(idx + 1);
    });
  }

  function renderQuestionField(q) {
    return SurveyForm.renderQuestionFieldHtml(q, answerStore[q.id] || "");
  }

  function renderCurrentQuestion() {
    var qs = getQuestions();
    if (!qs.length) {
      elQuestions.innerHTML = '<p class="error">표시할 문항이 없습니다.</p>';
      return;
    }
    if (currentQuestionIndex < 0) currentQuestionIndex = 0;
    if (currentQuestionIndex >= qs.length) currentQuestionIndex = qs.length - 1;

    var q = qs[currentQuestionIndex];
    var isSection = SurveyForm.isSectionQuestion(q);
    var req = !isSection && q.required !== false ? ' <span class="q-required-mark">*</span>' : "";
    elQuestions.innerHTML =
      '<div class="q-block' +
      (isSection ? " is-section-step" : "") +
      '">' +
      (isSection
        ? renderQuestionField(q)
        : '<p class="q-title">' +
          SurveyForm.esc(q.label || "문항 " + (currentQuestionIndex + 1)) +
          req +
          "</p>" +
          renderQuestionField(q)) +
      "</div>";

    if (q.type === "rank") bindRankControls(q);
    SurveyForm.bindQuestionFieldControls(q, elQuestions);

    var pct = Math.round(((currentQuestionIndex + 1) / qs.length) * 100);
    elProgressText.textContent = currentQuestionIndex + 1 + " / " + qs.length;
    elProgressFill.style.width = pct + "%";
    if (isSection) {
      btnNext.textContent = currentQuestionIndex >= qs.length - 1 ? "제출하기" : "계속";
    } else {
      btnNext.textContent = currentQuestionIndex >= qs.length - 1 ? "제출하기" : "다음";
    }
  }

  function validateCurrentQuestion() {
    var qs = getQuestions();
    var q = qs[currentQuestionIndex];
    if (!q) return true;
    saveCurrentAnswer();
    if (q.required === false) {
      showError("");
      return true;
    }
    if (SurveyForm.isQuestionAnswered(q, elQuestions)) {
      showError("");
      return true;
    }
    showError("이 문항은 필수입니다. 응답을 입력한 뒤 다음으로 넘어가 주세요.");
    return false;
  }

  function collectAnswers() {
    saveCurrentAnswer();
    var answers = {};
    SurveyForm.answerableQuestions(getQuestions()).forEach(function (q) {
      answers[q.id] = answerStore[q.id] != null ? answerStore[q.id] : "";
    });
    return answers;
  }

  function validateAllAnswers() {
    saveCurrentAnswer();
    var qs = getQuestions();
    var current = qs[currentQuestionIndex];
    var missing = SurveyForm.answerableQuestions(qs).filter(function (q) {
      if (q.required === false) return false;
      var saved = answerStore[q.id] || "";
      if (current && current.id === q.id) {
        return !SurveyForm.isQuestionAnswered(q, elQuestions);
      }
      return !SurveyForm.isAnswerValueValid(q, saved);
    });
    if (missing.length) {
      showError("필수 문항을 모두 작성해 주세요: " + missing.map(function (q) { return q.label; }).join(", "));
      return false;
    }
    showError("");
    return true;
  }

  document.getElementById("btnToForm").addEventListener("click", function () {
    var num = Number(elNum.value);
    if (!selectedBan) {
      showError("반을 선택해 주세요.");
      return;
    }
    if (!Number.isFinite(num) || num < 1) {
      showError("번호를 입력해 주세요.");
      return;
    }
    showError("");
    currentQuestionIndex = 0;
    answerStore = {};
    document.getElementById("stepIdentify").hidden = true;
    document.getElementById("stepForm").hidden = false;
    renderCurrentQuestion();
  });

  document.getElementById("btnBack").addEventListener("click", function () {
    if (currentQuestionIndex > 0) {
      saveCurrentAnswer();
      currentQuestionIndex -= 1;
      renderCurrentQuestion();
      showError("");
      return;
    }
    document.getElementById("stepForm").hidden = true;
    document.getElementById("stepIdentify").hidden = false;
  });

  btnNext.addEventListener("click", async function () {
    if (!validateCurrentQuestion()) return;

    var qs = getQuestions();
    if (currentQuestionIndex < qs.length - 1) {
      currentQuestionIndex += 1;
      renderCurrentQuestion();
      return;
    }

    if (!validateAllAnswers()) return;
    var num = Number(elNum.value);
    var 학번 = SurveyForm.formatStudentId(entry.grade || 1, selectedBan, num);
    var payload = {
      학번: 학번,
      반: selectedBan + "반",
      번호: num,
      이름: elName.value || "",
      answers: collectAnswers(),
      submittedAt: new Date().toISOString(),
    };
    btnNext.disabled = true;
    try {
      await SurveyForm.submitSurveyResponse(entry, payload);
      document.getElementById("stepForm").hidden = true;
      document.getElementById("stepDone").hidden = false;
      showError("");
    } catch (err) {
      showError(err.message || "제출에 실패했습니다.");
    } finally {
      btnNext.disabled = false;
    }
  });

  elNum.addEventListener("input", syncNameFromRoster);

  async function init() {
    if (!surveyId) {
      showError("설문 ID가 없습니다. index.html에서 설문 링크를 열어 주세요.");
      elTitle.textContent = "설문 참여";
      return;
    }
    entry = SurveyForm.findSurvey(surveyId);
    if (!entry || entry.type !== "form") {
      showError("등록된 설문을 찾을 수 없습니다. 관리자에게 문의하세요.");
      elTitle.textContent = "설문 없음";
      return;
    }
    try {
      var cfg = await SurveyForm.fetchSurveyConfig(entry);
      if (cfg) entry = Object.assign({}, entry, cfg);
      roster = await SurveyForm.fetchRosterRows();
    } catch (err) {
      showError(err.message || "초기화 실패");
      elTitle.textContent = "오류";
      return;
    }
    elTitle.textContent = entry.label || "설문";
    var elDesc = document.getElementById("surveyDesc");
    if (elDesc) {
      elDesc.textContent = entry.description || "명렬표에서 반·번호를 선택한 뒤 설문을 작성합니다.";
    }
    renderClassGrid();
  }

  init();
})();
  </script>
</body>
</html>
