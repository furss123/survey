  function formatAdaptiveQuestionTitle(raw) {
    return coerceText(raw || "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isPlaceholderSheetHeader(header) {
    var h = formatAdaptiveQuestionTitle(header);
    if (!h) return true;
    if (/^col_?\d+$/i.test(h)) return true;
    return false;
  }

  /** 시트 헤더 "4-1." → "Q4-1." 등 표시용 정규화 */
  function normalizeQuestionHeaderDisplay(header) {
    var q = formatAdaptiveQuestionTitle(header);
    if (!q || isPlaceholderSheetHeader(header)) return "";
    if (/^Q\s*\d/i.test(q)) {
      return q.replace(/^Q\s*(\d+)/i, "Q$1");
    }
    var m = q.match(/^(\d+)\s*([-–.])\s*(\d+)(.*)$/);
    if (m) {
      return (
        "Q" +
        m[1] +
        m[2] +
        m[3] +
        (m[4] ? " " + m[4].replace(/^\.\s*/, "").trim() : "")
      );
    }
    return q;
  }

  function questionOrderKey(question) {
    var q = String(question || "");
    var m = q.match(/Q\s*(\d+)\s*([-–.]?\s*)(\d+)?/i);
    if (!m) return 99999;
    var main = parseInt(m[1], 10);
    var sub =
      m[3] != null && String(m[3]).trim() !== ""
        ? parseInt(String(m[3]).replace(/\D/g, ""), 10)
        : 0;
    return main * 100 + sub;
  }

  function formatAdaptiveAnswerText(value) {
    return coerceText(value || "").trim();
  }

  function parseLikertScaleScore(value) {
    var t = String(value || "").trim();
    if (/^[1-5]$/.test(t)) return parseInt(t, 10);
    var n = Number(t);
    if (Number.isFinite(n) && n >= 1 && n <= 5 && Math.abs(n - Math.round(n)) < 0.001) {
      return Math.round(n);
    }
    return null;
  }

  function shouldUseLikertScaleForItem(question, answer) {
    var score = parseLikertScaleScore(answer);
    if (score == null) return null;
    var q = String(question || "");
    if (/Q\s*\d+\s*[-–.]\s*\d+/i.test(q)) return score;
    if (/Q\d+[-–.]\d+/i.test(q)) return score;
    if (/^\d+[-–.]\d+/i.test(q)) return score;
    if (String(answer).trim().length <= 2 && q.length > 0 && q.length <= 200) {
      return score;
    }
    return null;
  }

  var MULTI_SELECT_TYPE_DASH_RE = /형\s*[-–—]\s*/;
  var COMMA_MULTI_EXCLUDE_Q = 13;

  function getQuestionMainNumber(question) {
    var q = String(question || "").trim();
    var m = q.match(/Q\s*0*(\d+)/i);
    if (m) return parseInt(m[1], 10);
    m = q.match(/^(\d+)\s*[-–.]/);
    if (m) return parseInt(m[1], 10);
    return null;
  }

  function isCommaMultiSelectExcludedQuestion(question) {
    return getQuestionMainNumber(question) === COMMA_MULTI_EXCLUDE_Q;
  }

  /** 문장이 끝난 뒤 이어지는 쉼표(복수 선택 목록) */
  function hasCommaAfterSentenceEnd(text) {
    var normalized = String(text || "")
      .replace(/\uFF0C/g, ",")
      .trim();
    if (normalized.indexOf(",") < 0) return false;
    if (/"[^"]*"\s*,/.test(normalized)) return true;
    if (/형\s*[-–—][^,]{1,}\s*,/.test(normalized)) return true;
    return /(?:[\.\!\?…⋯]|[가-힣](?:다|요|함|때|임|음|네|죠|까|나|라|며|고|서|면|줘|세)|습니다|해요|돼요|있어요|없어요|겠어요|했어요|였어요|할게요|인가요|되나요|뿌듯함|느낄)\s*,/.test(
      normalized
    );
  }

  function isQuoteChar(ch) {
    return ch === '"' || ch === "\u201c" || ch === "\u201d" || ch === "\u2018" || ch === "\u2019";
  }

  /** 쉼표로 이어진 복수 선택(따옴표 안 쉼표는 유지) */
  function splitCommaSeparatedRespectingQuotes(text) {
    var parts = [];
    var current = "";
    var inQuote = false;
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      if (isQuoteChar(ch)) {
        inQuote = !inQuote;
        current += ch;
        continue;
      }
      if (!inQuote && ch === ",") {
        var rest = text.slice(i + 1);
        if (/^\s*\S/.test(rest)) {
          var piece = current.trim();
          if (piece) parts.push(piece);
          current = "";
          continue;
        }
      }
      current += ch;
    }
    var tail = current.trim();
    if (tail) parts.push(tail);
    return parts;
  }

  function looksLikeMultiSelectSegment(segment) {
    var s = String(segment || "").trim();
    if (!s || s.length < 4) return false;
    if (MULTI_SELECT_TYPE_DASH_RE.test(s)) return true;
    if (/\s[-–—]\s/.test(s)) return true;
    if (/(?:때|함)(?:\s*[,.)])?\s*$/u.test(s)) return true;
    if (/고\s*느낄\s*때\s*$/u.test(s)) return true;
    if (/때의\s+\S+/u.test(s)) return true;
    return false;
  }

  function looksLikeTypedMultiSelectSegment(segment) {
    return looksLikeMultiSelectSegment(segment);
  }

  function shouldTreatAsMultiSelectList(segments) {
    if (!segments || segments.length < 2) return false;
    var matchCount = segments.filter(looksLikeMultiSelectSegment).length;
    if (matchCount >= 2) return true;
    if (matchCount >= 1 && segments.length >= 2) {
      return segments.every(function (s) {
        return s.length >= 6 && s.length <= 220;
      });
    }
    var typed = segments.filter(function (s) {
      return MULTI_SELECT_TYPE_DASH_RE.test(s);
    }).length;
    if (typed >= 2) return true;
    return (
      segments.length >= 2 &&
      segments.every(function (s) {
        return s.length >= 8 && s.length <= 180;
      }) &&
      segments.filter(function (s) {
        return /(?:때|함)\s*$/u.test(s);
      }).length >=
        Math.max(2, Math.ceil(segments.length * 0.5))
    );
  }

  function parseMultiSelectAnswer(raw, question) {
    var text = String(raw || "").trim();
    if (!text || text === "—") return null;
    var normalizedComma = text.replace(/\uFF0C/g, ",");

    if (!isCommaMultiSelectExcludedQuestion(question)) {
      if (hasCommaAfterSentenceEnd(normalizedComma)) {
        var forcedComma = splitCommaSeparatedRespectingQuotes(normalizedComma);
        if (forcedComma.length >= 2) return forcedComma;
      }
    }

    var byNewline = text
      .split(/\r?\n+/)
      .map(function (s) {
        return s.trim();
      })
      .filter(Boolean);
    if (byNewline.length >= 2 && shouldTreatAsMultiSelectList(byNewline)) {
      return byNewline;
    }
    if (normalizedComma.indexOf(",") >= 0) {
      var byComma = splitCommaSeparatedRespectingQuotes(normalizedComma);
      if (shouldTreatAsMultiSelectList(byComma)) return byComma;
    }
    var byTypedComma = normalizedComma.split(
      /,\s*(?=[^\s,]+(?:형\s*[-–—]|\S+형\s*[-–—]))/
    );
    if (byTypedComma.length >= 2) {
      return byTypedComma
        .map(function (s) {
          return s.trim();
        })
        .filter(Boolean);
    }
    return null;
  }

  function splitMultiSelectChoiceSegment(segment) {
    var s = String(segment || "").trim();
    if (!s) return { type: "", detail: "" };
    var m = s.match(/^(.+?형)\s*[-–—]\s*(.+)$/);
    if (m) return { type: m[1].trim(), detail: m[2].trim() };
    var dash = s.search(/\s[-–—]\s/);
    if (dash > 0) {
      return {
        type: s.slice(0, dash).trim(),
        detail: s.slice(dash).replace(/^\s*[-–—]\s*/, "").trim(),
      };
    }
    return { type: "", detail: s };
  }

  function renderMultiSelectAnswerHtml(raw, question) {
    var choices = parseMultiSelectAnswer(raw, question);
    if (!choices || choices.length < 2) {
      return {
        isMulti: false,
        html:
          '<p class="survey-qa-item__answer-text">' + esc(raw || "—") + "</p>",
      };
    }
    var html = "";
    choices.forEach(function (seg) {
      var part = splitMultiSelectChoiceSegment(seg);
      html += '<div class="survey-qa-multi-choice">';
      if (part.type) {
        html +=
          '<span class="survey-qa-multi-choice__type">' + esc(part.type) + "</span>";
        html +=
          '<p class="survey-qa-multi-choice__detail">' +
          esc(part.detail) +
          "</p>";
      } else {
        html +=
          '<p class="survey-qa-multi-choice__detail">' +
          esc(part.detail || seg) +
          "</p>";
      }
      html += "</div>";
    });
    return { isMulti: true, html: html };
  }

  function renderSurveyAnswerValueHtml(raw, question) {
    var rendered = renderMultiSelectAnswerHtml(raw, question);
    if (!rendered.isMulti) {

  function renderLikertScaleBar(score) {
    var s = Math.max(1, Math.min(5, score));
    var html =
      '<div class="likert-scale" role="group" aria-label="척도 ' +
      s +
      '점. 1은 전혀 아니다, 5는 매우 그렇다">';
    html += '<div class="likert-scale__legend">';
    html +=
      '<span class="likert-scale__legend-end">1 <em>전혀 아니다</em></span>';
    html +=
      '<span class="likert-scale__legend-end likert-scale__legend-end--high">5 <em>매우 그렇다</em></span>';
    html += '</div><div class="likert-scale__track">';
    for (var i = 1; i <= 5; i++) {
      html +=
        '<span class="likert-scale__step' +
        (i === s ? " is-selected" : "") +
        (i <= s ? " is-filled" : "") +
        '"><span class="likert-scale__step-num">' +
        i +
        "</span></span>";
    }
    html += '</div><p class="likert-scale__summary">선택: <strong>' + s + "</strong> / 5</p></div>";
    return html;
  }

  function collectAdaptiveSurveyItems(row, sheet) {
    var items = [];
    var seen = {};
    var headers = sheet && sheet.headers ? sheet.headers : [];
    var sheetMeta = sheet && sheet.meta ? sheet.meta : null;

    function pushItem(question, answer, order) {
      var q =
        normalizeQuestionHeaderDisplay(question) ||
        formatAdaptiveQuestionTitle(question);
      if (!q || isPlaceholderSheetHeader(question)) return;
      if (isInternalSurveyFieldTitle(q)) return;
      if (seen[q]) return;
      seen[q] = true;
      items.push({
        question: q,
        answer: formatAdaptiveAnswerText(answer),
        order: order != null ? order : 99999,
        sortKey: questionOrderKey(q),
      });
    }

    function rawValueForHeader(h, colIdx) {
      if (!row._raw) return "";
      var rawKey = h || "col_" + colIdx;
      if (rawKey in row._raw) return row._raw[rawKey];
      var want = formatAdaptiveQuestionTitle(h);
      var keys = Object.keys(row._raw);
      for (var i = 0; i < keys.length; i++) {
        if (formatAdaptiveQuestionTitle(keys[i]) === want) return row._raw[keys[i]];
      }
      if (typeof colIdx === "number" && "col_" + colIdx in row._raw) {
        return row._raw["col_" + colIdx];
      }
      return "";
    }

    if (headers.length) {
      headers.forEach(function (h, colIdx) {
        if (isSkippableCategoryHeader(h, colIdx, sheetMeta)) return;
        var displayQ = normalizeQuestionHeaderDisplay(h);
        if (!displayQ && !isQuestionColumnHeader(h)) return;
        if (!displayQ) displayQ = formatAdaptiveQuestionTitle(h);
        pushItem(h, rawValueForHeader(h, colIdx), colIdx);
      });
    } else if (row._raw) {
      Object.keys(row._raw).forEach(function (key, idx) {
        if (isSkippableCategoryHeader(key, idx, sheetMeta)) return;
        if (!isQuestionColumnHeader(key) && !normalizeQuestionHeaderDisplay(key)) return;
        pushItem(key, row._raw[key], idx);
      });
    }

    (row.sections || []).forEach(function (sec, idx) {
      if (!isMeaningfulSection(sec) || isTeacherMessageSection(sec)) return;
      if (sheetMeta && sheetMeta.layout === "class-number-name-questions") return;
      if (sec.fields && sec.fields.length) {
        sec.fields.forEach(function (f, fi) {
          pushItem(f.key || sec.title, f.value, 9000 + idx * 100 + fi);
        });
      } else {
        pushItem(sec.title, sec.body, 9000 + idx);
      }
    });

    items.sort(function (a, b) {
      if (a.sortKey !== b.sortKey) return a.sortKey - b.sortKey;
      return a.order - b.order;
    });
    return items;
  }

  function renderAdaptiveSurveyItem(item) {
    var q = item.question;
    var likert = shouldUseLikertScaleForItem(q, item.answer);
    var html = '<div class="survey-qa-item">';
    html += '<h4 class="survey-qa-item__question">' + esc(q) + "</h4>";
    var answerBody = "";
    var answerExtraClass = "";
    if (likert != null) {
      answerBody = renderLikertScaleBar(likert);
    } else {
      var rendered = renderMultiSelectAnswerHtml(item.answer, q);
      if (rendered.isMulti) answerExtraClass = " survey-qa-item__answer--multi";
      answerBody = rendered.html;
    }
    html += '<div class="survey-qa-item__answer' + answerExtraClass + '">';
    html += answerBody;
    html += "</div></div>";
    return html;
  }

  function renderAdaptiveQuestionResponses(row) {
    var sheet = getActiveSheetAnalysis();
    var items = collectAdaptiveSurveyItems(row, sheet);
    if (!items.length) {

    var reportClass =

        ? " student-survey-report--smart"
        : "");
    var html = '<div class="' + reportClass + '">';
    items.forEach(function (item) {
      html += renderAdaptiveSurveyItem(item);
    });
    var teacherSec = getTeacherSectionFromRow(row);
    if (teacherSec) {
      html += '<section class="student-survey-report__teacher">';
      html += '<h4 class="student-survey-report__teacher-title">담임쌤께</h4>';
      if (teacherSec.fields && teacherSec.fields.length) {
        teacherSec.fields.forEach(function (f) {
          html += renderAdaptiveSurveyItem({

      } else if (teacherSec.body) {

      html += "</section>";
    }
    html += "</div>";
    return html;
  }

  var scrollStudentObserver = null;

  function updateViewTracker(card) {
    var panel = document.getElementById("viewTracker");
    var classEl = document.getElementById("viewTrackerClass");
    var numEl = document.getElementById("viewTrackerNum");
    var nameEl = document.getElementById("viewTrackerName");
    var statusEl = document.getElementById("viewTrackerStatus");
    if (!panel || !classEl || !numEl || !nameEl) return;
    if (!card) {
      panel.hidden = true;
      classEl.textContent = "—";
      numEl.textContent = "—";
      nameEl.textContent = "—";
      if (statusEl) statusEl.hidden = true;
      return;
    }
    var cls = card.getAttribute("data-student-class") || activeSheetView || "";
    var num = card.getAttribute("data-student-num");
    var name = card.getAttribute("data-student-name") || "";

  function teardownScrollStudentTracker() {
    if (scrollStudentObserver) {
      scrollStudentObserver.disconnect();
      scrollStudentObserver = null;
    }
    scrollStudentRatioMap = null;
    updateViewTracker(null);
  }

  function setupScrollStudentTracker() {
    teardownScrollStudentTracker();
    var results = document.getElementById("results");
    if (!results || !results.classList.contains("visible")) return;
    var cards = results.querySelectorAll(".student-card[data-student-num], .student-card[data-student-name]");
    if (!cards.length) return;

    scrollStudentRatioMap = new Map();
    var thresholds = [];
    for (var t = 0; t <= 20; t++) thresholds.push(t / 20);

    function pickCurrentCard() {
      var best = null;
      var bestRatio = 0;
      cards.forEach(function (card) {
        var ratio = scrollStudentRatioMap.get(card) || 0;
        if (ratio > bestRatio) {
          bestRatio = ratio;
          best = card;
        }
      });
      if (best && bestRatio > 0) {
        updateViewTracker(best);
      }
    }

    scrollStudentObserver = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          scrollStudentRatioMap.set(entry.target, entry.intersectionRatio);
        });
        pickCurrentCard();
      },
      { root: null, rootMargin: "-12% 0px -50% 0px", threshold: thresholds }
    );

    cards.forEach(function (card) {
      scrollStudentRatioMap.set(card, 0);
      scrollStudentObserver.observe(card);
    });
    updateViewTracker(cards[0]);
  }

  /** 인쇄 본문·Q&A 등 전체 글자 크기 가산 (1인1페이지 맞춤·줌 규칙은 그대로) */
  var PRINT_FONT_SIZE_BUMP_PT = 1.5;

  var PRINT_FIT_SPACING_PROPS = [
    "--print-font-pt",
    "--print-line-height",
    "--print-block-gap",
    "--print-block-pad",
    "--print-card-pad",
    "--print-header-mb",
    "--print-header-pb",
    "--print-body-pb",
    "--print-title-mb",
    "--print-qa-gap",
    "--print-qa-pad",
    "--print-qa-q-mb",
    "--print-report-gap",
    "--print-likert-mt",
    "--print-likert-legend-mb",
    "--print-likert-track-gap",
    "--print-likert-step-h",
    "--print-zoom",
  ];

  function clearStudentCardsPrintFit() {
    document.querySelectorAll("#results .student-card").forEach(function (card) {
      card.classList.remove("print-fit-applied", "print-fit-compact-likert");
      PRINT_FIT_SPACING_PROPS.forEach(function (prop) {
        card.style.removeProperty(prop);
      });
    });
    document.body.classList.remove("print-fit-measuring");
  }

  function applyStudentCardPrintFitVars(card, fontPt, lineH, compactTier) {
    var tier = compactTier || 0;
    card.style.setProperty(
      "--print-font-pt",
      Math.round((fontPt + PRINT_FONT_SIZE_BUMP_PT) * 20) / 20 + "pt"
    );
    card.style.setProperty("--print-line-height", String(lineH));
    card.classList.toggle("print-fit-compact-likert", tier >= 2);
    if (tier >= 3) {
      card.style.setProperty("--print-block-gap", "2px");
      card.style.setProperty("--print-block-pad", "3px 5px 2px");
      card.style.setProperty("--print-card-pad", "4px 6px 0");
      card.style.setProperty("--print-header-mb", "3px");
      card.style.setProperty("--print-header-pb", "3px");
      card.style.setProperty("--print-body-pb", "4px");
      card.style.setProperty("--print-title-mb", "1px");
      card.style.setProperty("--print-qa-gap", "2px");
      card.style.setProperty("--print-qa-pad", "3px 5px");
      card.style.setProperty("--print-qa-q-mb", "2px");
      card.style.setProperty("--print-report-gap", "0");
      card.style.setProperty("--print-likert-mt", "1px");
      card.style.setProperty("--print-likert-legend-mb", "2px");
      card.style.setProperty("--print-likert-track-gap", "2px");
      card.style.setProperty("--print-likert-step-h", "16px");
    } else if (tier >= 2) {
      card.style.setProperty("--print-block-gap", "3px");
      card.style.setProperty("--print-block-pad", "4px 6px 3px");
      card.style.setProperty("--print-card-pad", "6px 8px 0");
      card.style.setProperty("--print-header-mb", "4px");
      card.style.setProperty("--print-header-pb", "4px");
      card.style.setProperty("--print-body-pb", "6px");
      card.style.setProperty("--print-title-mb", "2px");
      card.style.setProperty("--print-qa-gap", "3px");
      card.style.setProperty("--print-qa-pad", "4px 6px");
      card.style.setProperty("--print-qa-q-mb", "2px");
      card.style.setProperty("--print-report-gap", "0");
      card.style.setProperty("--print-likert-mt", "2px");
      card.style.setProperty("--print-likert-legend-mb", "2px");
      card.style.setProperty("--print-likert-track-gap", "3px");
      card.style.setProperty("--print-likert-step-h", "18px");
    } else if (tier >= 1) {
      card.style.setProperty("--print-block-gap", "5px");
      card.style.setProperty("--print-block-pad", "6px 8px 5px");
      card.style.setProperty("--print-card-pad", "8px 10px 0");
      card.style.setProperty("--print-header-mb", "6px");
      card.style.setProperty("--print-header-pb", "6px");
      card.style.setProperty("--print-body-pb", "8px");
      card.style.setProperty("--print-title-mb", "3px");
      card.style.setProperty("--print-qa-gap", "4px");
      card.style.setProperty("--print-qa-pad", "5px 7px");
      card.style.setProperty("--print-qa-q-mb", "3px");
      card.style.setProperty("--print-report-gap", "0");
      card.style.setProperty("--print-likert-mt", "2px");
      card.style.setProperty("--print-likert-legend-mb", "3px");
      card.style.setProperty("--print-likert-track-gap", "4px");
      card.style.setProperty("--print-likert-step-h", "20px");
    } else {
      card.style.setProperty("--print-block-gap", "7px");
      card.style.setProperty("--print-block-pad", "8px 10px 6px");
      card.style.setProperty("--print-card-pad", "10px 12px 0");
      card.style.setProperty("--print-header-mb", "8px");
      card.style.setProperty("--print-header-pb", "8px");
      card.style.setProperty("--print-body-pb", "10px");
      card.style.setProperty("--print-title-mb", "4px");
      card.style.setProperty("--print-qa-gap", "6px");
      card.style.setProperty("--print-qa-pad", "6px 8px");
      card.style.setProperty("--print-qa-q-mb", "4px");
      card.style.setProperty("--print-report-gap", "0");
      card.style.setProperty("--print-likert-mt", "3px");
      card.style.setProperty("--print-likert-legend-mb", "4px");
      card.style.setProperty("--print-likert-track-gap", "5px");
      card.style.setProperty("--print-likert-step-h", "22px");
    }
  }

  function studentCardFitsPage(card, pageBudget) {
    return card.scrollHeight <= pageBudget;
  }

  function applyPrintZoomToFit(card, pageBudget) {
    card.style.removeProperty("--print-zoom");
    if (card.scrollHeight <= pageBudget) return;
    var scale = Math.max(0.82, Math.min(1, (pageBudget - 2) / card.scrollHeight));
    card.style.setProperty("--print-zoom", String(Math.round(scale * 1000) / 1000));
    if (card.scrollHeight > pageBudget) {
      scale = Math.max(0.82, (pageBudget - 2) / card.scrollHeight);
      card.style.setProperty("--print-zoom", String(Math.round(scale * 1000) / 1000));
    }
  }

  function fitStudentCardToOnePage(card, pageBudget) {
    var minFontPt = 5.5;
    var minLineH = 1.06;
    var maxFontPt = 10;
    var maxLineH = 1.36;
    var bestFont = minFontPt;
    var bestLine = minLineH;
    var bestTier = 3;

    card.style.removeProperty("--print-zoom");

    for (var tier = 0; tier <= 3; tier++) {
      var lineH = maxLineH;
      while (lineH + 0.001 >= minLineH) {
        var lo = minFontPt;
        var hi = maxFontPt;
        var chosen = minFontPt;
        while (hi - lo > 0.1) {
          var mid = Math.round(((lo + hi) / 2) * 20) / 20;
          applyStudentCardPrintFitVars(card, mid, lineH, tier);
          card.style.removeProperty("--print-zoom");
          if (studentCardFitsPage(card, pageBudget)) {
            chosen = mid;
            lo = mid + 0.1;
          } else {
            hi = mid - 0.1;
          }
        }
        for (var tryFont = chosen; tryFont + 0.001 >= minFontPt; tryFont = Math.round((tryFont - 0.12) * 20) / 20) {
          applyStudentCardPrintFitVars(card, tryFont, lineH, tier);
          card.style.removeProperty("--print-zoom");
          if (studentCardFitsPage(card, pageBudget)) {
            chosen = tryFont;
            break;
          }
        }
        applyStudentCardPrintFitVars(card, chosen, lineH, tier);
        card.style.removeProperty("--print-zoom");
        if (studentCardFitsPage(card, pageBudget)) {
          bestFont = chosen;
          bestLine = lineH;
          bestTier = tier;
          applyStudentCardPrintFitVars(card, bestFont, bestLine, bestTier);
          return;
        }
        lineH = Math.round((lineH - 0.025) * 100) / 100;
      }
    }

    applyStudentCardPrintFitVars(card, minFontPt, minLineH, 3);
    applyPrintZoomToFit(card, pageBudget);
  }

  function prepareStudentCardsPrintFit() {
    clearStudentCardsPrintFit();
    if (!shouldPrintOneStudentPerPage()) return;
    var cards = document.querySelectorAll(
      "#results .student-card:not(.student-card--absent)"
    );
    if (!cards.length) return;

    document.body.classList.add("print-fit-measuring", "print-one-student-per-page");
    if (!document.body.classList.contains("is-printing-results")) {
      document.body.classList.add("is-printing-results");
    }
    var pageBudget = getPrintablePageHeightPx() - 12;

    cards.forEach(function (card) {
      fitStudentCardToOnePage(card, pageBudget);
      card.classList.add("print-fit-applied");
    });

    document.body.classList.remove("print-fit-measuring");
  }

  function runSurveyPrint() {
    var results = document.getElementById("results");
    if (!results || !results.classList.contains("visible")) {
      alert("먼저 시트를 조회한 뒤 인쇄해 주세요.");
      return;
    }
    syncResultsPrintState(results);
    setPrintMode(true);
    prepareStudentCardsPrintFit();
    window.print();
  }

  function setPrintMode(enabled) {
    var isTeacher = activeSubjectView === "teacher";
    var onePerPage = enabled && shouldPrintOneStudentPerPage();
    document.body.classList.toggle("is-printing-results", enabled);
    document.body.classList.toggle("print-teacher-mode", enabled && isTeacher);
    document.body.classList.toggle("print-one-student-per-page", onePerPage);
    var results = document.getElementById("results");
    if (results) results.classList.toggle("results-print-teacher", enabled && isTeacher);
    if (enabled && isTeacher) applyTeacherPrintGrid();
    else {
      var list = document.querySelector("#results .student-cards-list");
      if (list) list.style.removeProperty("--teacher-print-cols");
      if (!enabled) clearStudentCardsPrintFit();
    }
  }

  function wrapResultsHtml(chromeHtml, bodyHtml) {
    var chrome = chromeHtml || "";
    var body = bodyHtml || "";
    if (!chrome) return body;
    return (
      '<div class="results-layout">' +
      '<div class="results-sticky-chrome no-print">' +
      chrome +
      "</div>" +
      '<div class="results-main">' +
      body +
      "</div></div>"
    );
  }

  function renderResultsChrome() {
    return renderSurveyViewHeader() + renderClassPickerBar();
  }

  function renderResults(data, spreadsheetId, multi) {
    var el = document.getElementById("results");
    ensureClassSelectionForResults();
    var sheet = getActiveSheetAnalysis();
    var analysis = data || getActiveAnalysis();
    showResultsView();
    setFabStackVisible(true);
    ensureActiveSubjectViewValid();

    var chromeHtml = renderResultsChrome();
    var bodyHtml = "";
    if (!sheet) {
      bodyHtml += '<p class="student-cards-empty">조회할 설문을 선택해 주세요.</p>';
      el.innerHTML = wrapResultsHtml(chromeHtml, bodyHtml);
      el.classList.add("visible");
      syncResultsPrintState(el);
      teardownScrollStudentTracker();
      bindResultTabs(el, spreadsheetId);
      return;
    }

    var s = sheet.summary;
    var hasData =
      (s && s.총응답) ||
      (sheet.participation && sheet.participation.missingCount) ||
      (sheet.rows && sheet.rows.length);
    if (!hasData) {
      bodyHtml += '<p class="student-cards-empty">이 설문에 분석할 데이터가 없습니다.</p>';
      el.innerHTML = wrapResultsHtml(chromeHtml, bodyHtml);
      el.classList.add("visible");
      syncResultsPrintState(el);
      teardownScrollStudentTracker();
      bindResultTabs(el, spreadsheetId);
      return;
    }

    bodyHtml += renderClassStudentList(analysis);

    el.innerHTML = wrapResultsHtml(chromeHtml, bodyHtml);
    el.classList.add("visible");
    syncResultsPrintState(el);

    bindResultTabs(el, spreadsheetId);
    setupScrollStudentTracker();
  }

  function bindResultTabs(el, spreadsheetId) {
    if (!el) return;
    var backBtn = document.getElementById("surveyBackBtn");
    if (backBtn) {
      backBtn.addEventListener("click", function () {
        showHomeView();
      });
    }
    var printBtn = document.getElementById("surveyPrintBtn");
    if (printBtn && printBtn.dataset.bound !== "1") {
      printBtn.dataset.bound = "1";
      printBtn.addEventListener("click", runSurveyPrint);
    }
    el.querySelectorAll(".class-select-option").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var categoryId = btn.getAttribute("data-category");
        if (categoryId != null && categoryId !== "") {
          activeSubjectView = categoryId;
          renderResults(null, spreadsheetId, lastMultiResult);
          syncViewUrl();
          return;
        }
        activeSheetView = btn.getAttribute("data-sheet");
        activeClassFilter = btn.getAttribute("data-class") || null;
        renderResults(null, spreadsheetId, lastMultiResult);
        syncViewUrl();
      });
    });
  }

  var THEME_STORAGE_KEY = "school-theme-v1";

  function applyTheme(theme) {
    var isDark = theme === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
    localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
    var toggle = document.getElementById("themeToggle");
    if (toggle) {
      toggle.setAttribute("aria-label", isDark ? "라이트 모드" : "다크 모드");
      toggle.title = isDark ? "라이트 모드" : "다크 모드";
    }
  }

  function initTheme() {
    var saved = localStorage.getItem(THEME_STORAGE_KEY);
    if (saved === "dark" || saved === "light") {
      applyTheme(saved);
      return;
    }
    applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  }

  initTheme();
  var themeToggleEl = document.getElementById("themeToggle");
  if (themeToggleEl) {
    themeToggleEl.addEventListener("click", function () {
      var isDark = document.documentElement.getAttribute("data-theme") === "dark";
      applyTheme(isDark ? "light" : "dark");
    });
  }
  scheduleHeaderTitleFit();
  window.addEventListener("resize", scheduleHeaderTitleFit);
  window.addEventListener("load", scheduleHeaderTitleFit);

  refreshHomeSurveyList({ sync: true, flash: false });
  window.addEventListener("pageshow", function () {
    refreshHomeSurveyList({ sync: true, flash: false });
  });
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") {
      refreshHomeSurveyList({ sync: true, flash: false });
    }
  });
  window.addEventListener("survey-registry-updated", function () {
    refreshHomeSurveyList({ sync: false });
  });
  window.addEventListener("storage", function (e) {
    if (e.key === SHEET_REGISTRY_KEY || e.key === SurveyForm.REGISTRY_KEY) {
      refreshHomeSurveyList({ sync: false });
    }
  });

  bindAdminLayoutPicker();
  document.getElementById("adminSetupConfirm").addEventListener("click", function () {
    confirmAdminSetup();
  });
  var adminSetupPreviewBtn = document.getElementById("adminSetupPreviewBtn");
  if (adminSetupPreviewBtn) {
    adminSetupPreviewBtn.addEventListener("click", enterAdminSetupPreview);
  }
  var adminSetupBackToConfigureBtn = document.getElementById("adminSetupBackToConfigureBtn");
  if (adminSetupBackToConfigureBtn) {
    adminSetupBackToConfigureBtn.addEventListener("click", function () {
      applyAdminSetupStep("configure");
      var panel = document.getElementById("adminSetupPanel");
      if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }

  (function initAdminSetupFromQuery() {
    var params = new URLSearchParams(location.search);
    if (params.get("adminSetup") !== "1") return;
    if (typeof AdminSession === "undefined" || !AdminSession.isValid()) {
      alert("관리자 로그인이 필요합니다. 다시 로그인해 주세요.");
      location.href = "admin-login.html";
      return;
    }
    AdminSession.touch();
    AdminSession.bindActivity();
    var draft = null;
    try {
      var raw = sessionStorage.getItem(ADMIN_SETUP_DRAFT_KEY);
      if (raw) draft = JSON.parse(raw);
    } catch (err) { /* ignore */ }
    var label = SurveyForm.normalizeDisplayText(
      params.get("label") || (draft && draft.label) || "새 시트"
    ) || "새 시트";
    var url = params.get("url") || (draft && draft.url) || "";
    if (!url) {
      alert("시트 주소가 없습니다. 관리자에서 「카테고리 구성」을 다시 실행해 주세요.");
      location.href = "admin.html";
      return;
    }
    if (draft && draft.ts && Date.now() - draft.ts > 2 * 60 * 60 * 1000) {
      alert("미리보기 세션이 만료되었습니다. 관리자에서 「카테고리 구성」을 다시 실행해 주세요.");
      sessionStorage.removeItem(ADMIN_SETUP_DRAFT_KEY);
      location.href = "admin.html";
      return;
    }
    adminSetupEditId =
      params.get("editId") || (draft && draft.editId ? draft.editId : null);
    sessionStorage.setItem(
      ADMIN_SETUP_DRAFT_KEY,
      JSON.stringify({
        label: label,
        url: url,
        ts: Date.now(),
        editId: adminSetupEditId,
        categories: draft && draft.categories ? draft.categories : null,
        classes: draft && draft.classes ? draft.classes : null,
        categorySelectAll: adminCategorySelectAll,
        resultsLayout: draft && draft.resultsLayout ? draft.resultsLayout : adminSetupResultsLayout,
      })
    );
    if (draft && draft.resultsLayout) adminSetupResultsLayout = draft.resultsLayout;
    bindAdminLayoutPicker();
    replaceIndexPageUrl({
      adminSetup: "1",
      label: label,
      url: url,
      sheet: params.get("sheet"),
      class: params.get("class"),
      subject: params.get("subject"),
    });
    launchAdminSetup(label, url, {
      sheet: params.get("sheet"),
      class: params.get("class"),
      subject: params.get("subject"),
    });
  })();

  (function openSheetFromQuery() {
    var params = new URLSearchParams(location.search);
    if (params.get("adminSetup") === "1") return;
    var openId = params.get("open");
    if (!openId) return;
    var entry =
      resolveLaunchEntry(openId) ||
      getDefaultClassSheetButtons().find(function (item) {
        return item.id === openId;
      });
    if (!entry) return;
    var baseId = String(openId).split("::")[0];
    var regEntry = findRegistryEntry(baseId) || entry;
    var restoreView = {
      sheet: params.get("sheet"),
      class: params.get("class"),
      subject: params.get("subject"),
    };
    setTimeout(function () {
      launchSheetAnalysis(regEntry, null, restoreView);
    }, 0);
  })();

  var headerLogoHome = document.getElementById("headerLogoHome");
  if (headerLogoHome) {
    headerLogoHome.addEventListener("click", function (e) {
      var results = document.getElementById("results");
      if (results && results.classList.contains("visible")) {
        e.preventDefault();
        showHomeView();
      }
    });
  }

  document.getElementById("fabTop").addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  document.getElementById("fabBottom").addEventListener("click", function () {
    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
  });
  window.addEventListener("beforeprint", function () {
    var results = document.getElementById("results");
    if (results && results.classList.contains("visible")) {
      syncResultsPrintState(results);
      setPrintMode(true);
      prepareStudentCardsPrintFit();
    }
  });
  window.addEventListener("afterprint", function () {
    setPrintMode(false);
    clearStudentCardsPrintFit();
  });

})();
  </script>
