<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 남악고등학교 1학년 설문 결과</title>
  <!-- ui-version: 20260522-survey-pages -->
  <link rel="canonical" href="https://furss123.github.io/survey/" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg-page: #eef2f6;
      --bg-surface: #ffffff;
      --bg-muted: #f8fafc;
      --bg-category: #f1f5f9;
      --bg-accent-soft: #f0fdfa;
      --bg-accent-banner: #ecfdf5;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --border-accent: #99f6e4;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-subtle: #475569;
      --text-accent: #115e59;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 2px 8px rgba(15, 23, 42, 0.08);
      --chip-bg: #ffffff;
      --chip-active-text: #ffffff;
      --badge-done-bg: #ecfdf5;
      --badge-done-text: #0f766e;
      --badge-pending-bg: #f8fafc;
      --badge-pending-text: #64748b;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --danger-bg: #fef2f2;
      --danger-text: #b91c1c;
      --fab-bg: #ffffff;
      --fab-print-start: #3b82f6;
      --fab-print-end: #2563eb;
      --scrollbar: #cbd5e1;
    }
    html[data-theme="dark"] {

      --bg-surface: #1e293b;
      --bg-muted: #334155;
      --bg-category: #2d3f56;
      --bg-accent-soft: #134e4a;
      --bg-accent-banner: #115e59;
      --border: #334155;
      --border-strong: #475569;
      --border-accent: #0f766e;
      --text: #f8fafc;
      --text-muted: #cbd5e1;
      --text-subtle: #e2e8f0;
      --text-accent: #ccfbf1;
      --accent: #2dd4bf;
      --accent-hover: #5eead4;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.35);
      --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
      --chip-bg: #1e293b;
      --chip-active-text: #ffffff;
      --badge-done-bg: #134e4a;
      --badge-done-text: #99f6e4;
      --badge-pending-bg: #334155;
      --badge-pending-text: #e2e8f0;
      --error-bg: #450a0a;
      --error-text: #fca5a5;
      --danger-bg: #450a0a;
      --danger-text: #fca5a5;
      --fab-bg: #1e293b;
      --fab-print-start: #2563eb;
      --fab-print-end: #1d4ed8;
      --scrollbar: #475569;
    }
    html {
      font-size: calc(14px + 1pt);
    }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg-page);
      transition: background 0.2s, color 0.2s;
    }
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-brand {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      flex-shrink: 0;
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    .header-title {
      min-width: 0;
      margin: 0;
      font-size: clamp(0.9rem, 3vw, 1.25rem);
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }
    .header-home-btn,
    .theme-toggle {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-surface);
      color: var(--text-subtle);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .header-home-btn {
      border: none;
      background: transparent;
      width: 1.75rem;
      height: 1.75rem;
    }
    .header-home-btn:hover,
    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--border-accent);
      background: var(--bg-accent-soft);
    }
    .header-home-btn svg,
    .theme-toggle svg {
      width: 1.25rem;
      height: 1.25rem;
      display: block;
    }
    .header-home-btn svg {
      width: 1.5rem;
      height: 1.5rem;
    }
    .theme-toggle .icon-sun { display: none; }
    html[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    html[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    .wrap {
      max-width: 210mm;
      width: 100%;
      margin: 0 auto;
      padding: 20px 16px;
    }
    #homePanel[hidden] { display: none !important; }
    .subtitle { margin: 6px 0 0; font-size: 0.875rem; color: #64748b; }
    main { padding: 20px 16px 48px; }
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    #homePanel.card {
      width: 100%;
      max-width: 100%;
    }
    #sheetButtonGrid { display: none !important; }
    .home-admin-gate {
      width: 100%;
      padding: 20px 16px;
      border-radius: 12px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
    }
    .home-admin-gate[hidden] { display: none !important; }
    .home-admin-gate .admin-panel-title {
      margin: 0 0 14px;
      text-align: center;
    }
    .home-admin-gate label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-subtle);
    }
    .home-admin-gate input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: var(--bg-surface);
      color: var(--text);
      font-size: 1rem;
      box-sizing: border-box;
    }
    .home-admin-gate input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }
    .home-admin-gate .admin-actions {
      margin-top: 14px;
      justify-content: center;
    }
    .home-admin-hint {
      margin: 10px 0 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
    .home-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .admin-entry-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-surface);
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-entry-btn:hover { border-color: var(--border-strong); color: var(--text); }
    #adminPanel {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px dashed var(--border);
    }
    #adminPanel[hidden] { display: none !important; }
    .admin-panel-title {
      margin: 0 0 12px;
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text);
    }
    .admin-form label {
      display: block;
      margin-top: 10px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-subtle);
    }
    .admin-form label:first-child { margin-top: 0; }
    .admin-form input[type="text"],
    .admin-form input[type="url"],
    .admin-form input[type="password"] {
      width: 100%;
      margin-top: 6px;
      padding: 9px 11px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      font-size: 0.875rem;
      background: var(--bg-surface);
      color: var(--text);
    }
    .admin-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }
    .admin-actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .admin-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: var(--bg-surface);
      color: var(--text);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-btn-primary {
      border: none;
      background: var(--accent);
      color: #fff;
    }
    .admin-btn-primary:hover { background: var(--accent-hover); }
    .admin-btn-danger {
      border-color: var(--danger-text);
      color: var(--danger-text);
      background: var(--danger-bg);
    }
    .admin-registry-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
    }
    .admin-registry-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-muted);
      font-size: 0.8125rem;
      margin-bottom: 8px;
    }
    .admin-registry-list .registry-meta {
      min-width: 0;
      flex: 1;
    }
    .admin-registry-list .registry-meta strong {
      display: block;
      color: var(--text);
    }
    .admin-registry-list .registry-meta span {
      display: block;
      margin-top: 2px;
      color: var(--text-muted);
      word-break: break-all;
    }
    .admin-login-box {
      margin-top: 12px;
      padding: 14px;
      border-radius: 10px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
    }
    .error {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 0.875rem;
    }
    #results {
      margin: 24px auto 0;
      display: none;
      width: 100%;
      max-width: 210mm;
    }
    #results.visible { display: block; }
    #results .sheet-banner,
    #results .sheet-tabs,
    #results .subject-tabs,
    #results .participation-banner,
    #results .responses-heading,
    #results .student-cards,
    #results .student-cards-list,
    #results .student-card,
    #results .student-cards-empty {
      margin-left: auto;
      margin-right: auto;
    }
    #results .sheet-banner {
      text-align: center;
    }
    #results .sheet-tabs,
    #results .subject-tabs {
      justify-content: flex-start;
    }
    #results .responses-heading {
      text-align: center;
      width: 100%;
    }
    .muted { color: var(--text-muted); }
    .preview { color: var(--text); word-break: break-word; line-height: 1.55; }
    .student-cards,
    .student-cards-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 8px;
      width: 100%;
      max-width: 100%;
    }
    .student-card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px 0;
      box-shadow: var(--shadow-sm);
      margin-bottom: 0;
      min-width: 0;
      box-sizing: border-box;
    }
    @media (min-width: 640px) {
      .student-card { padding: 14px 16px 0; }
    }
    .student-response-body {
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
      padding-bottom: 14px;
      box-sizing: border-box;
    }
    .student-card-divider {
      margin: 0;
      border: none;
      border-top: 2px solid var(--border);
      height: 0;
    }
    .student-card:last-child .student-card-divider {
      border-top-color: var(--border);
      opacity: 0.6;
    }
    .student-cards-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      background: var(--bg-surface);
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
    }
    .responses-heading {
      margin: 0 0 4px;
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text);
    }
    .category-blocks {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    .category-block {
      width: 100%;
      max-width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--bg-category);
      border: 1px solid var(--border-strong);
      box-sizing: border-box;
    }
    .category-block .cat-title {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--accent-hover);
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .category-block .cat-body {
      font-size: 0.875rem;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .category-block .cat-field {
      font-size: 0.875rem;
      color: var(--text);
      margin-top: 5px;
      line-height: 1.55;
    }
    .category-block .cat-field span {
      font-weight: 600;
      color: var(--text-subtle);
      margin-right: 4px;
    }
    .category-block--teacher {
      background: var(--bg-accent-soft);
      border-color: var(--border-accent);
    }
    .student-response-header {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px 12px;
      flex-shrink: 0;
      margin: 0 0 12px;
      padding: 0 0 12px;
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      line-height: 1.35;
    }
    .student-response-header .header-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 10px;
      min-width: 0;
    }
    .student-response-header .student-class {
      color: var(--accent-hover);
      font-size: 0.9375rem;
      font-weight: 700;
    }
    .student-response-header .student-num {
      color: var(--text-subtle);
      font-size: 0.875rem;
      font-weight: 600;
    }
    .student-response-header .student-name {
      color: var(--text);
      font-size: 1.125rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .status-badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .status-badge.done {
      background: var(--badge-done-bg);
      color: var(--badge-done-text);
      border: 1px solid var(--border-accent);
    }
    .status-badge.pending {
      background: var(--badge-pending-bg);
      color: var(--badge-pending-text);
      border: 1px solid var(--border-strong);
    }
    .sheet-banner {
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--bg-accent-banner);
      border: 1px solid var(--border-accent);
      font-size: 0.875rem;
      color: var(--text-accent);
    }
    .sheet-tabs,
    .subject-tabs {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar) transparent;
    }
    .sheet-tabs::-webkit-scrollbar,
    .subject-tabs::-webkit-scrollbar {
      height: 5px;
    }
    .sheet-tabs::-webkit-scrollbar-thumb,
    .subject-tabs::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 999px;
    }
    .sheet-tab {
      flex-shrink: 0;
      white-space: nowrap;
      padding: 8px 15px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: var(--chip-bg);
      font-size: calc(0.8125rem + 1pt);
      font-weight: 600;
      color: var(--text-subtle);
      cursor: pointer;
      line-height: 1.35;
    }
    .sheet-tab:hover { border-color: var(--accent); color: var(--accent-hover); }
    .sheet-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--chip-active-text);
    }
    .sheet-tab .count {
      margin-left: 6px;
      font-size: calc(0.8125rem + 1pt);
      font-weight: 400;
      opacity: 0.85;
    }
    .subject-tab {
      flex-shrink: 0;
      white-space: nowrap;
      padding: 8px 15px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: var(--chip-bg);
      font-size: calc(0.8125rem + 1pt);
      font-weight: 600;
      color: var(--text-subtle);
      cursor: pointer;
      line-height: 1.35;
    }
    .subject-tab:hover { border-color: var(--accent); color: var(--accent-hover); }
    .subject-tab.active {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: var(--chip-active-text);
    }
    .subject-empty {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .participation-banner {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      line-height: 1.5;
    }
    .participation-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .participation-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-subtle);
      background: var(--bg-muted);
      border: 1px solid var(--border);
    }
    .participation-chip strong {
      color: var(--text);
      font-weight: 700;
    }
    .participation-chip--primary {
      background: var(--bg-accent-banner);
      border-color: var(--border-accent);
      color: var(--accent-hover);
    }
    .participation-chip--primary strong { color: var(--accent); }
    .participation-chip--warn {
      background: var(--bg-muted);
      border-color: var(--border-strong);
      color: var(--text-muted);
    }
    .participation-chip--warn strong { color: var(--text-subtle); }
    .participation-banner .missing-list {
      margin: 10px 0 0;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      word-break: break-word;
    }
    .participation-banner .missing-list .missing-label {
      font-weight: 700;
      color: var(--text-subtle);
    }
    .participation-banner .missing-list--ok {
      color: var(--accent-hover);
      font-weight: 600;
    }
    .student-card--absent {
      background: var(--bg-muted);
      border-style: dashed;
      border-color: var(--border-strong);
      opacity: 0.92;
    }
    .student-card--absent .student-name {
      color: var(--text-muted);
      font-weight: 600;
    }
    .student-card--absent .absent-note {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .view-tracker {
      position: fixed;
      z-index: 999;
      width: 170px;
      padding: 16px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.1);
      max-height: min(70vh, 368px);
      overflow-y: auto;
    }
    .view-tracker[hidden] { display: none !important; }
    .view-tracker-head {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.79rem;
      font-weight: 700;
      color: #0f766e;
      letter-spacing: -0.01em;
    }
    .view-tracker-head svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke: #0d9488;
    }
    .view-tracker-fields { margin: 0; }
    .view-tracker-row {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 5px 7px;
      align-items: center;
      margin-bottom: 9px;
    }
    .view-tracker-row:last-of-type { margin-bottom: 0; }
    .view-tracker-row dt {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 0;
      font-size: 0.72rem;
      font-weight: 600;
      color: #64748b;
    }
    .view-tracker-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: #94a3b8;
    }
    .view-tracker-row dd {
      margin: 0;
      font-size: 0.93rem;
      font-weight: 700;
      color: #0f172a;
      word-break: keep-all;
    }

  <script>
(function () {
  "use strict";

  const SPREADSHEET_ID_PATTERN = /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;
  const CLASS_ROSTER_SPREADSHEET_ID = "1GHbpOBkx2dLZvhiBzBIgpBgN5OBB80G-mQFcrfdpFXQ";
  const DEFAULT_RESPONSE_SHEET_ID = "1oH3Er_9UF_A6HDQEK_1KjFxp54M_JJrU";
  const SHEET_REGISTRY_KEY = "school-sheet-registry-v1";
  const ADMIN_PASSWORD_KEY = "school-admin-password-v1";
  const ADMIN_SESSION_KEY = "school-admin-session-v1";
  const DEFAULT_ADMIN_PASSWORD = "school-admin";
  const PROFILE_PATTERN = /\[(\d+)반\]\s*\[(\d+)\]\s*\[([^\]]+)\]/;

  const CLASS_ALIASES = ["반", "class", "학급", "클래스", "반명"];
  const NUMBER_ALIASES = ["번호", "number", "no", "no.", "학번", "순번"];
  const NAME_ALIASES = ["이름", "name", "성명", "학생"];
  const ROSTER_NAME_ALIASES = ["이름", "name", "성명", "성함", "studentname", "학생이름"];
  const COMPLETION_ALIASES = ["완료", "제출", "응답", "status", "상태", "completed", "done", "체크"];
  const CONTENT_ALIASES = ["상담", "내용", "응답", "메모", "비고", "고민", "주제", "프로필", "기록", "comment", "note"];
  const THEME_KEYWORDS = [
    { key: "진로", label: "진로·진학" },
    { key: "친구", label: "대인관계" },
    { key: "가족", label: "가정" },
    { key: "스트레스", label: "스트레스·정서" },
    { key: "학습", label: "학습" },
    { key: "건강", label: "건강" },
    { key: "또래", label: "또래 관계" },
    { key: "불안", label: "불안" },
  ];

  function groupBy(arr, keyFn) {
    const groups = {};
    for (const item of arr) {
      const key = keyFn(item);
      if (!groups[key]) groups[key] = [];
      groups[key].push(item);
    }
    return groups;
  }

  function sumBy(arr, fn) {
    return arr.reduce((s, x) => s + fn(x), 0);
  }

  function parseSpreadsheetId(url) {
    if (!url || typeof url !== "string") {
      throw new Error("유효한 Google Sheets URL이 필요합니다.");
    }
    const trimmed = url.trim();
    const match = trimmed.match(SPREADSHEET_ID_PATTERN);
    if (match && match[1]) return match[1];
    if (/^[a-zA-Z0-9-_]{20,}$/.test(trimmed)) return trimmed;
    throw new Error("스프레드시트 ID를 URL에서 찾을 수 없습니다. 공유 링크 형식을 확인해 주세요.");
  }

  function parseGvizJson(text) {
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if (start < 0 || end <= start) throw new Error("gviz 응답을 파싱할 수 없습니다.");
    return JSON.parse(text.slice(start, end + 1));
  }

  function parseTabsFromHtml(html) {
    var tabs = [];
    var re = /docs-sheet-tab[^>]*data-sheet-id="(\d+)"[^>]*aria-label="([^"]+)"/g;
    var m;
    while ((m = re.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: m[2] });
    }
    if (tabs.length) return tabs;
    var captionRe = /docs-sheet-tab-caption">([^<]+)</g;
    while ((m = captionRe.exec(html)) !== null) {
      tabs.push({ gid: null, title: m[1].trim() });
    }
    if (tabs.length) return tabs;
    var re2 = /"sheetId":(\d+)[^}]*"title":"((?:\\.|[^"\\])*)"/g;
    while ((m = re2.exec(html)) !== null) {
      var title = m[2].replace(/\\u([0-9a-fA-F]{4})/g, function (_, hex) {
        return String.fromCharCode(parseInt(hex, 16));
      });
      tabs.push({ gid: m[1], title: title });
    }
    if (tabs.length) return tabs;
    var re3 = /"gid":(\d+),"name":"((?:\\.|[^"\\])*)"/g;
    while ((m = re3.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: m[2] });
    }
    return tabs;
  }

  function sheetProbeSignature(values) {
    if (!values || !values.length) return "";
    var sample = values.slice(0, 3).map(function (row) {
      return (row || []).map(function (c) { return String(c || "").trim(); }).join(" ");
    }).join(" ");
    var m = sample.match(/\[(\d+반)\]/);
    return m ? m[1] : sample.slice(0, 80);
  }

  async function probeTabsByClassNames(spreadsheetId) {
    var probed = [];
    var seen = {};
    for (var i = 1; i <= 20; i++) {
      var title = i + "반";
      try {
        var values = await fetchSheetValuesGviz(spreadsheetId, { title: title });
        if (!values || !values.length) break;
        var sig = sheetProbeSignature(values);
        if (!sig || seen[sig]) break;
        seen[sig] = true;
        if (sig.indexOf("반") < 0 && probed.length) break;
        probed.push({ gid: null, title: title });
      } catch (err) {
        break;
      }
    }
    return probed;
  }

  async function probeTabsBySheetIndex(spreadsheetId) {
    var probed = [];
    var seen = {};
    for (var i = 1; i <= 20; i++) {
      try {
        var values = await fetchSheetValuesGviz(spreadsheetId, { title: "Sheet" + i });
        if (!values || !values.length) break;
        var sig = sheetProbeSignature(values);
        if (!sig || seen[sig]) break;
        seen[sig] = true;
        probed.push({ gid: null, title: "Sheet" + i });
      } catch (err) {
        break;
      }
    }
    return probed;
  }

  async function fetchSpreadsheetTabs(spreadsheetId) {
    var urls = [
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit?usp=sharing",
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit",
    ];
    for (var u = 0; u < urls.length; u++) {
      try {
        var res = await fetch(urls[u]);
        if (!res.ok) continue;
        var tabs = parseTabsFromHtml(await res.text());
        if (tabs.length) return tabs;
      } catch (err) { /* CORS or network */ }
    }
    var feedUrl = "https://spreadsheets.google.com/feeds/worksheets/" + spreadsheetId + "/public/full?alt=json";
    try {
      var feedRes = await fetch(feedUrl);
      if (feedRes.ok) {
        var feed = await feedRes.json();
        var entries = (feed && feed.feed && feed.feed.entry) || [];
        if (entries.length) {
          return entries.map(function (entry) {
            var gidMatch = String(entry.id || "").match(/gid=(\d+)/);
            return {
              gid: gidMatch ? gidMatch[1] : null,
              title: String(entry.title && entry.title.$t || entry.title || "시트").trim(),
            };
          });
        }
      }
    } catch (e) { /* feed unavailable */ }
    var classTabs = await probeTabsByClassNames(spreadsheetId);
    if (classTabs.length) return classTabs;
    var sheetTabs = await probeTabsBySheetIndex(spreadsheetId);
    if (sheetTabs.length) return sheetTabs;
    throw new Error("시트 탭을 찾을 수 없습니다. URL·공개 공유 설정을 확인하세요.");
  }

  function gvizTableToValues(json) {
    var table = json && json.table;
    if (!table || !table.rows || !table.rows.length) return [];
    var headers = (table.cols || []).map(function (c) { return String((c && c.label) || "").trim(); });
    var rows = table.rows.map(function (row) {
      return (row.c || []).map(function (cell) {
        if (cell == null) return "";
        if (cell.v != null) return String(cell.v);
        if (cell.f != null) return String(cell.f);
        return "";
      });
    });
    return [headers].concat(rows);
  }

  async function fetchSheetValuesGviz(spreadsheetId, tab) {
    var params = new URLSearchParams({ tqx: "out:json" });
    if (tab && tab.gid) params.set("gid", tab.gid);
    else if (tab && tab.title) params.set("sheet", tab.title);
    var url = "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/gviz/tq?" + params;
    var res = await fetch(url);
    if (!res.ok) throw new Error("공개 시트 조회 실패 (HTTP " + res.status + "). 시트가 '링크가 있는 모든 사용자'에게 공개되어 있는지 확인하세요.");
    return gvizTableToValues(parseGvizJson(await res.text()));
  }

  async function fetchAllSheetsGviz(spreadsheetId) {
    var tabs = await fetchSpreadsheetTabs(spreadsheetId);
    if (!tabs.length) tabs = [{ gid: null, title: null }];
    return Promise.all(tabs.map(async function (tab) {
      var values = await fetchSheetValuesGviz(spreadsheetId, tab);
      return {
        sheetName: tab.title || "시트1",
        gid: tab.gid,
        values: values,
        analysis: analyzeSheetData(values),
      };
    }));
  }

  var PROFILE_HEADER_PATTERN = /^(?:👤\s*)?\[\d+반\]\s*\[\d+\]\s*\[[^\]]+\]\s*학생\s*프로필\s*/i;
  var PROFILE_MARKERS_RE = /학생\s*프로필|💌|📚|📖|📝|영역별\s*\(|선생님께\s*전하는/;
  var SECTION_START_RE = /(?=(?:💌|📚|📖|📝|✏️|🎯)|영역별\s*\()/;
  var SUBJECT_START_RE = /(?=과목\s*\d+\s*\([^)]+\))/;
  var PROFILE_KEYWORD_THEMES = [
    { re: /국어|수학|영어|과학|사회|음악|체육|미술|역사|도덕|기술|정보/gi, label: "과목 언급" },
    { re: /자신감|불안|긴장|걱정/gi, label: "시험·정서" },
    { re: /친구|또래|관계/gi, label: "대인관계" },
    { re: /집중|복습|예습|필기/gi, label: "학습 습관" },
    { re: /선생님|감사|고맙/gi, label: "선생님·감사" }
  ];

  function escapeRegex(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function isMarkerOnlyTitle(title) {
    var t = String(title || "").trim();
    if (!t) return true;
    if (/^[\s💌📚📖📝✏️🎯⭐🔖•\-👤]+$/.test(t)) return true;
    if (/^👤\s*\[\d+반\]/.test(t)) return true;
    if (/학생\s*프로필\s*$/i.test(t) && t.length < 120) return true;
    return false;
  }

  function isMeaningfulSection(sec) {
    if (!sec) return false;
    if (sec.body && String(sec.body).trim()) return true;
    if (sec.fields && sec.fields.length) return true;
    return !isMarkerOnlyTitle(sec.title);
  }

  function hasProfileContent(text) {
    var s = String(text || "").trim();
    if (!s) return false;
    return PROFILE_PATTERN.test(s) || PROFILE_MARKERS_RE.test(s);
  }

  function longestCellText(cells) {
    var best = "";
    for (var i = 0; i < (cells || []).length; i++) {
      var c = String(cells[i] || "").trim();
      if (c.length > best.length) best = c;
    }
    return best;
  }

  function stripProfileHeader(text, meta) {
    var s = String(text || "").trim().replace(/^👤\s*/, "");
    if (meta && meta.반 != null && meta.번호 != null && meta.이름) {
      var classNum = String(meta.반).replace(/반$/, "");
      var specific = new RegExp(
        "^\\[?" + escapeRegex(classNum) + "반\\]?\\s*\\[?" + meta.번호 + "\\]?\\s*\\[?" + escapeRegex(meta.이름) + "\\]?\\s*학생\\s*프로필\\s*",
        "i"
      );
      s = s.replace(specific, "");
    }
    return s.replace(PROFILE_HEADER_PATTERN, "").trim();
  }

  function parseSectionFields(body) {
    var fields = [];
    var text = String(body || "").trim();
    if (!text) return fields;
    var re = /(?:^|[\n\r]|\s)-\s*([^:\n]+?)\s*:\s*([\s\S]*?)(?=(?:[\n\r]|\s)-\s*[^:]+:|$)/g;
    var m;
    while ((m = re.exec(text)) !== null) {
      var key = m[1].trim();
      var val = m[2].trim().replace(/\s+/g, " ");
      if (key && val) fields.push({ key: key, value: val });
    }
    if (!fields.length) {
      var inline = /-\s*([^:]+?)\s*:\s*([^-]+?)(?=\s*-\s*[^:]+:|$)/g;
      while ((m = inline.exec(text)) !== null) {
        fields.push({ key: m[1].trim(), value: m[2].trim() });
      }
    }
    return fields;
  }

  /** 과목 블록 제목에서 과목명만 추출 (예: 국어, 수학, 통합과학) */
  function simplifySectionTitle(title) {
    if (!title) return "응답";
    var t = String(title).trim();
    if (/💌|선생님께/.test(t)) return TEACHER_MESSAGE_TITLE;
    var subjectMatch = t.match(/과목\s*\d+\s*\(([^)]+)\)/);
    if (subjectMatch) return subjectMatch[1].trim();
    var lastParen = t.match(/\(([^)]+)\)\s*$/);
    if (lastParen) {
      var name = lastParen[1].trim();
      if (/^(국어|수학|영어|한국사|통합사회|통합과학|과학|사회|음악|체육|미술|역사|도덕|기술|정보)$/.test(name)) {
        return name;
      }
    }
    return t;
  }

  function parseTeacherSection(chunk) {
    var headerMatch = chunk.match(/^(💌[^\n"]*)/);
    var title = TEACHER_MESSAGE_TITLE;
    var quoteMatch = chunk.match(/[""]([^""]+)[""]/s) || chunk.match(/[""]([^""]+)[""]/);
    var body = quoteMatch ? quoteMatch[1].trim() : chunk.replace(/^💌[^\n]*\n?/, "").replace(title, "").trim();
    return { title: title, body: body, fields: [] };
  }

  function parseSubjectSections(chunk, parentTitle) {
    var sections = [];
    var parent = parentTitle || "";
    var parts = chunk.split(SUBJECT_START_RE).map(function (p) { return p.trim(); }).filter(Boolean);
    if (parts.length <= 1 && /과목\s*\d+\s*\(/.test(chunk)) parts = [chunk];
    for (var i = 0; i < parts.length; i++) {
      var part = parts[i];
      var subjMatch = part.match(/^(과목\s*\d+\s*\([^)]+\))/);
      if (!subjMatch) continue;
      var title = simplifySectionTitle(subjMatch[1].trim());
      var bodyStart = part.slice(subjMatch[0].length).trim();
      sections.push({ title: title, body: "", fields: parseSectionFields(bodyStart) });
    }
    return sections;
  }

  function parseSections(text, meta) {
    var body = stripProfileHeader(text, meta);
    if (!body) return [];
    body = body.replace(/^👤\s*/, "").trim();
    var sections = [];
    var chunks = body.split(SECTION_START_RE).map(function (c) { return c.trim(); }).filter(Boolean);
    var surveyParent = "";
    for (var ci = 0; ci < chunks.length; ci++) {
      var chunk = chunks[ci];
      if (/^💌/.test(chunk)) {
        sections.push(parseTeacherSection(chunk));
        continue;
      }
      if (/^📚|^영역별/.test(chunk)) {
        var parentMatch = chunk.match(/^((?:📚\s*)?영역별\s*\([^)]+\)\s*학습\s*설문[^\n]*)/)
          || chunk.match(/^(📚[^\n]+)/)
          || chunk.match(/^(영역별\s*\([^)]+\)[^\n]*)/);
        surveyParent = parentMatch ? parentMatch[1].trim() : chunk.split(/\n/)[0].trim();
        if (/과목\s*\d+\s*\(/.test(chunk)) {
          sections = sections.concat(parseSubjectSections(chunk, surveyParent));
        } else if (!SUBJECT_START_RE.test(chunk)) {
          var remainder = chunk.replace(surveyParent, "").trim();
          if (remainder && !isMarkerOnlyTitle(surveyParent)) {
            sections.push({ title: simplifySectionTitle(surveyParent), body: remainder, fields: [] });
          }
        }
        continue;
      }
      if (/^과목\s*\d+\s*\(/.test(chunk)) {
        sections = sections.concat(parseSubjectSections(chunk, surveyParent));
        continue;
      }
      var firstLine = chunk.split(/\n/)[0].trim();
      if (firstLine) {
        sections.push({
          title: simplifySectionTitle(firstLine),
          body: chunk.slice(firstLine.length).trim(),
          fields: parseSectionFields(chunk),
        });
      }
    }
    return sections.filter(isMeaningfulSection);
  }

  function parseProfileCategories(text, meta) {
    return parseSections(text, meta);
  }

  function rowHasSections(row) {
    return !!(row && row.sections && row.sections.length);
  }

  function enrichRowWithProfile(row, profileText, meta) {
    if (!hasProfileContent(profileText)) return row;
    var m = meta || extractProfileMeta(profileText);
    row.sections = parseSections(profileText, m);
    if (m) {
      if (!row.반 || row.반 === "(미입력)") row.반 = m.반;
      if (row.번호 == null) row.번호 = m.번호;
      if (!row.이름) row.이름 = m.이름;
    }
    row._raw = row._raw || {};
    row._raw.프로필 = profileText;
    return row;
  }

  function extractCommonThemes(rows) {
    var categoryFill = {};
    var keywordHits = {};
    for (var ri = 0; ri < rows.length; ri++) {
      var row = rows[ri];
      var sections = row.sections || parseSections((row._raw && row._raw.프로필) || "", null);
      for (var si = 0; si < sections.length; si++) {
        var title = sections[si].title;
        if (!title || /^[\s💌📚📖📝✏️🎯⭐🔖•\-]+$/.test(title)) continue;
        categoryFill[title] = (categoryFill[title] || 0) + 1;
      }
      var corpus = sections.map(function (s) {
        return (s.body || "") + " " + (s.fields || []).map(function (f) { return f.value; }).join(" ");
      }).join(" ");
      for (var ti = 0; ti < PROFILE_KEYWORD_THEMES.length; ti++) {
        var theme = PROFILE_KEYWORD_THEMES[ti];
        var matches = corpus.match(theme.re);
        if (matches && matches.length) {
          keywordHits[theme.label] = (keywordHits[theme.label] || 0) + matches.length;
        }
      }
    }
    var themes = [];
    for (var ckey in categoryFill) {
      themes.push({ 주제: ckey, 언급수: categoryFill[ckey], 유형: "category" });
    }
    for (var kkey in keywordHits) {
      themes.push({ 주제: kkey, 언급수: keywordHits[kkey], 유형: "keyword" });
    }
    themes.sort(function (a, b) { return b.언급수 - a.언급수; });
    return themes.slice(0, 10);
  }

  function extractProfileMeta(text) {
    const match = String(text || "").match(PROFILE_PATTERN);
    if (!match) return null;
    return { 반: match[1] + "반", 번호: Number(match[2]), 이름: match[3].trim() };
  }

  function isProfileSheetFormat(rawValues) {
    if (!rawValues || !rawValues.length) return false;
    var sampleRows = rawValues.slice(0, Math.min(8, rawValues.length));
    var hits = 0, checked = 0;
    for (var i = 0; i < sampleRows.length; i++) {
      var cells = sampleRows[i] || [];
      var joined = cells.map(function (c) { return String(c || "").trim(); }).join(" ");
      var longest = longestCellText(cells);
      var text = longest.length > joined.length * 0.55 ? longest : joined;
      if (!text) continue;
      checked += 1;
      if (hasProfileContent(text)) hits += 1;
    }
    return checked > 0 && hits >= Math.ceil(checked / 2);
  }

  function normalizeProfileSheet(rawValues) {
    var dataRows = rawValues.filter(function (row) {
      return row && row.some(function (cell) { return String(cell || "").trim() !== ""; });
    });
    var rows = dataRows.map(function (raw, rowIndex) {
      var text = longestCellText(raw.map(function (c) { return String(c || "").trim(); }));
      if (!text) text = raw.map(function (c) { return String(c || "").trim(); }).join("\n").trim();
      var meta = extractProfileMeta(text);
      if (!meta && !hasProfileContent(text)) return null;
      if (!meta) meta = { 반: "(미입력)", 번호: rowIndex + 1, 이름: "" };
      var sections = parseSections(text, meta);
      return {
        id: rowIndex + 1,
        반: meta.반,
        번호: meta.번호,
        이름: meta.이름,
        sections: sections,
        _raw: { 이름: meta.이름, 프로필: text, 본문: stripProfileHeader(text, meta) },
        완료: true,
      };
    }).filter(Boolean);
    rows.sort(function (a, b) {
      var c = String(a.반).localeCompare(String(b.반), "ko");
      if (c !== 0) return c;
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return {
      headers: ["반", "번호", "이름"],
      rows: rows,
      meta: { classColumn: "반", numberColumn: "번호", completionColumn: "(프로필 제출)", format: "profile" },
    };
  }

  function normalizeHeader(cell) {
    return String(cell || "").trim().toLowerCase().replace(/\s+/g, "");
  }

  function findColumnIndex(headers, aliases) {
    var normalized = headers.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (normalized[i] === key || normalized[i].indexOf(key) >= 0) return i;
      }
    }
    return -1;
  }

  function findColumnIndexExact(headers, aliases) {
    var normalized = headers.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (normalized[i] === key) return i;
      }
    }
    return -1;
  }

  function looksLikePersonName(value) {
    var t = coerceText(value);
    if (!t || t.length < 2 || t.length > 20) return false;
    if (/^\d+([.,]\d+)?$/.test(t)) return false;
    if (/[@./:\\]|https?:|^\d{4}[-/]/.test(t)) return false;
    return /[가-힣a-zA-Z]/.test(t);
  }

  function inferRosterNameColumnIndex(headerRow, dataRows, excludeIndices) {
    var exclude = {};
    (excludeIndices || []).forEach(function (i) {
      if (i >= 0) exclude[i] = true;
    });
    var exact = findColumnIndexExact(headerRow, ROSTER_NAME_ALIASES);
    if (exact >= 0 && !exclude[exact]) return exact;

    var sample = (dataRows || []).slice(0, 20);
    var bestIdx = -1;
    var bestScore = 0;
    for (var col = 0; col < headerRow.length; col++) {
      if (exclude[col]) continue;
      var score = 0;
      for (var r = 0; r < sample.length; r++) {
        if (looksLikePersonName(sample[r][col])) score += 1;
      }
      if (score > bestScore) {
        bestScore = score;
        bestIdx = col;
      }
    }
    return bestScore >= 2 ? bestIdx : -1;
  }

  function rosterEntriesForSheet(roster, sheetName) {
    if (!roster || !roster.length) return [];
    var filtered = rosterForSheet(roster, sheetName);
    var byNumber = {};
    filtered.forEach(function (entry) {
      if (entry.번호 == null || entry.번호 <= 0) return;
      var num = Number(entry.번호);
      var prev = byNumber[num];
      if (!prev) {
        byNumber[num] = {
          반: entry.반 || "",
          번호: num,
          이름: coerceText(entry.이름),
        };
        return;
      }
      if (!prev.이름 && entry.이름) prev.이름 = coerceText(entry.이름);
      if (!prev.반 && entry.반) prev.반 = entry.반;
    });
    return Object.keys(byNumber)
      .map(function (k) {
        return byNumber[k];
      })
      .sort(function (a, b) {
        return a.번호 - b.번호;
      });
  }

  function coerceNumber(value) {
    if (value === null || value === undefined || value === "") return null;
    var n = Number(String(value).replace(/[^\d.-]/g, ""));
    return Number.isFinite(n) ? n : null;
  }

  function coerceText(value) {
    if (value === null || value === undefined) return "";
    return String(value).trim();
  }

  function isCompletedValue(value) {
    var v = coerceText(value).toLowerCase();
    if (!v) return false;
    var done = ["y", "yes", "true", "1", "o", "완료", "제출", "응답완료", "done", "complete", "completed", "✓", "v"];
    if (done.indexOf(v) >= 0) return true;
    return v.indexOf("완료") >= 0 || v.indexOf("제출") >= 0;
  }

  function inferCompletionFromRow(cells, skipIndices) {
    var skip = {};
    for (var i = 0; i < skipIndices.length; i++) skip[skipIndices[i]] = true;
    for (var j = 0; j < cells.length; j++) {
      if (!skip[j] && isCompletedValue(cells[j])) return cells[j];
    }
    return "";
  }

  function pickContentPreview(headers, cells) {
    var contentIdx = findColumnIndex(headers, CONTENT_ALIASES);
    if (contentIdx >= 0) {
      var text = cells[contentIdx];
      return text.length > 120 ? text.slice(0, 120) + "…" : text;
    }
    var sorted = cells.filter(function (c) { return c.length > 8; }).sort(function (a, b) { return b.length - a.length; });
    var longest = sorted[0];
    if (!longest) return "";
    return longest.length > 120 ? longest.slice(0, 120) + "…" : longest;
  }

  function emptyAnalysis() {
    return {
      summary: { 총응답: 0, 완료건수: 0, 완료율: 0, 학급수: 0, 번호입력: 0, 이름입력: 0, 반미입력: 0 },
      byClass: [], columnInsights: [], themes: [], headers: [], rows: [], meta: { format: "empty" },
    };
  }

  function buildColumnInsights(headers, rows) {
    if (!headers || !headers.length || !rows.length) return [];
    return headers.map(function (name, colIdx) {
      var filled = rows.filter(function (r) {
        var val = Object.values(r._raw || {})[colIdx];
        return coerceText(val) !== "";
      }).length;
      var isContent = CONTENT_ALIASES.some(function (a) {
        return normalizeHeader(name).indexOf(normalizeHeader(a)) >= 0;
      });
      return {
        열: name || "열" + (colIdx + 1),
        입력건수: filled,
        입력률: rows.length ? Math.round((filled / rows.length) * 1000) / 10 : 0,
        상담내용열: isContent,
      };
    }).filter(function (c) { return c.입력건수 > 0; })
      .sort(function (a, b) { return b.입력건수 - a.입력건수; })
      .slice(0, 8);
  }

  function detectThemes(rows) {
    var corpus = rows.map(function (r) {
      return Object.values(r._raw || {}).join(" ");
    }).join(" ").toLowerCase();
    var hits = THEME_KEYWORDS.map(function (t) {
      var regex = new RegExp(t.key, "gi");
      var count = (corpus.match(regex) || []).length;
      return { 주제: t.label, 언급수: count };
    }).filter(function (t) { return t.언급수 > 0; });
    hits.sort(function (a, b) { return b.언급수 - a.언급수; });
    return hits.slice(0, 6);
  }

  function buildAnalysisPayload(headers, rows, meta) {
    var grouped = groupBy(rows, function (r) { return r.반; });
    var total = rows.length;
    var completed = sumBy(rows, function (r) { return r.완료 ? 1 : 0; });
    var withNumber = rows.filter(function (r) { return r.번호 !== null; }).length;
    var withName = rows.filter(function (r) { return r.이름; }).length;
    var missingClass = rows.filter(function (r) { return r.반 === "(미입력)"; }).length;

    var byClass = Object.keys(grouped).map(function (className) {
      var classRows = grouped[className];
      var classTotal = classRows.length;
      var classCompleted = sumBy(classRows, function (r) { return r.완료 ? 1 : 0; });
      return {
        반: className,
        인원: classTotal,
        완료: classCompleted,
        완료율: classTotal ? Math.round((classCompleted / classTotal) * 1000) / 10 : 0,
      };
    }).sort(function (a, b) { return String(a.반).localeCompare(String(b.반), "ko"); });

    return {
      summary: {
        총응답: total,
        완료건수: completed,
        완료율: total ? Math.round((completed / total) * 1000) / 10 : 0,
        학급수: Object.keys(grouped).length,
        번호입력: withNumber,
        이름입력: withName,
        반미입력: missingClass,
      },
      byClass: byClass,
      columnInsights: buildColumnInsights(headers, rows),
      themes: detectThemes(rows),
      commonThemes: (meta.format === "profile" || rows.some(rowHasSections)) ? extractCommonThemes(rows) : [],
      headers: headers,
      rows: rows,
      meta: Object.assign({}, meta, { totalRows: total, classCount: Object.keys(grouped).length }),
    };
  }

  function analyzeSheetData(rawValues) {
    if (!rawValues || !rawValues.length) return emptyAnalysis();

    if (isProfileSheetFormat(rawValues)) {
      var profile = normalizeProfileSheet(rawValues);
      return buildAnalysisPayload(profile.headers, profile.rows, Object.assign({}, profile.meta, { format: "profile" }));
    }

    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row.some(function (cell) { return coerceText(cell) !== ""; });
    });

    var classIdx = findColumnIndex(headerRow, CLASS_ALIASES);
    var numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    var nameIdx = findColumnIndex(headerRow, NAME_ALIASES);
    var completionIdx = findColumnIndex(headerRow, COMPLETION_ALIASES);
    if (classIdx < 0 && headerRow.length > 0) classIdx = 0;
    if (numberIdx < 0 && headerRow.length > 1) numberIdx = 1;

    var rows = dataRows.map(function (raw, rowIndex) {
      var cells = headerRow.map(function (_, i) { return coerceText(raw[i]); });
      var classVal = coerceText(raw[classIdx]);
      var numberVal = coerceNumber(raw[numberIdx]);
      var nameVal = nameIdx >= 0 ? coerceText(raw[nameIdx]) : "";
      var skipCols = [classIdx, numberIdx, nameIdx].filter(function (i) { return i >= 0; });
      var completionRaw = completionIdx >= 0 ? raw[completionIdx] : inferCompletionFromRow(cells, skipCols);
      var row = {
        id: rowIndex + 1,
        반: classVal || "(미입력)",
        번호: numberVal,
        이름: nameVal,
        완료: isCompletedValue(completionRaw),
        미리보기: pickContentPreview(headerRow, cells),
        _raw: Object.fromEntries(headerRow.map(function (h, i) { return [h || "col_" + i, cells[i]]; })),
      };
      var profileText = longestCellText(cells);
      return enrichRowWithProfile(row, profileText, extractProfileMeta(profileText));
    });

    return buildAnalysisPayload(headerRow, rows, {
      classColumn: headerRow[classIdx] || "반",
      numberColumn: headerRow[numberIdx] || "번호",
      nameColumn: nameIdx >= 0 ? headerRow[nameIdx] : null,
      completionColumn: completionIdx >= 0 ? headerRow[completionIdx] : "(자동 추론)",
      format: "table",
    });
  }

  function normalizeTabTitle(title) {
    return String(title || "").trim().toLowerCase().replace(/\s+/g, "");
  }

  function isListSheetTab(title) {
    var n = normalizeTabTitle(title);
    return n === "list" || n === "명단" || n === "학생명단" || n === "studentlist";
  }

  function normalizeSheetClassKey(value) {
    var t = String(value || "").trim();
    if (!t) return "";
    var m = t.match(/(\d+)\s*반/);
    if (m) return m[1] + "반";
    return t.toLowerCase().replace(/\s+/g, "");
  }

  function isMatrixClassRoster(rawValues) {
    if (!rawValues || !rawValues.length) return false;
    var headerRow = rawValues[0].map(coerceText);
    var classCols = 0;
    headerRow.forEach(function (h) {
      if (/^\d+\s*반$/.test(String(h || "").trim())) classCols += 1;
    });
    return classCols >= 2;
  }

  function parseMatrixClassRoster(rawValues) {
    if (!rawValues || !rawValues.length) return [];
    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });
    var numberIdx = findColumnIndexExact(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = 0;

    var classColumns = [];
    headerRow.forEach(function (h, idx) {
      if (idx === numberIdx) return;
      var m = String(h || "").trim().match(/^(\d+)\s*반$/);
      if (m) classColumns.push({ idx: idx, 반: m[1] + "반" });
    });
    if (!classColumns.length) return [];

    var roster = [];
    dataRows.forEach(function (raw, rowIndex) {
      var numberVal = numberIdx >= 0 ? coerceNumber(raw[numberIdx]) : null;
      if (numberVal == null) numberVal = rowIndex + 1;
      classColumns.forEach(function (col) {
        var nameVal = coerceText(raw[col.idx]);
        if (!nameVal) return;
        roster.push({ 반: col.반, 번호: numberVal, 이름: nameVal });
      });
    });
    roster.sort(function (a, b) {
      var classCmp = String(a.반).localeCompare(String(b.반), "ko");
      if (classCmp !== 0) return classCmp;
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return roster;
  }

  async function fetchClassRosterFromMaster() {
    var probeTitles = ["1반", "명단", "list"];
    for (var i = 0; i < probeTitles.length; i++) {
      try {
        var values = await fetchSheetValuesGviz(CLASS_ROSTER_SPREADSHEET_ID, { title: probeTitles[i] });
        if (isMatrixClassRoster(values)) return parseMatrixClassRoster(values);
      } catch (err) { /* try next tab */ }
    }
    try {
      var tabs = await fetchSpreadsheetTabs(CLASS_ROSTER_SPREADSHEET_ID);
      if (tabs.length) {
        var values = await fetchSheetValuesGviz(CLASS_ROSTER_SPREADSHEET_ID, tabs[0]);
        if (isMatrixClassRoster(values)) return parseMatrixClassRoster(values);
      }
    } catch (err) { /* master roster unavailable */ }
    return [];
  }

  function parseListRoster(rawValues) {
    if (!rawValues || !rawValues.length) return [];
    if (isMatrixClassRoster(rawValues)) return parseMatrixClassRoster(rawValues);
    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });
    var classIdx = findColumnIndexExact(headerRow, CLASS_ALIASES);
    if (classIdx < 0) classIdx = findColumnIndex(headerRow, CLASS_ALIASES);
    var numberIdx = findColumnIndexExact(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0 && headerRow.length > 0) numberIdx = 0;
    var nameIdx = inferRosterNameColumnIndex(headerRow, dataRows, [classIdx, numberIdx]);

    var roster = [];
    dataRows.forEach(function (raw, rowIndex) {
      var classVal = classIdx >= 0 ? coerceText(raw[classIdx]) : "";
      var numberVal = numberIdx >= 0 ? coerceNumber(raw[numberIdx]) : null;
      var nameVal = nameIdx >= 0 ? coerceText(raw[nameIdx]) : "";
      if (numberVal == null && !nameVal) return;
      if (numberVal == null) numberVal = rowIndex + 1;
      roster.push({ 반: classVal, 번호: numberVal, 이름: nameVal });
    });
    roster.sort(function (a, b) {
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return roster;
  }

  function rosterForSheet(roster, sheetName) {
    if (!roster || !roster.length) return [];
    var hasClass = roster.some(function (r) { return r.반; });
    if (!hasClass) return roster.slice();
    var sheetKey = normalizeSheetClassKey(sheetName);
    if (!sheetKey) return roster.slice();
    var filtered = roster.filter(function (r) {
      var classKey = normalizeSheetClassKey(r.반);
      return classKey === sheetKey || classKey.indexOf(sheetKey) >= 0 || sheetKey.indexOf(classKey) >= 0;
    });
    return filtered.length ? filtered : roster.slice();
  }

  function computeParticipationMeta(sheetAnalyses) {
    if (!sheetAnalyses || !sheetAnalyses.length) {
      return { maxExpected: 0, referenceSheetName: "", rosterSource: "responses" };
    }
    var ref = { name: sheetAnalyses[0].sheetName, count: sheetAnalyses[0].summary.총응답 || 0 };
    for (var i = 1; i < sheetAnalyses.length; i++) {
      var c = sheetAnalyses[i].summary.총응답 || 0;
      if (c > ref.count) ref = { name: sheetAnalyses[i].sheetName, count: c };
    }
    return {
      maxExpected: ref.count,
      referenceSheetName: ref.name,
      rosterSource: "responses",
      roster: [],
    };
  }

  function computeSheetParticipation(rows, rosterOrMax, referenceSheetName, rosterSource, sheetName) {
    if (Array.isArray(rosterOrMax) && rosterOrMax.length) {
      var rosterSlice = sheetName
        ? rosterEntriesForSheet(rosterOrMax, sheetName)
        : rosterOrMax.slice();
      var present = {};
      (rows || []).forEach(function (r) {
        if (r.번호 != null && r.번호 > 0) present[Number(r.번호)] = true;
      });
      var missingStudents = rosterSlice.filter(function (entry) {
        return entry.번호 != null && !present[Number(entry.번호)];
      });
      return {
        referenceSheetName: referenceSheetName || "list",
        rosterSource: rosterSource || "list",
        maxExpected: rosterSlice.length,
        participated: rosterSlice.length - missingStudents.length,
        missingNumbers: missingStudents.map(function (s) { return s.번호; }),
        missingStudents: missingStudents,
        missingCount: missingStudents.length,
      };
    }

    var maxExpected = typeof rosterOrMax === "number" ? rosterOrMax : 0;
    if (!maxExpected) {
      return {
        referenceSheetName: referenceSheetName || "",
        rosterSource: rosterSource || "responses",
        maxExpected: 0,
        participated: 0,
        missingNumbers: [],
        missingStudents: [],
        missingCount: 0,
      };
    }
    var presentNums = {};
    (rows || []).forEach(function (r) {
      if (r.번호 != null && r.번호 > 0) presentNums[r.번호] = true;
    });
    var missing = [];
    for (var n = 1; n <= maxExpected; n++) {
      if (!presentNums[n]) missing.push(n);
    }
    return {
      referenceSheetName: referenceSheetName,
      rosterSource: rosterSource || "responses",
      maxExpected: maxExpected,
      participated: maxExpected - missing.length,
      missingNumbers: missing,
      missingStudents: missing.map(function (num) { return { 번호: num, 이름: "" }; }),
      missingCount: missing.length,
    };
  }

  function analyzeAllSheets(sheetInputs, externalRoster) {
    var listInput = null;
    var responseInputs = [];
    (sheetInputs || []).forEach(function (item) {
      if (isListSheetTab(item.sheetName)) listInput = item;
      else responseInputs.push(item);
    });
    var fullRoster =
      externalRoster && externalRoster.length
        ? externalRoster
        : listInput
          ? parseListRoster(listInput.values)
          : [];
    var rosterSource =
      externalRoster && externalRoster.length
        ? "master-roster"
        : listInput
          ? "list"
          : "responses";

    var sheetAnalyses = responseInputs.map(function (item) {
      var analysis = analyzeSheetData(item.values);
      analysis.meta = Object.assign({}, analysis.meta, { sheetName: item.sheetName });
      return Object.assign({ sheetName: item.sheetName }, analysis);
    });

    var partMeta = fullRoster.length
      ? {
          maxExpected: fullRoster.length,
          referenceSheetName:
            rosterSource === "master-roster"
              ? "명렬표"
              : listInput
                ? listInput.sheetName
                : "",
          rosterSource: rosterSource,
          roster: fullRoster,
          listTabName: listInput ? listInput.sheetName : null,
        }
      : computeParticipationMeta(sheetAnalyses);

    if (fullRoster.length) {
      partMeta.maxExpected = Math.max.apply(
        null,
        sheetAnalyses.map(function (sheet) {
          return rosterEntriesForSheet(fullRoster, sheet.sheetName).length;
        }).concat([0])
      );
    }

    sheetAnalyses.forEach(function (sheet) {
      if (fullRoster.length) {
        sheet.participation = computeSheetParticipation(
          sheet.rows,
          fullRoster,
          partMeta.referenceSheetName,
          rosterSource,
          sheet.sheetName
        );
      } else {
        sheet.participation = computeSheetParticipation(
          sheet.rows,
          partMeta.maxExpected,
          partMeta.referenceSheetName,
          partMeta.rosterSource,
          sheet.sheetName
        );
      }
    });
    var allRows = [];
    sheetAnalyses.forEach(function (sheet) {
      sheet.rows.forEach(function (row) {
        allRows.push(Object.assign({}, row, { 시트: sheet.sheetName }));
      });
    });
    var combined = buildAnalysisPayload(
      sheetAnalyses[0] && sheetAnalyses[0].headers ? sheetAnalyses[0].headers : [],
      allRows,
      { format: "multi", sheetCount: sheetAnalyses.length, sheetNames: sheetAnalyses.map(function (s) { return s.sheetName; }) }
    );
    return {
      sheets: sheetAnalyses,
      combined: combined,
      participationMeta: partMeta,
      sheetsMeta: {
        total: sheetAnalyses.length,
        listTab: listInput
          ? { name: listInput.sheetName, rosterCount: fullRoster.length }
          : null,
        recognized: sheetAnalyses.filter(function (s) { return s.summary.총응답 > 0; }).length,
        names: sheetAnalyses.map(function (s) { return s.sheetName; }),
        perSheet: sheetAnalyses.map(function (s) {
          return { name: s.sheetName, rows: s.summary.총응답 };
        }),
      },
    };
  }

    document.getElementById("results").classList.remove("visible");
    document.getElementById("results").innerHTML = "";

    try {
      var id = parseSpreadsheetId(entry.url);
      var sheetInputs = await fetchAllSheetsGviz(id);
      var masterRoster = await fetchClassRosterFromMaster();
      var hasData = sheetInputs.some(function (s) {

      if (!hasData) throw new Error("시트에 데이터가 없습니다. 공개 공유 설정을 확인하세요.");
      sheetsData[id] = sheetInputs;

      (!activeSubjectView || activeSubjectView === "all")
    ) {
      var missingList =
        data.participation.missingStudents && data.participation.missingStudents.length
          ? data.participation.missingStudents
          : data.participation.missingNumbers.map(function (num) {
              return { 번호: num, 이름: "" };
            });
      missingList.forEach(function (student) {
        html += renderAbsentStudentCard(sheetLabel, student);
      });
    }
    html += "</div>";
    if (!list.length && !(data.participation && data.participation.missingNumbers.length)) {
      return "";
    }
    return html;
  }

  var scrollStudentObserver = null;
  var scrollStudentRatioMap = null;

  function updateViewTracker(card) {
    var panel = document.getElementById("viewTracker");
    var classEl = document.getElementById("viewTrackerClass");
    var numEl = document.getElementById("viewTrackerNum");
    var nameEl = document.getElementById("viewTrackerName");
    var statusEl = document.getElementById("viewTrackerStatus");
    if (!panel || !classEl || !numEl || !nameEl) return;
    if (!card) {
      panel.hidden = true;
      classEl.textContent = "—";
      numEl.textContent = "—";
      nameEl.textContent = "—";
      if (statusEl) statusEl.hidden = true;
      return;
    }
    var cls = card.getAttribute("data-student-class") || activeSheetView || "";
    var num = card.getAttribute("data-student-num");
    var name = card.getAttribute("data-student-name") || "";
    panel.hidden = false;
    classEl.textContent = cls || "—";
    numEl.textContent = num ? num + "번" : "—";
    nameEl.textContent = name || "—";
    if (statusEl) {
      statusEl.hidden = !card.classList.contains("student-card--absent");
    }
  }

  function teardownScrollStudentTracker() {
    if (scrollStudentObserver) {
      scrollStudentObserver.disconnect();
      scrollStudentObserver = null;
    }
    scrollStudentRatioMap = null;
    updateViewTracker(null);
  }

  function setupScrollStudentTracker() {
    teardownScrollStudentTracker();
    var results = document.getElementById("results");
    if (!results || !results.classList.contains("visible")) return;
    var cards = results.querySelectorAll(".student-card[data-student-num], .student-card[data-student-name]");
    if (!cards.length) return;

    scrollStudentRatioMap = new Map();
    var thresholds = [];
    for (var t = 0; t <= 20; t++) thresholds.push(t / 20);

    function pickCurrentCard() {
      var best = null;
      var bestRatio = 0;
      cards.forEach(function (card) {
        var ratio = scrollStudentRatioMap.get(card) || 0;
        if (ratio > bestRatio) {
          bestRatio = ratio;
          best = card;
        }
      });
      if (best && bestRatio > 0) {
        updateViewTracker(best);
      }
    }

    scrollStudentObserver = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          scrollStudentRatioMap.set(entry.target, entry.intersectionRatio);
        });
        pickCurrentCard();
      },
      { root: null, rootMargin: "-12% 0px -50% 0px", threshold: thresholds }
    );

    cards.forEach(function (card) {
      scrollStudentRatioMap.set(card, 0);
      scrollStudentObserver.observe(card);
    });
    updateViewTracker(cards[0]);
  }

  function setFabStackVisible(show) {
    var fab = document.getElementById("fabStack");
    if (fab) fab.hidden = !show;
  }

  function showResultsView() {
    var homePanel = document.getElementById("homePanel");
    if (homePanel) homePanel.hidden = true;
    updateViewTracker(null);
  }

  function showHomeView() {
    var homePanel = document.getElementById("homePanel");
    var results = document.getElementById("results");
    activeSheetView = null;
    activeSubjectView = null;
    if (homePanel) homePanel.hidden = false;
    if (results) {
      results.classList.remove("visible");
      results.innerHTML = "";
    }
    teardownScrollStudentTracker();
    setFabStackVisible(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderResults(data, spreadsheetId, multi) {
    var el = document.getElementById("results");
    var analysis = data || getActiveAnalysis();
    showResultsView();
    setFabStackVisible(true);

    var html = "";
    if (multi) {
      html += renderSheetTabs();
    } else {
      html += renderSubjectTabsOnly();
    }
    if (!analysis) {
      html += '<p class="student-cards-empty">선생님! 항목을 선택해 주세요!</p>';
      el.innerHTML = html;
      el.classList.add("visible");
      teardownScrollStudentTracker();
      bindSheetAndSubjectTabs(el, spreadsheetId);
      return;
    }

    var s = analysis.summary;
    if (!s.총응답 && !(analysis.participation && analysis.participation.missingCount)) {
      html += '<p class="student-cards-empty">이 탭에 분석할 데이터가 없습니다.</p>';
      el.innerHTML = html;
      el.classList.add("visible");
      teardownScrollStudentTracker();
      bindSheetAndSubjectTabs(el, spreadsheetId);
      return;
    }

    html += renderStudentCards(analysis);

    el.innerHTML = html;
    el.classList.add("visible");

    bindSheetAndSubjectTabs(el, spreadsheetId);
  }

  function bindSheetAndSubjectTabs(el, spreadsheetId) {
    el.querySelectorAll(".sheet-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        activeSheetView = btn.getAttribute("data-sheet");
        renderResults(getActiveAnalysis(), spreadsheetId, lastMultiResult);
      });
    });
    el.querySelectorAll(".subject-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        activeSubjectView = btn.getAttribute("data-subject") || "all";
        renderResults(getActiveAnalysis(), spreadsheetId, lastMultiResult);
      });
    });
  }

  var THEME_STORAGE_KEY = "school-theme-v1";

  function applyTheme(theme) {
    var isDark = theme === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
    localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
    var toggle = document.getElementById("themeToggle");
    if (toggle) {
      toggle.setAttribute("aria-label", isDark ? "라이트 모드" : "다크 모드");
      toggle.title = isDark ? "라이트 모드" : "다크 모드";
    }
  }

  function initTheme() {
    var saved = localStorage.getItem(THEME_STORAGE_KEY);
    if (saved === "dark" || saved === "light") {
      applyTheme(saved);
      return;
    }
    applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  }

  initTheme();
  document.getElementById("themeToggle").addEventListener("click", function () {
    var isDark = document.documentElement.getAttribute("data-theme") === "dark";
    applyTheme(isDark ? "light" : "dark");
  });

  renderSheetButtonGrid();
  updateAdminUi();

  document.getElementById("headerHomeBtn").addEventListener("click", function () {
    showHomeView();
  });

  document.getElementById("adminEntryBtn").addEventListener("click", function () {
    if (isAdminSession()) {
      updateAdminUi();
      document.getElementById("adminPanel").scrollIntoView({ behavior: "smooth", block: "nearest" });
      return;
    }
    showAdminLogin();
  });

  document.getElementById("homeAdminLoginBtn").addEventListener("click", function () {
    var input = document.getElementById("homeAdminPasswordInput");
    tryAdminLogin(input ? input.value : "");
  });

  document.getElementById("homeAdminPasswordInput").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      tryAdminLogin(e.target.value);
    }
  });

  document.getElementById("adminLogoutBtn").addEventListener("click", function () {
    setAdminSession(false);
    updateAdminUi();
    showAdminLogin();
  });

  document.getElementById("adminSheetForm").addEventListener("submit", function (e) {
    e.preventDefault();
    if (!isAdminSession()) {
      alert("관리자 로그인이 필요합니다.");
      return;
    }
    var label = coerceText(document.getElementById("adminSheetLabel").value);
    var url = coerceText(document.getElementById("adminSheetUrl").value);
    var tab = coerceText(document.getElementById("adminSheetTab").value);
    var newPassword = coerceText(document.getElementById("adminNewPassword").value);
    if (!label || !url) {
      alert("시트 이름과 주소를 입력해 주세요.");
      return;
    }
    try {
      parseSpreadsheetId(url);
    } catch (err) {
      alert(err.message || "구글 시트 주소 형식을 확인해 주세요.");
      return;
    }
    var registry = loadSheetRegistry();
    registry.push({
      id: "sheet-" + Date.now(),
      label: label,
      url: url,
      tab: tab || null,
    });
    saveSheetRegistry(registry);
    document.getElementById("adminSheetForm").reset();
    if (newPassword) setAdminPassword(newPassword);
    renderSheetButtonGrid();
    renderAdminRegistryList();
    alert("시트가 추가되었습니다.");
  });

  document.getElementById("fabTop").addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  document.getElementById("fabBottom").addEventListener("click", function () {
    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
  });
  document.getElementById("fabPrint").addEventListener("click", function () {
    var results = document.getElementById("results");
    if (!results.classList.contains("visible")) {
      alert("먼저 시트를 조회한 뒤 인쇄해 주세요.");
      return;
    }
    window.print();
  });

})();
  </script>
</body>
</html>
