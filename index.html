    .school-logo-link {

    .theme-toggle:hover {

    .theme-toggle svg {

      height: 20px;
      display: block;

    html[data-theme="dark"] .theme-toggle .theme-icon-moon,
    html:not([data-theme="dark"]) .theme-toggle .theme-icon-sun { display: none; }
    .app-layout {
      flex: 1 0 auto;
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;

      flex-direction: column;
      gap: var(--space-5);
    }
    .app-main { width: 100%; margin: 0; padding: 0; }
    #homePanel[hidden] { display: none !important; }

      border: 1px solid var(--theme-border);
      box-shadow: var(--shadow-md);

    .panel-section:last-child { border-bottom: none; }
    .section-label {
      display: flex;

      gap: 10px;

      font-weight: 700;
      line-height: 1.35;
      color: var(--theme-heading);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-4);
    }
    .section-label::before {
      content: "";
      flex-shrink: 0;
      align-self: center;
      width: 3px;
      height: 1em;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--school-accent) 0%, var(--school-navy-light) 100%);

    .section-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);

    .section-head-row .section-label { margin-bottom: 0; }
    .query-card {
      background: var(--theme-query-card-bg);

      font-weight: 700;
      color: var(--theme-heading);
      margin-bottom: var(--space-3);
    }

      font-size: var(--text-sm);
      color: var(--theme-text-muted);
      margin: -4px 0 var(--space-4);
      line-height: 1.5;
    }
    .sheet-btn-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
      width: 100%;
    }
    .sheet-launch-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      box-sizing: border-box;
      min-height: 3.25rem;
      padding: 14px 18px;
      border: 1px solid var(--theme-border-light);
      border-left: 3px solid var(--border-accent);
      border-radius: var(--radius-md);
      background: var(--theme-bg-panel);
      color: var(--theme-heading-strong);
      font-family: inherit;
      font-size: 1.0625rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      cursor: pointer;
      box-shadow: var(--shadow-xs);
      transition: transform 0.2s var(--ease), border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s var(--ease);
    }
    .sheet-launch-btn:hover:not(:disabled) {
      border-color: var(--border-accent);
      background: var(--theme-query-card-hover);
      box-shadow: var(--shadow-sm), var(--focus-ring);
      transform: translateY(-1px);
    }
    .sheet-launch-btn:active:not(:disabled) { transform: translateY(0); }
    .sheet-launch-btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    .sheet-launch-btn.is-loading {
      cursor: wait;
      border-color: var(--border-accent);
    }
    .sheet-launch-btn.is-loading .sheet-launch-btn__label {
      color: var(--theme-heading-accent);
      font-weight: 800;
    }
    .sheet-launch-btn.is-loading .sheet-launch-btn__date {
      display: none;
    }
    .sheet-launch-btn__progress {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(
        90deg,
        rgba(196, 160, 53, 0.28) 0%,
        rgba(61, 107, 158, 0.32) 100%
      );
      transition: width 0.12s ease-out;
    }
    html[data-theme="dark"] .sheet-launch-btn__progress {
      background: linear-gradient(
        90deg,
        rgba(196, 160, 53, 0.22) 0%,
        rgba(96, 165, 250, 0.26) 100%
      );
    }
    .sheet-launch-btn__track {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 5px;
      z-index: 2;
      pointer-events: none;
      background: rgba(15, 36, 64, 0.08);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      overflow: hidden;
    }
    html[data-theme="dark"] .sheet-launch-btn__track {
      background: rgba(255, 255, 255, 0.08);
    }
    .sheet-launch-btn.is-loading .sheet-launch-btn__track {
      display: block;
    }
    .sheet-launch-btn__track-fill {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--school-accent) 0%, var(--school-navy-light) 100%);
      transition: width 0.12s ease-out;
    }
    .sheet-launch-btn__label,
    .sheet-launch-btn__date {
      position: relative;
      z-index: 1;
    }
    .sheet-launch-btn__label {
      font-size: var(--text-md);
      font-weight: 700;
      color: var(--theme-heading-strong);
      flex: 1 1 auto;
      min-width: 0;
      text-align: left;
    }
    .sheet-launch-btn__date {
      flex: 0 0 auto;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--theme-text-muted);
      text-align: right;
      white-space: nowrap;
    }
    .sheet-launch-btn__pct {
      flex: 0 0 auto;
      font-size: 0.8125rem;
      font-weight: 800;

      z-index: 1;
      font-variant-numeric: tabular-nums;
    }
    .sheet-launch-btn__pct[hidden] { display: none !important; }
    .sheet-launch-btn.is-loading .sheet-launch-btn__pct {
      display: block !important;
    }
    .sheet-launch-btn__tag {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;

    .sheet-launch-btn__num {
      font-size: 1.25rem;
      line-height: 1;

  <script>
(function () {

  const SPREADSHEET_ID_PATTERN = /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;
  const ROSTER_CACHE_KEY = "survey-class-roster-cache-v1";

  }
  const DEFAULT_RESPONSE_SHEET_ID = "1oH3Er_9UF_A6HDQEK_1KjFxp54M_JJrU";
  const SHEET_REGISTRY_KEY = "school-sheet-registry-v1";
  const ADMIN_SETUP_DRAFT_KEY = "school-admin-setup-draft-v1";
  const LEGACY_CLASS_VIEW_ALL = "__all__";
  const INDEX_PAGE_PATH = (location.pathname.split("/").pop() || "index.html");
  const PROFILE_PATTERN = /\[(\d+)반\]\s*\[(\d+)\]\s*\[([^\]]+)\]/;

  function buildIndexPageUrl(state) {
    var params = new URLSearchParams();
    if (state && state.adminSetup === "1") {
      params.set("adminSetup", "1");
      if (state.label) params.set("label", state.label);
      if (state.url) params.set("url", state.url);
      if (state.sheet) params.set("sheet", state.sheet);
      if (state.classFilter) params.set("class", state.classFilter);
      if (state.subject && state.subject !== "all") params.set("subject", state.subject);
    } else if (state && state.open) {
      params.set("open", state.open);
      if (state.sheet) params.set("sheet", state.sheet);
      if (state.classFilter) params.set("class", state.classFilter);
      if (state.subject && state.subject !== "all") params.set("subject", state.subject);
    }
    var q = params.toString();
    return INDEX_PAGE_PATH + (q ? "?" + q : "");
  }

  function replaceIndexPageUrl(state) {
    if (!history.replaceState) return;
    history.replaceState(state || {}, "", buildIndexPageUrl(state || {}));
  }

  function applyRestoreView(restore) {
    if (!restore || !lastMultiResult) return;
    if (restore.sheet) {
      var sheetList = lastMultiResult.sheets.map(function (s) {
        return { sheetName: s.sheetName };
      });
      activeSheetView =
        resolvePreferredSheetTab(sheetList, restore.sheet) || activeSheetView;
    }
    if (restore.classFilter || restore.class) {
      var cf = restore.classFilter || restore.class;
      if (cf !== LEGACY_CLASS_VIEW_ALL) activeClassFilter = cf;
    }
    if (restore.subject) {
      var subjectOk = getSubjectFilterOptions().some(function (o) {
        return o.id === restore.subject;
      });
      if (subjectOk) activeSubjectView = restore.subject;
    }
  }

  function syncViewUrl() {
    if (adminSetupMode) {
      replaceIndexPageUrl({
        adminSetup: "1",
        label: SurveyForm.normalizeDisplayText(adminSetupLabel) || adminSetupLabel,
        url: adminSetupUrl,
        sheet: activeSheetView,
        classFilter: activeClassFilter,
        subject: activeSubjectView,
      });
      return;
    }
    if (currentLaunchEntry && currentLaunchEntry.id) {
      replaceIndexPageUrl({
        open: currentLaunchEntry.id,
        sheet: activeSheetView,
        classFilter: activeClassFilter,
        subject: activeSubjectView,
      });
    }
  }

  /** 설문 시트 기본 레이아웃: A열=반, B열=반번호+이름(또는 학번), C열=이름(선택) */
  const SURVEY_HEADER_ROW_INDEX = 0;
  const SURVEY_COL_STUDENT_ID = 1;
  const SURVEY_COL_NAME = 2;
  /** 영역별 설문 표 형식: A=반, B=번호·이름, C~=과목(대주제) */
  const BRACKET_TABLE_COL_CLASS = 0;
  const BRACKET_TABLE_COL_STUDENT = 1;
  const BRACKET_TABLE_COL_FIRST_CATEGORY = 2;

  const CLASS_ALIASES = ["반", "class", "학급", "클래스", "반명"];
  const STUDENT_ID_ALIASES = ["학번", "student_id", "학생번호", "studentid"];
  const NUMBER_ALIASES = ["번호", "number", "no", "no."];
  const NAME_ALIASES = ["이름", "name", "성명", "학생"];
  const STUDENT_SELECTOR_HEADER_HINTS = [
    "번호와 이름을 선택",
    "번호와 이름",
    "반번호 이름",
    "반 번호 이름",
    "반번호이름",
  ];
  const ROSTER_NAME_ALIASES = ["이름", "name", "성명", "성함", "studentname", "학생이름"];
  const COMPLETION_ALIASES = ["완료", "제출", "응답", "status", "상태", "completed", "done", "체크"];
  const CONTENT_ALIASES = ["상담", "내용", "응답", "메모", "비고", "고민", "주제", "프로필", "기록", "comment", "note"];
  const THEME_KEYWORDS = [
    { key: "진로", label: "진로·진학" },
    { key: "친구", label: "대인관계" },
    { key: "가족", label: "가정" },
    { key: "스트레스", label: "스트레스·정서" },
    { key: "학습", label: "학습" },
    { key: "건강", label: "건강" },
    { key: "또래", label: "또래 관계" },
    { key: "불안", label: "불안" },
  ];

  function groupBy(arr, keyFn) {
    const groups = {};
    for (const item of arr) {
      const key = keyFn(item);
      if (!groups[key]) groups[key] = [];
      groups[key].push(item);
    }
    return groups;
  }

  function sumBy(arr, fn) {
    return arr.reduce((s, x) => s + fn(x), 0);
  }

  function parseSpreadsheetId(url) {
    return SurveyForm.parseSpreadsheetId(url);
  }

  function parseGvizJson(text) {
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if (start < 0 || end <= start) throw new Error("gviz 응답을 파싱할 수 없습니다.");
    return JSON.parse(text.slice(start, end + 1));
  }

  function parseTabsFromHtml(html) {
    var tabs = [];
    var re = /docs-sheet-tab[^>]*data-sheet-id="(\d+)"[^>]*aria-label="([^"]+)"/g;
    var m;
    var normTitle =
      typeof SurveyForm !== "undefined" && SurveyForm.normalizeDisplayText
        ? SurveyForm.normalizeDisplayText.bind(SurveyForm)
        : function (t) {
            return String(t || "").trim();
          };
    while ((m = re.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: normTitle(m[2]) });
    }
    if (tabs.length) return tabs;
    var captionRe = /docs-sheet-tab-caption">([^<]+)</g;
    while ((m = captionRe.exec(html)) !== null) {
      tabs.push({ gid: null, title: normTitle(m[1]) });
    }
    if (tabs.length) return tabs;
    var re2 = /"sheetId":(\d+)[^}]*"title":"((?:\\.|[^"\\])*)"/g;
    while ((m = re2.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: normTitle(m[2]) });
    }
    if (tabs.length) return tabs;
    var re3 = /"gid":(\d+),"name":"((?:\\.|[^"\\])*)"/g;
    while ((m = re3.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: normTitle(m[2]) });
    }
    return tabs;
  }

  function sheetProbeSignature(values) {
    if (!values || !values.length) return "";
    var sample = values.slice(0, 3).map(function (row) {
      return (row || []).map(function (c) { return String(c || "").trim(); }).join(" ");
    }).join(" ");
    var m = sample.match(/\[(\d+반)\]/);
    return m ? m[1] : sample.slice(0, 80);
  }

  async function probeTabsByClassNames(spreadsheetId) {
    var probed = [];
    var seen = {};
    for (var i = 1; i <= 20; i++) {
      var title = i + "반";
      try {
        var values = await fetchSheetValuesGviz(spreadsheetId, { title: title });
        if (!values || !values.length) break;
        var sig = sheetProbeSignature(values);
        if (!sig || seen[sig]) break;
        seen[sig] = true;
        if (sig.indexOf("반") < 0 && probed.length) break;
        probed.push({ gid: null, title: title });
      } catch (err) {
        break;
      }
    }
    return probed;
  }

  async function probeTabsBySheetIndex(spreadsheetId) {
    var probed = [];
    var seen = {};
    for (var i = 1; i <= 20; i++) {
      try {
        var values = await fetchSheetValuesGviz(spreadsheetId, { title: "Sheet" + i });
        if (!values || !values.length) break;
        var sig = sheetProbeSignature(values);
        if (!sig || seen[sig]) break;
        seen[sig] = true;
        probed.push({ gid: null, title: "Sheet" + i });
      } catch (err) {
        break;
      }
    }
    return probed;
  }

  async function fetchSpreadsheetTabs(spreadsheetId, options) {
    options = options || {};
    var tabs = [];
    var urls = [
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit?usp=sharing",
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit",
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/htmlview",
    ];
    var htmlTexts = await Promise.all(
      urls.map(function (url) {
        return fetch(url)
          .then(function (res) {
            return res.ok ? res.text() : "";
          })
          .catch(function () {
            return "";
          });
      })
    );
    htmlTexts.forEach(function (html) {
      if (!html) return;
      var parsed = parseTabsFromHtml(html);
      if (parsed.length) {
        var seen = {};
        parsed.forEach(function (tab) {
          var key = (tab.gid || "") + "|" + String(tab.title || "").toLowerCase();
          if (seen[key]) return;
          seen[key] = true;
          tabs.push(tab);
        });
      }
    });
    var feedUrl = "https://spreadsheets.google.com/feeds/worksheets/" + spreadsheetId + "/public/full?alt=json";
    try {
      var feedRes = await fetch(feedUrl);
      if (feedRes.ok) {
        var feed = await feedRes.json();
        var entries = (feed && feed.feed && feed.feed.entry) || [];
        if (entries.length) {
          var feedTabs = entries.map(function (entry) {
            var gidMatch = String(entry.id || "").match(/gid=(\d+)/);
            return {
              gid: gidMatch ? gidMatch[1] : null,
              title: String(entry.title && entry.title.$t || entry.title || "시트").trim(),
            };
          });
          var seenFeed = {};
          feedTabs.forEach(function (tab) {
            var key = (tab.gid || "") + "|" + String(tab.title || "").toLowerCase();
            if (seenFeed[key]) return;
            seenFeed[key] = true;
            tabs.push(tab);
          });
        }
      }
    } catch (e) { /* feed unavailable */ }
    if (!tabs.length && options.allowProbe !== false) {
      var classTabs = await probeTabsByClassNames(spreadsheetId);
      if (classTabs.length) return classTabs;
      var sheetTabs = await probeTabsBySheetIndex(spreadsheetId);
      if (sheetTabs.length) return sheetTabs;
    }
    if (tabs.length) return tabs;
    throw new Error("시트 탭을 찾을 수 없습니다. URL·공개 공유 설정을 확인하세요.");
  }

  function gvizTableToValues(json) {
    var table = json && json.table;
    if (!table || !table.rows || !table.rows.length) return [];
    var headers = (table.cols || []).map(function (c) { return String((c && c.label) || "").trim(); });
    var rows = table.rows.map(function (row) {
      return (row.c || []).map(function (cell) {
        if (cell == null) return "";
        if (cell.v != null) return String(cell.v);
        if (cell.f != null) return String(cell.f);
        return "";
      });
    });
    return [headers].concat(rows);
  }

  async function fetchSheetValuesGviz(spreadsheetId, tab) {
    var params = new URLSearchParams({ tqx: "out:json" });
    if (tab && tab.gid) params.set("gid", tab.gid);
    else if (tab && tab.title) params.set("sheet", tab.title);
    var url = "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/gviz/tq?" + params;
    var res = await fetch(url);
    if (!res.ok) throw new Error("공개 시트 조회 실패 (HTTP " + res.status + "). 시트가 '링크가 있는 모든 사용자'에게 공개되어 있는지 확인하세요.");
    return gvizTableToValues(parseGvizJson(await res.text()));
  }

  async function fetchAllSheetsGviz(spreadsheetId) {
    var tabs = await fetchSpreadsheetTabs(spreadsheetId);
    if (!tabs.length) tabs = [{ gid: null, title: null }];
    return Promise.all(tabs.map(async function (tab) {
      var values = await fetchSheetValuesGviz(spreadsheetId, tab);
      return {
        sheetName: tab.title || "시트1",
        gid: tab.gid,
        values: values,
        analysis: analyzeSheetData(values, tab.title || "시트1"),
      };

    if (numMatch) return parseInt(numMatch[1], 10);
    var p = parseStudentId(text);
    if (p.번호 != null && p.번호 >= 1 && p.번호 <= 99) return p.번호;
    var clean = text.replace(/[^\d]/g, "");
    if (/^\d{1,2}$/.test(clean)) return parseInt(clean, 10);
    return null;
  }

  function parseStudentNameFromText(value) {
    var text = coerceText(value);
    if (!text) return "";
    // 반/번호 표기 제거 후 이름 토큰만 추출
    text = text
      .replace(/\[[^\]]+\]/g, " ")
      .replace(/\d+\s*학년/g, " ")
      .replace(/\d+\s*반/g, " ")
      .replace(/\d+\s*번/g, " ")
      .replace(/\d{3,5}/g, " ")
      .replace(/[()\-_/.,]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    if (!text) return "";
    var tokens = text.split(" ").filter(Boolean);
    for (var i = 0; i < tokens.length; i++) {
      var t = tokens[i];
      if (/^[가-힣a-zA-Z]{2,20}$/.test(t)) return t;
    }
    return "";
  }

  function inferStudentIdentityFromCells(cells) {
    var out = { 반: null, 번호: null, 이름: "" };
    (cells || []).forEach(function (cell) {
      var text = coerceText(cell);
      if (!text || text.length > 40) return;
      if (out.반 == null) out.반 = parseClassNumberFromText(text);
      if (out.번호 == null) out.번호 = parseStudentNumberFromText(text);
      if (!out.이름) out.이름 = parseStudentNameFromText(text);
    });
    return out;
  }

  function extractStudentFromSelectorCells(raw, selectorIndices) {
    var merged = { 반: null, 번호: null, 이름: null };
    (selectorIndices || []).forEach(function (idx) {
      var parsed = parseStudentSelectorValue(raw[idx]);
      if (parsed.반 != null && merged.반 == null) merged.반 = parsed.반;
      if (parsed.번호 != null && merged.번호 == null) merged.번호 = parsed.번호;
      if (parsed.이름 && !merged.이름) merged.이름 = parsed.이름;
    });
    return merged;
  }

  function findSurveyHeaderRowIndex(rawValues) {
    if (!rawValues || !rawValues.length) return SURVEY_HEADER_ROW_INDEX;
    var max = Math.min(10, rawValues.length);
    for (var i = 0; i < max; i++) {
      var headerRow = rawValues[i].map(coerceText);
      if (findStudentSelectorColumnIndices(headerRow).length) return i;
      if (findColumnIndex(headerRow, STUDENT_ID_ALIASES) >= 0) return i;
      if (findColumnIndex(headerRow, NAME_ALIASES) >= 0) return i;
      if (
        headerRow.some(function (h) {
          return normalizeHeader(h).indexOf("타임스탬프") >= 0;
        })
      ) {
        return i;
      }
    }
    return SURVEY_HEADER_ROW_INDEX;
  }

  function findIdentityColumnIndex(headerRow, aliases, excludeIndices) {
    var exclude = {};
    (excludeIndices || []).forEach(function (i) {
      exclude[i] = true;
    });
    var normalized = headerRow.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (exclude[i] || isStudentSelectorHeader(headerRow[i])) continue;
        if (normalized[i] === key || normalized[i].indexOf(key) >= 0) return i;
      }
    }
    return -1;
  }

  function resolveSurveyColumnIndices(headerRow) {
    var studentSelectorIndices = findStudentSelectorColumnIndices(headerRow);
    var studentIdIdx = findIdentityColumnIndex(headerRow, STUDENT_ID_ALIASES, studentSelectorIndices);
    var nameIdx = findIdentityColumnIndex(headerRow, NAME_ALIASES, studentSelectorIndices);
    var classIdx = findIdentityColumnIndex(headerRow, CLASS_ALIASES, studentSelectorIndices);
    var numberIdx = findIdentityColumnIndex(headerRow, NUMBER_ALIASES, studentSelectorIndices);
    var completionIdx = findIdentityColumnIndex(headerRow, COMPLETION_ALIASES, studentSelectorIndices);

    if (studentIdIdx < 0 && headerRow.length > SURVEY_COL_STUDENT_ID) {
      if (studentSelectorIndices.indexOf(SURVEY_COL_STUDENT_ID) < 0) {
        studentIdIdx = SURVEY_COL_STUDENT_ID;
      }
    }
    if (nameIdx < 0 && headerRow.length > SURVEY_COL_NAME) {
      if (studentSelectorIndices.indexOf(SURVEY_COL_NAME) < 0) {
        nameIdx = SURVEY_COL_NAME;
      }
    }
    if (numberIdx === studentIdIdx) numberIdx = -1;
    if (classIdx === studentIdIdx || classIdx === nameIdx) classIdx = -1;

    return {
      studentIdIdx: studentIdIdx,
      nameIdx: nameIdx,
      classIdx: classIdx,
      numberIdx: numberIdx,
      completionIdx: completionIdx,
      studentSelectorIndices: studentSelectorIndices,
    };
  }

  function isFixedSurveyColumnIndex(colIdx) {
    return colIdx === SURVEY_COL_STUDENT_ID || colIdx === SURVEY_COL_NAME;
  }

  function isQuestionColumnHeader(header) {
    var h = formatAdaptiveQuestionTitle(header);
    if (!h) return false;
    if (/^Q\s*\d/i.test(h)) return true;
    if (/^\d+\s*[-–.]\s*\d+/i.test(h)) return true;
    return false;
  }

  /** A=반, B=번호·이름, C~=Q1… 형식 (SMART 학습종합검사 등) */
  function isAbClassNumberNameQuestionSheet(headerRow) {
    if (!headerRow || headerRow.length < 4) return false;
    var c0 = normalizeHeader(headerRow[0] || "");
    var c1 = normalizeHeader(headerRow[1] || "");
    var hasClass =
      c0 === "반" || findColumnIndex([headerRow[0]], CLASS_ALIASES) >= 0;
    var hasNumName = /번호/.test(c1) && /이름/.test(c1);
    if (!hasClass || !hasNumName) return false;
    var qCount = 0;
    for (var i = 2; i < headerRow.length; i++) {
      if (isQuestionColumnHeader(headerRow[i])) qCount++;
    }
    return qCount >= 3;
  }

  function buildIdentityColumnIndices(cols, headerRow, options) {
    options = options || {};
    if (options.abQuestionSheet) return [0, 1];
    var indices = [];
    function add(idx) {
      if (typeof idx === "number" && idx >= 0 && indices.indexOf(idx) < 0) {
        indices.push(idx);
      }
    }
    add(cols.classIdx);
    add(cols.studentIdIdx);
    add(cols.numberIdx);
    add(cols.nameIdx);
    (cols.studentSelectorIndices || []).forEach(add);
    add(cols.completionIdx);
    if (!indices.length && isFixedSurveyColumnIndex(SURVEY_COL_STUDENT_ID)) {
      add(SURVEY_COL_STUDENT_ID);
      add(SURVEY_COL_NAME);
    }
    return indices.sort(function (a, b) {
      return a - b;
    });
  }

  function getSheetIdentityColumnIndices(sheet) {
    if (!sheet || !sheet.meta) return null;
    if (sheet.meta.identityColumnIndices && sheet.meta.identityColumnIndices.length) {
      return sheet.meta.identityColumnIndices;
    }
    return null;
  }

  function sheetHasQuestionColumns(sheet) {
    if (!sheet || !sheet.headers) return false;
    var count = 0;
    sheet.headers.forEach(function (h, colIdx) {
      if (isSkippableCategoryHeader(h, colIdx, sheet.meta)) return;
      if (isQuestionColumnHeader(h)) count++;
    });
    return count >= 3;
  }

  function normalizeCategoryHeaderLabel(headerTitle) {
    var raw = coerceText(headerTitle).replace(/\s+/g, " ").trim();
    if (!raw) return { id: "", label: "" };
    if (/💌|담임|선생님께/.test(raw)) return { id: "teacher", label: "담임쌤께" };
    if (/역사|한국사/.test(raw)) return { id: "한국사", label: "한국사" };
    if (/통합사회|^사회/.test(raw)) return { id: "통합사회", label: "통합사회" };
    if (/통합과학|^과학/.test(raw)) return { id: "통합과학", label: "통합과학" };
    var known = matchKnownSubjectId(raw);
    if (known) {
      return { id: known, label: subjectDisplayLabel(known) || raw };
    }
    var label = categoryDisplayLabel(raw) || raw;
    return { id: matchCategoryIdForTitle(raw) || slugCategoryId(label), label: label };
  }

  function columnSubjectKey(headerTitle) {
    return normalizeCategoryHeaderLabel(headerTitle).id || "";
  }

  function findBracketTableHeaderRow(rawValues) {
    if (!rawValues || !rawValues.length) return -1;
    var max = Math.min(6, rawValues.length);
    for (var i = 0; i < max; i++) {
      var row = rawValues[i] || [];
      var c0 = coerceText(row[BRACKET_TABLE_COL_CLASS]);
      var c1 = coerceText(row[BRACKET_TABLE_COL_STUDENT]);
      if (/반/.test(c0) && /번호|이름/.test(c1)) return i;
    }
    return -1;
  }

  function isBracketTableSheetFormat(rawValues) {
    var headerIdx = findBracketTableHeaderRow(rawValues);
    if (headerIdx < 0) return false;
    for (var r = headerIdx + 1; r < Math.min(headerIdx + 6, rawValues.length); r++) {
      var row = rawValues[r] || [];
      var studentCell = coerceText(row[BRACKET_TABLE_COL_STUDENT]);
      if (!studentCell || !/^\d+\s*\S/.test(studentCell)) continue;
      for (var c = BRACKET_TABLE_COL_FIRST_CATEGORY; c < row.length; c++) {
        if (/\[[^\]]+\]/.test(coerceText(row[c]))) return true;
      }
    }
    return false;
  }

  function buildCategoryColumnsFromHeader(headerRow) {
    var cols = [];
    (headerRow || []).forEach(function (title, colIdx) {
      if (colIdx < BRACKET_TABLE_COL_FIRST_CATEGORY) return;
      var norm = normalizeCategoryHeaderLabel(title);
      if (!norm.id || !norm.label) return;
      cols.push({
        index: colIdx,
        id: norm.id,
        label: norm.label,
        header: coerceText(title),
        colLetter: columnIndexToLetter(colIdx),
      });
    });
    return cols;
  }

  function columnIndexToLetter(idx) {
    var n = Number(idx);
    if (!Number.isFinite(n) || n < 0) return "";
    var s = "";
    var x = n + 1;
    while (x > 0) {
      s = String.fromCharCode(65 + ((x - 1) % 26)) + s;
      x = Math.floor((x - 1) / 26);
    }
    return s;
  }

  function parseNumberNameCell(value, classFallback) {
    var text = coerceText(value);
    if (!text) return { 반: classFallback || "", 번호: null, 이름: "" };
    var m = text.match(/^(\d{1,2})\s+(.+)$/);
    if (m) {
      return {
        반: classFallback || "",
        번호: parseInt(m[1], 10),
        이름: m[2].trim(),
      };
    }
    var num = coerceNumber(text);
    return {
      반: classFallback || "",
      번호: num,
      이름: num != null ? "" : text,
    };
  }

  function enrichRowWithBracketTableCategories(row, categoryColumns, cells) {
    var sections = [];
    (categoryColumns || []).forEach(function (col) {
      var body = coerceText(cells[col.index]);
      if (!body) return;
      var bracketSecs = parseBracketTopicSections(body);
      if (bracketSecs.length) {
        sections.push({
          title: col.label,
          subject: col.id,
          body: "",
          fields: bracketSecs.map(function (sec) {
            return { key: sec.title, value: sec.body || "" };
          }),
        });
        return;
      }
      sections.push({
        title: col.label,
        subject: col.id,
        body: body,
        fields: [],
      });
    });
    if (sections.length) row.sections = sections;
    return row;
  }

  function analyzeBracketTableSheet(rawValues, sheetName) {
    var headerRowIndex = findBracketTableHeaderRow(rawValues);
    var headerRow = rawValues[headerRowIndex].map(coerceText);
    var categoryColumns = buildCategoryColumnsFromHeader(headerRow);
    var classDefault = isClassLikeSheetName(sheetName) ? sheetName : "";
    var dataRows = rawValues.slice(headerRowIndex + 1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });

    var rows = dataRows
      .map(function (raw, rowIndex) {
        var cells = headerRow.map(function (_, i) { return coerceText(raw[i]); });
        var studentCell = coerceText(cells[BRACKET_TABLE_COL_STUDENT]);
        if (!studentCell || !/^\d{1,2}\s/.test(studentCell)) return null;
        var classVal = coerceText(cells[BRACKET_TABLE_COL_CLASS]) || classDefault;
        var parsed = parseNumberNameCell(studentCell, classVal);
        if (parsed.번호 == null) return null;
        if (!parsed.반 && classVal) parsed.반 = classVal;
        var row = {
          id: rowIndex + 1,
          학번: null,
          학년: null,
          반: parsed.반 || classVal || "(미입력)",
          번호: parsed.번호,
          이름: parsed.이름 || "",
          완료: true,
          미리보기: pickContentPreview(headerRow, cells),
          _raw: Object.fromEntries(
            headerRow.map(function (h, i) {
              return [h || "col_" + i, cells[i]];
            })
          ),
        };
        enrichRowWithBracketTableCategories(row, categoryColumns, cells);
        return row;
      })
      .filter(Boolean);

    return buildAnalysisPayload(headerRow, rows, {
      format: "table",
      layout: "bracket-table-ab",
      categoryColumns: categoryColumns,
      classColumn: "A열 반",
      numberColumn: "B열 번호·이름",
      studentIdColumn: "B열",
      nameColumn: "B열",
      completionColumn: "(응답 있음)",
      identityColumnIndices: [0, 1],
      questionColumnStart: 2,
    });
  }

  function getSheetCategoryColumns(multi) {
    if (!multi) return [];
    if (multi.combined && multi.combined.meta && multi.combined.meta.categoryColumns) {
      return multi.combined.meta.categoryColumns;
    }
    var sheets = multi.sheets || [];
    for (var i = 0; i < sheets.length; i++) {
      var s = sheets[i];
      if (isListSheetTab(s.sheetName)) continue;
      if (s.meta && s.meta.categoryColumns && s.meta.categoryColumns.length) {
        return s.meta.categoryColumns;
      }
    }
    return [];
  }

  function enrichSheetRowsFromRoster(sheet, roster) {
    if (!sheet || !roster || !roster.length) return;
    var entries = rosterEntriesForSheet(roster, sheet.sheetName);
    if (!entries.length) return;
    var byKey = {};
    var byNum = {};
    entries.forEach(function (entry) {
      var key = participationMatchKey(entry, sheet.sheetName);
      if (key) byKey[key] = entry;
      if (entry.번호 != null) byNum[Number(entry.번호)] = entry;
    });
    (sheet.rows || []).forEach(function (row) {
      if (!row.이름) {
        var match =
          byKey[participationMatchKey(row, sheet.sheetName)] ||
          (row.번호 != null ? byNum[Number(row.번호)] : null);
        if (match && match.이름) row.이름 = match.이름;
      }
      if ((!row.반 || row.반 === "(미입력)") && isClassLikeSheetName(sheet.sheetName)) {
        var banMatch = String(sheet.sheetName).match(/(\d+)\s*반/);
        row.반 = banMatch ? banMatch[1] + "반" : sheet.sheetName;
      }
    });
  }

  function enrichRowWithTableCategories(row, headerRow, cells) {
    var sections = [];
    headerRow.forEach(function (title, colIdx) {
      if (isSkippableCategoryHeader(title, colIdx)) return;
      var body = coerceText(cells[colIdx]);
      if (!body) return;
      var subjectKey = columnSubjectKey(title);
      var bracketSecs = parseBracketTopicSections(body);
      if (bracketSecs.length) {
        sections.push({
          title: categoryDisplayLabel(title) || coerceText(title) || "응답",
          subject: subjectKey || "",
          body: "",
          fields: bracketSecs.map(function (sec) {
            return { key: sec.title, value: sec.body || "" };
          }),
        });
        return;
      }
      var sec = {
        title: categoryDisplayLabel(title) || coerceText(title) || "응답",
        subject: subjectKey || "",
        body: body,
        fields: parseSectionFields(body),
      };
      if (isMeaningfulSection(sec)) sections.push(sec);
    });
    if (sections.length) {
      row.sections = sections;
    }
    return row;
  }

  function findColumnIndexExact(headers, aliases) {
    var normalized = headers.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (normalized[i] === key) return i;
      }
    }
    return -1;
  }

  function looksLikePersonName(value) {
    var t = coerceText(value);
    if (!t || t.length < 2 || t.length > 20) return false;
    if (/^\d+([.,]\d+)?$/.test(t)) return false;
    if (/[@./:\\]|https?:|^\d{4}[-/]/.test(t)) return false;
    return /[가-힣a-zA-Z]/.test(t);
  }

  function inferRosterNameColumnIndex(headerRow, dataRows, excludeIndices) {
    var exclude = {};
    (excludeIndices || []).forEach(function (i) {
      if (i >= 0) exclude[i] = true;
    });
    var exact = findColumnIndexExact(headerRow, ROSTER_NAME_ALIASES);
    if (exact >= 0 && !exclude[exact]) return exact;

    var sample = (dataRows || []).slice(0, 20);
    var bestIdx = -1;
    var bestScore = 0;
    for (var col = 0; col < headerRow.length; col++) {
      if (exclude[col]) continue;
      var score = 0;
      for (var r = 0; r < sample.length; r++) {
        if (looksLikePersonName(sample[r][col])) score += 1;
      }
      if (score > bestScore) {
        bestScore = score;
        bestIdx = col;
      }
    }
    return bestScore >= 2 ? bestIdx : -1;
  }

  function rosterEntriesForSheet(roster, sheetName) {
    if (!roster || !roster.length) return [];
    var filtered = rosterForSheet(roster, sheetName);
    var byNumber = {};
    filtered.forEach(function (entry) {
      if (entry.번호 == null || entry.번호 <= 0) return;
      var num = Number(entry.번호);
      var prev = byNumber[num];
      if (!prev) {
        byNumber[num] = {
          반: entry.반 || "",
          번호: num,
          이름: coerceText(entry.이름),
        };
        return;
      }
      if (!prev.이름 && entry.이름) prev.이름 = coerceText(entry.이름);
      if (!prev.반 && entry.반) prev.반 = entry.반;
    });
    return Object.keys(byNumber)
      .map(function (k) {
        return byNumber[k];
      })
      .sort(function (a, b) {
        return a.번호 - b.번호;
      });
  }

  function coerceNumber(value) {
    if (value === null || value === undefined || value === "") return null;
    var n = Number(String(value).replace(/[^\d.-]/g, ""));
    return Number.isFinite(n) ? n : null;
  }

  function coerceText(value) {
    return SurveyForm.coerceText(value);
  }

  function isCompletedValue(value) {
    var v = coerceText(value).toLowerCase();
    if (!v) return false;
    var done = ["y", "yes", "true", "1", "o", "완료", "제출", "응답완료", "done", "complete", "completed", "✓", "v"];
    if (done.indexOf(v) >= 0) return true;
    return v.indexOf("완료") >= 0 || v.indexOf("제출") >= 0;
  }

  function inferCompletionFromRow(cells, skipIndices) {
    var skip = {};
    for (var i = 0; i < skipIndices.length; i++) skip[skipIndices[i]] = true;
    for (var j = 0; j < cells.length; j++) {
      if (!skip[j] && isCompletedValue(cells[j])) return cells[j];
    }
    return "";
  }

  function pickContentPreview(headers, cells) {
    var contentIdx = findColumnIndex(headers, CONTENT_ALIASES);
    if (contentIdx >= 0) {
      var text = cells[contentIdx];
      return text.length > 120 ? text.slice(0, 120) + "…" : text;
    }
    var sorted = cells.filter(function (c) { return c.length > 8; }).sort(function (a, b) { return b.length - a.length; });
    var longest = sorted[0];
    if (!longest) return "";
    return longest.length > 120 ? longest.slice(0, 120) + "…" : longest;
  }

  function emptyAnalysis() {
    return {
      summary: { 총응답: 0, 완료건수: 0, 완료율: 0, 학급수: 0, 번호입력: 0, 이름입력: 0, 반미입력: 0 },
      byClass: [], columnInsights: [], themes: [], headers: [], rows: [], meta: { format: "empty" },
    };
  }

  function buildColumnInsights(headers, rows) {
    if (!headers || !headers.length || !rows.length) return [];
    return headers
      .map(function (name, colIdx) {
        if (isSkippableCategoryHeader(name, colIdx)) return null;
        var filled = rows.filter(function (r) {
          var val = (r._raw || {})[name || "col_" + colIdx];
          if (val == null) val = Object.values(r._raw || {})[colIdx];
          return coerceText(val) !== "";
        }).length;
        var isContent = CONTENT_ALIASES.some(function (a) {
          return normalizeHeader(name).indexOf(normalizeHeader(a)) >= 0;
        });
        return {
          열: name || "열" + (colIdx + 1),
          colIdx: colIdx,
          입력건수: filled,
          입력률: rows.length ? Math.round((filled / rows.length) * 1000) / 10 : 0,
          상담내용열: isContent,
        };
      })
      .filter(function (c) {
        return c && c.입력건수 > 0;
      })
      .sort(function (a, b) {
        return b.입력건수 - a.입력건수;
      })
      .slice(0, 12);
  }

  function detectThemes(rows) {
    // 핵심 상담 주제 표시에 집중하기 위해 자동 키워드 테마 카드는 비활성화
    return [];
  }

  function buildAnalysisPayload(headers, rows, meta) {
    var grouped = groupBy(rows, function (r) { return r.반; });
    var total = rows.length;
    var completed = sumBy(rows, function (r) { return r.완료 ? 1 : 0; });
    var withNumber = rows.filter(function (r) { return r.번호 !== null; }).length;
    var withName = rows.filter(function (r) { return r.이름; }).length;
    var missingClass = rows.filter(function (r) { return r.반 === "(미입력)"; }).length;

    var byClass = Object.keys(grouped).map(function (className) {
      var classRows = grouped[className];
      var classTotal = classRows.length;
      var classCompleted = sumBy(classRows, function (r) { return r.완료 ? 1 : 0; });
      return {
        반: className,
        인원: classTotal,
        완료: classCompleted,
        완료율: classTotal ? Math.round((classCompleted / classTotal) * 1000) / 10 : 0,
      };
    }).sort(function (a, b) { return String(a.반).localeCompare(String(b.반), "ko"); });

    return {
      summary: {
        총응답: total,
        완료건수: completed,

  function analyzeSheetData(rawValues, sheetName) {
    if (!rawValues || !rawValues.length) return emptyAnalysis();

    if (isBracketTableSheetFormat(rawValues)) {
      return analyzeBracketTableSheet(rawValues, sheetName || "");
    }

    if (isProfileSheetFormat(rawValues)) {
      var profile = normalizeProfileSheet(rawValues);
      return buildAnalysisPayload(profile.headers, profile.rows, Object.assign({}, profile.meta, { format: "profile" }));
    }

    var headerRowIndex = findSurveyHeaderRowIndex(rawValues);
    var headerRow = rawValues[headerRowIndex].map(coerceText);
    var dataRows = rawValues.slice(headerRowIndex + 1).filter(function (row) {
      return row.some(function (cell) { return coerceText(cell) !== ""; });
    });

    var cols = resolveSurveyColumnIndices(headerRow);
    var abQuestionSheet = isAbClassNumberNameQuestionSheet(headerRow);
    if (abQuestionSheet) {
      if (cols.classIdx < 0) cols.classIdx = 0;
      if (cols.numberIdx < 0) cols.numberIdx = 1;
      if (cols.nameIdx < 0) cols.nameIdx = 1;
    }
    var identityColumnIndices = buildIdentityColumnIndices(cols, headerRow, {
      abQuestionSheet: abQuestionSheet,
    });

    var rows = dataRows.map(function (raw, rowIndex) {
      var cells = headerRow.map(function (_, i) { return coerceText(raw[i]); });
      var sidRaw = cols.studentIdIdx >= 0 ? raw[cols.studentIdIdx] : "";
      var sidParsed = parseStudentId(sidRaw);
      var studentId =
        sidParsed.학번 ||
        formatStudentIdFromParsed(sidParsed) ||
        coerceText(sidRaw).replace(/\D/g, "");
      var classVal = cols.classIdx >= 0 ? coerceText(raw[cols.classIdx]) : "";
      if (!classVal && sidParsed.반 != null) classVal = sidParsed.반 + "반";
      var numberVal =
        cols.numberIdx >= 0
          ? coerceNumber(raw[cols.numberIdx])
          : sidParsed.번호;
      var nameVal = cols.nameIdx >= 0 ? coerceText(raw[cols.nameIdx]) : "";
      if (
        cols.numberIdx >= 0 &&
        cols.numberIdx === cols.nameIdx &&
        coerceText(raw[cols.numberIdx])
      ) {
        var parsedNumName = parseNumberNameCell(raw[cols.numberIdx], classVal);
        if (parsedNumName.번호 != null) numberVal = parsedNumName.번호;
        if (parsedNumName.이름) nameVal = parsedNumName.이름;
        if (!classVal && parsedNumName.반) classVal = parsedNumName.반;
      }
      var fromSelectors = extractStudentFromSelectorCells(
        raw,
        cols.studentSelectorIndices
      );
      if (!classVal && fromSelectors.반 != null) classVal = fromSelectors.반 + "반";
      if (numberVal == null && fromSelectors.번호 != null) numberVal = fromSelectors.번호;
      if (!nameVal && fromSelectors.이름) nameVal = fromSelectors.이름;
      var inferred = inferStudentIdentityFromCells(cells);
      if (!classVal && inferred.반 != null) classVal = inferred.반 + "반";
      if (numberVal == null && inferred.번호 != null) numberVal = inferred.번호;
      if (!nameVal && inferred.이름) nameVal = inferred.이름;
      if (!studentId && fromSelectors.반 != null && fromSelectors.번호 != null) {
        var gradeHint = sidParsed.grade != null ? sidParsed.grade : 1;
        studentId = formatStudentIdFromParsed({
          grade: gradeHint,
          반: fromSelectors.반,
          번호: fromSelectors.번호,
        });
        if (sidParsed.grade == null) sidParsed.grade = gradeHint;
        if (sidParsed.반 == null) sidParsed.반 = fromSelectors.반;
        if (sidParsed.번호 == null) sidParsed.번호 = fromSelectors.번호;
      }
      var skipCols = [
        cols.classIdx,
        cols.studentIdIdx,
        cols.numberIdx,
        cols.nameIdx,
        cols.completionIdx,
      ]
        .concat(cols.studentSelectorIndices || [])
        .filter(function (i) {
          return i >= 0;
        });
      var skipUnique = [];
      skipCols.forEach(function (i) {
        if (skipUnique.indexOf(i) < 0) skipUnique.push(i);
      });
      skipCols = skipUnique;
      var completionRaw =
        cols.completionIdx >= 0
          ? raw[cols.completionIdx]
          : inferCompletionFromRow(cells, skipCols);
      var row = {
        id: rowIndex + 1,
        학번: studentId || null,
        학년: sidParsed.grade,
        반: classVal || "(미입력)",
        번호: numberVal,
        이름: nameVal ? cleanStudentNameForDisplay(nameVal, numberVal) : nameVal,
        완료: isCompletedValue(completionRaw),
        미리보기: pickContentPreview(headerRow, cells),
        _raw: Object.fromEntries(
          headerRow.map(function (h, i) {
            return [h || "col_" + i, cells[i]];
          })
        ),
      };
      if (!abQuestionSheet) {
        enrichRowWithTableCategories(row, headerRow, cells);
      }
      var profileText = longestCellText(cells);
      if (hasProfileContent(profileText)) {
        return enrichRowWithProfile(row, profileText, extractProfileMeta(profileText));
      }
      if (!rowHasSections(row) && hasBracketTopicContent(profileText)) {
        row.sections = parseBracketTopicSections(profileText);
      }
      return row;
    });

    return buildAnalysisPayload(headerRow, rows, {
      classColumn: cols.classIdx >= 0 ? headerRow[cols.classIdx] : "반(학번)",
      numberColumn:
        cols.numberIdx >= 0
          ? headerRow[cols.numberIdx]
          : headerRow[cols.studentIdIdx] || "학번(B열)",
      nameColumn: cols.nameIdx >= 0 ? headerRow[cols.nameIdx] : "이름(C열)",
      studentIdColumn:
        cols.studentIdIdx >= 0 ? headerRow[cols.studentIdIdx] : "학번(B열)",
      completionColumn:
        cols.completionIdx >= 0 ? headerRow[cols.completionIdx] : "(자동 추론)",
      format: "table",
      layout: abQuestionSheet
        ? "class-number-name-questions"
        : "survey-b-col-student-id-c-col-name",
      identityColumnIndices: identityColumnIndices,
      questionColumnStart: abQuestionSheet ? 2 : null,
    });
  }

  function normalizeTabTitle(title) {
    return String(title || "").trim().toLowerCase().replace(/\s+/g, "");
  }

  function isListSheetTab(title) {
    var n = normalizeTabTitle(title);
    return n === "list" || n === "명단" || n === "학생명단" || n === "studentlist";
  }

  function normalizeSheetClassKey(value) {
    var t = String(value || "").trim();
    if (!t) return "";
    var m = t.match(/(\d+)\s*반/);
    if (m) return m[1] + "반";
    return t.toLowerCase().replace(/\s+/g, "");
  }

  function isMatrixClassRoster(rawValues) {
    if (!rawValues || !rawValues.length) return false;
    var headerRow = rawValues[0].map(coerceText);
    var classCols = 0;
    headerRow.forEach(function (h) {
      if (/^\d+\s*반$/.test(String(h || "").trim())) classCols += 1;
    });
    return classCols >= 2;
  }

  function parseMatrixClassRoster(rawValues) {
    if (!rawValues || !rawValues.length) return [];
    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });
    var numberIdx = findColumnIndexExact(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = 0;

    var classColumns = [];
    headerRow.forEach(function (h, idx) {
      if (idx === numberIdx) return;
      var m = String(h || "").trim().match(/^(\d+)\s*반$/);
      if (m) classColumns.push({ idx: idx, 반: m[1] + "반" });
    });
    if (!classColumns.length) return [];

    var roster = [];
    dataRows.forEach(function (raw, rowIndex) {
      var numberVal = numberIdx >= 0 ? coerceNumber(raw[numberIdx]) : null;
      if (numberVal == null) numberVal = rowIndex + 1;
      classColumns.forEach(function (col) {
        var nameVal = coerceText(raw[col.idx]);
        if (!nameVal) return;
        roster.push({ 반: col.반, 번호: numberVal, 이름: nameVal });
      });
    });
    roster.sort(function (a, b) {
      var classCmp = String(a.반).localeCompare(String(b.반), "ko");
      if (classCmp !== 0) return classCmp;
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return roster;
  }

  function loadCachedClassRoster() {
    try {
      var raw = sessionStorage.getItem(ROSTER_CACHE_KEY);
      if (!raw) return null;
      var data = JSON.parse(raw);
      if (!data || !data.at || Date.now() - data.at > ROSTER_CACHE_TTL_MS) return null;
      return Array.isArray(data.roster) ? data.roster : null;

      return null;

  function saveCachedClassRoster(roster) {
    if (!roster || !roster.length) return;
    try {
      sessionStorage.setItem(
        ROSTER_CACHE_KEY,
        JSON.stringify({ at: Date.now(), roster: roster })

  async function fetchClassRosterFromMaster() {
    var cached = loadCachedClassRoster();
    if (cached && cached.length) return cached;

    var probeTitles = ["list", "명단", "1반"];
    for (var i = 0; i < probeTitles.length; i++) {
      try {
        var values = await fetchSheetValuesGviz(getClassRosterSpreadsheetId(), { title: probeTitles[i] });
        if (isMatrixClassRoster(values)) {
          var roster = parseMatrixClassRoster(values);
          saveCachedClassRoster(roster);
          return roster;
        }
      } catch (err) { /* try next tab */ }
    }
    try {
      var tabs = await fetchSpreadsheetTabs(getClassRosterSpreadsheetId(), { allowProbe: false });
      if (tabs.length) {
        var values = await fetchSheetValuesGviz(getClassRosterSpreadsheetId(), tabs[0]);
        if (isMatrixClassRoster(values)) {
          var roster = parseMatrixClassRoster(values);
          saveCachedClassRoster(roster);
          return roster;
        }
      }
    } catch (err) { /* master roster unavailable */ }
    return [];
  }

  function parseListRoster(rawValues) {
    if (!rawValues || !rawValues.length) return [];
    if (isMatrixClassRoster(rawValues)) return parseMatrixClassRoster(rawValues);
    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });
    var classIdx = findColumnIndexExact(headerRow, CLASS_ALIASES);
    if (classIdx < 0) classIdx = findColumnIndex(headerRow, CLASS_ALIASES);
    var numberIdx = findColumnIndexExact(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0 && headerRow.length > 0) numberIdx = 0;
    var nameIdx = inferRosterNameColumnIndex(headerRow, dataRows, [classIdx, numberIdx]);

    var roster = [];
    dataRows.forEach(function (raw, rowIndex) {
      var classVal = classIdx >= 0 ? coerceText(raw[classIdx]) : "";
      var numberVal = numberIdx >= 0 ? coerceNumber(raw[numberIdx]) : null;
      var nameVal = nameIdx >= 0 ? coerceText(raw[nameIdx]) : "";
      if (numberVal == null && !nameVal) return;
      if (numberVal == null) numberVal = rowIndex + 1;
      roster.push({ 반: classVal, 번호: numberVal, 이름: nameVal });
    });
    roster.sort(function (a, b) {
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return roster;
  }

  function rosterForSheet(roster, sheetName) {
    if (!roster || !roster.length) return [];
    var hasClass = roster.some(function (r) { return r.반; });
    if (!hasClass) return roster.slice();
    var sheetKey = normalizeSheetClassKey(sheetName);
    if (!sheetKey) return roster.slice();
    var filtered = roster.filter(function (r) {
      var classKey = normalizeSheetClassKey(r.반);
      return classKey === sheetKey || classKey.indexOf(sheetKey) >= 0 || sheetKey.indexOf(classKey) >= 0;
    });
    return filtered.length ? filtered : roster.slice();
  }

  function computeParticipationMeta(sheetAnalyses) {
    if (!sheetAnalyses || !sheetAnalyses.length) {
      return { maxExpected: 0, referenceSheetName: "", rosterSource: "responses" };
    }
    var ref = { name: sheetAnalyses[0].sheetName, count: sheetAnalyses[0].summary.총응답 || 0 };
    for (var i = 1; i < sheetAnalyses.length; i++) {
      var c = sheetAnalyses[i].summary.총응답 || 0;
      if (c > ref.count) ref = { name: sheetAnalyses[i].sheetName, count: c };
    }
    return {
      maxExpected: ref.count,
      referenceSheetName: ref.name,
      rosterSource: "responses",
      roster: [],
    };
  }

  function participationMatchKey(entry, sheetName) {
    if (!entry) return "";
    var num = entry.번호 != null ? Number(entry.번호) : 0;
    if (!num || num <= 0) return "";
    var ban = entry.반 && entry.반 !== "(미입력)" ? normalizeSheetClassKey(entry.반) : "";
    if (!ban && sheetName && isClassLikeSheetName(sheetName)) {
      ban = normalizeSheetClassKey(sheetName);
    }
    if (!ban && entry.시트 && isClassLikeSheetName(entry.시트)) {
      ban = normalizeSheetClassKey(entry.시트);
    }
    return ban ? ban + ":" + num : String(num);
  }

  function isParticipationPresent(entry, present, sheetName) {
    var key = participationMatchKey(entry, sheetName);
    if (key && present[key]) return true;
    var num = entry && entry.번호 != null ? Number(entry.번호) : 0;
    if (num > 0 && present["#" + num]) return true;
    return false;
  }

  function computeSheetParticipation(rows, rosterOrMax, referenceSheetName, rosterSource, sheetName) {
    if (Array.isArray(rosterOrMax) && rosterOrMax.length) {
      var rosterSlice = sheetName
        ? rosterEntriesForSheet(rosterOrMax, sheetName)
        : rosterOrMax.slice();
      var present = {};
      (rows || []).forEach(function (r) {
        var key = participationMatchKey(r, sheetName);
        if (key) present[key] = true;
        if (r.번호 != null && r.번호 > 0) present["#" + Number(r.번호)] = true;
      });
      var missingStudents = rosterSlice.filter(function (entry) {
        return !isParticipationPresent(entry, present, sheetName);
      });
      return {
        referenceSheetName: referenceSheetName || "list",
        rosterSource: rosterSource || "list",
        maxExpected: rosterSlice.length,
        participated: rosterSlice.length - missingStudents.length,
        missingNumbers: missingStudents.map(function (s) { return s.번호; }),
        missingStudents: missingStudents,
        missingCount: missingStudents.length,
      };
    }

    var maxExpected = typeof rosterOrMax === "number" ? rosterOrMax : 0;
    if (!maxExpected) {
      return {
        referenceSheetName: referenceSheetName || "",
        rosterSource: rosterSource || "responses",
        maxExpected: 0,
        participated: 0,
        missingNumbers: [],
        missingStudents: [],
        missingCount: 0,
      };
    }
    var presentNums = {};
    (rows || []).forEach(function (r) {
      if (r.번호 != null && r.번호 > 0) presentNums[r.번호] = true;
    });
    var missing = [];
    for (var n = 1; n <= maxExpected; n++) {
      if (!presentNums[n]) missing.push(n);
    }
    return {
      referenceSheetName: referenceSheetName,
      rosterSource: rosterSource || "responses",
      maxExpected: maxExpected,
      participated: maxExpected - missing.length,
      missingNumbers: missing,
      missingStudents: missing.map(function (num) { return { 번호: num, 이름: "" }; }),
      missingCount: missing.length,
    };
  }

  function analyzeAllSheets(sheetInputs, externalRoster) {
    var listInput = null;
    var responseInputs = [];
    (sheetInputs || []).forEach(function (item) {
      if (isListSheetTab(item.sheetName)) listInput = item;
      else responseInputs.push(item);
    });
    var listRoster = listInput ? parseListRoster(listInput.values) : [];
    var fullRoster = listRoster.length
      ? listRoster
      : externalRoster && externalRoster.length
        ? externalRoster
        : [];
    var rosterSource = listRoster.length
      ? "list"
      : externalRoster && externalRoster.length
        ? "master-roster"
        : "responses";
    if (listRoster.length && externalRoster && externalRoster.length) {
      var rosterKeys = {};
      listRoster.forEach(function (e) {
        var k = participationMatchKey(e, e.반 || "");
        if (k) rosterKeys[k] = e;
      });
      externalRoster.forEach(function (e) {
        var k = participationMatchKey(e, e.반 || "");
        if (k && !rosterKeys[k]) rosterKeys[k] = e;
      });
      fullRoster = Object.keys(rosterKeys).map(function (k) {
        return rosterKeys[k];
      });
      rosterSource = "list+master";
    }

    var sheetAnalyses = responseInputs.map(function (item) {
      var analysis = analyzeSheetData(item.values, item.sheetName);
      analysis.meta = Object.assign({}, analysis.meta, { sheetName: item.sheetName });
      return Object.assign({ sheetName: item.sheetName }, analysis);
    });

    var globalCategoryColumns = null;
    sheetAnalyses.forEach(function (sheet) {
      if (
        !globalCategoryColumns &&
        sheet.meta &&
        sheet.meta.categoryColumns &&
        sheet.meta.categoryColumns.length
      ) {
        globalCategoryColumns = sheet.meta.categoryColumns;
      }
    });

    var partMeta = fullRoster.length
      ? {
          maxExpected: fullRoster.length,
          referenceSheetName:
            rosterSource === "master-roster"
              ? "명렬표"
              : listInput
                ? listInput.sheetName
                : "",
          rosterSource: rosterSource,
          roster: fullRoster,
          listTabName: listInput ? listInput.sheetName : null,
        }
      : computeParticipationMeta(sheetAnalyses);

    if (fullRoster.length) {
      partMeta.maxExpected = Math.max.apply(
        null,
        sheetAnalyses.map(function (sheet) {
          return rosterEntriesForSheet(fullRoster, sheet.sheetName).length;
        }).concat([0])
      );
    }

    sheetAnalyses.forEach(function (sheet) {
      if (fullRoster.length) {
        sheet.participation = computeSheetParticipation(
          sheet.rows,
          fullRoster,
          partMeta.referenceSheetName,
          rosterSource,
          sheet.sheetName
        );
        enrichSheetRowsFromRoster(sheet, fullRoster);
      } else {
        sheet.participation = computeSheetParticipation(
          sheet.rows,
          partMeta.maxExpected,
          partMeta.referenceSheetName,
          partMeta.rosterSource,
          sheet.sheetName
        );
      }
    });
    var allRows = [];
    sheetAnalyses.forEach(function (sheet) {
      sheet.rows.forEach(function (row) {
        allRows.push(Object.assign({}, row, { 시트: sheet.sheetName }));
      });
    });
    var combined = buildAnalysisPayload(
      sheetAnalyses[0] && sheetAnalyses[0].headers ? sheetAnalyses[0].headers : [],
      allRows,
      {
        format: "multi",
        sheetCount: sheetAnalyses.length,
        sheetNames: sheetAnalyses.map(function (s) { return s.sheetName; }),
        categoryColumns: globalCategoryColumns || [],
      }
    );
    return {
      sheets: sheetAnalyses,
      combined: combined,
      participationMeta: partMeta,
      sheetsMeta: {
        total: sheetAnalyses.length,
        listTab: listInput
          ? { name: listInput.sheetName, rosterCount: fullRoster.length }
          : null,
        recognized: sheetAnalyses.filter(function (s) { return s.summary.총응답 > 0; }).length,
        names: sheetAnalyses.map(function (s) { return s.sheetName; }),
        perSheet: sheetAnalyses.map(function (s) {
          return { name: s.sheetName, rows: s.summary.총응답 };
        }),
      },
    };
  }

    btn.classList.add("is-loading");

  function matchKnownSubjectId(title) {

  function isInternalSurveyFieldTitle(title) {

    if (!t || /^cat-/i.test(t)) return true;
    if (matchKnownSubjectId(t)) return false;
    if (/^(시기|방법|어려움|실수|계획|자신감)$/.test(t)) return true;
    if (/공부\s*(시작|방법)|어려웠|틀린\s*이유|바꿀\s*점|선생님께\s*듣고/.test(t)) return true;
    return false;

  function deriveCategoriesFromAnalysis(multi) {
    var registry = {};
    var orderList = [];

    function registerTitle(rawTitle) {
      var label = categoryDisplayLabel(rawTitle);
      if (!label || isMarkerOnlyTitle(label)) return;
      var id = matchCategoryIdForTitle(rawTitle || label);
      if (!registry[id]) {
        registry[id] = {
          id: id,
          label: label,
          enabled: true,
          count: 0,
          firstOrder: orderList.length,
        };
        orderList.push(id);
      }
      registry[id].count += 1;
    }

    (multi && multi.sheets ? multi.sheets : []).forEach(function (sheet) {
      (sheet.rows || []).forEach(function (row) {
        if (!rowHasSections(row)) return;
        (row.sections || []).forEach(function (sec) {
          if (!isMeaningfulSection(sec)) return;
          registerTitle(sec.title || "");
        });
      });
      (sheet.headers || []).forEach(function (headerName, colIdx) {
        if (isSkippableCategoryHeader(headerName, colIdx, sheet.meta)) return;
        registerTitle(headerName);
      });
      (sheet.columnInsights || []).forEach(function (col) {
        if (!col || !col.열 || col.입력건수 <= 0) return;
        if (isSkippableCategoryHeader(col.열, col.colIdx, sheet.meta)) return;
        registerTitle(col.열);
      });
    });

    if (multi && multi.combined && multi.combined.commonThemes) {
      multi.combined.commonThemes.forEach(function (theme) {
        if (theme && theme.주제) registerTitle(theme.주제);
      });
    }

    orderList.sort(function (a, b) {
      var ca = registry[a].count;
      var cb = registry[b].count;
      if (cb !== ca) return cb - ca;
      return registry[a].firstOrder - registry[b].firstOrder;
    });

    var categories = [{ id: "all", label: "전체 선택", enabled: true, order: 0 }];
    orderList.forEach(function (id, idx) {
      var item = registry[id];
      categories.push({
        id: item.id,
        label: item.label,
        enabled: true,
        order: idx + 1,
        count: item.count,
      });
    });

    if (categories.length === 1) {
      categories.push({
        id: "cat-responses",
        label: "설문 응답",
        enabled: true,
        order: 1,
        count: 0,
      });
    }
    return categories;

  async function confirmAdminSetup() {
    if (!adminSetupLabel || !adminSetupUrl) return;
    syncAdminCategoriesFromDom();
    if (
      !adminCategorySelectAll &&
      !adminSetupCategories.some(function (c) {
        return c.enabled && c.id !== "all";
      })
    ) {
      alert("표시할 카테고리를 하나 이상 선택하거나 「전체 선택」을 체크해 주세요.");
      return;
    }
    var registry = loadSheetRegistry();
    var registryClasses = buildRegistryClassesFromMulti(lastMultiResult);
    var preferredTab =
      registryClasses.length && registryClasses[0].sheetName
        ? registryClasses[0].sheetName
        : lastMultiResult && lastMultiResult.sheets[0]
          ? lastMultiResult.sheets[0].sheetName
          : null;
    var existingEntry = adminSetupEditId ? findRegistryEntry(adminSetupEditId) : null;
    if (existingEntry && isProtectedLegacySurvey(existingEntry)) {
      adminSetupResultsLayout = "subject";
    }
    var resolvedLayout = adminSetupResultsLayout === "subject" ? "subject" : "class";
    var resolvedViewMode = resolvedLayout === "class" ? "class" : "subject";
    if (adminSetupEditId && existingEntry) {
      if (isProtectedLegacySurvey(existingEntry)) {
        resolvedLayout = "subject";
        resolvedViewMode = "subject";
      } else if (existingEntry.resultsLayout || existingEntry.viewMode) {
        /* 게시 시 관리자가 고른 표시 방식 우선 */
      }
    }
    var now = Date.now();
    var payload = {
      label: SurveyForm.normalizeDisplayText(adminSetupLabel) || adminSetupLabel,
      url: adminSetupUrl,
      tab: preferredTab,
      classes: registryClasses,
      resultsLayout: resolvedLayout,
      viewMode: resolvedViewMode,
      categorySelectAll:
        resolvedLayout === "class" ? true : adminCategorySelectAll,
      updatedAt: now,
      categories: adminSetupCategories.map(function (c, i) {
        return {
          id: c.id,
          label: c.label,
          enabled: c.enabled !== false,
          order: c.order != null ? c.order : i,
        };
      }),
    };
    if (adminSetupEditId) {
      var idx = registry.findIndex(function (item) {
        return item.id === adminSetupEditId;
      });
      if (idx < 0) {
        alert("수정할 시트를 찾을 수 없습니다.");
        return;
      }
      registry[idx] = Object.assign({}, registry[idx], payload);
    } else {
      var newId = parseSpreadsheetId(adminSetupUrl);
      if (
        registry.some(function (item) {
          return item && item.id === newId;
        })
      ) {
        alert("이미 등록된 시트입니다. 목록에서 수정해 주세요.");
        return;
      }
      registry.push(
        Object.assign(
          {
            id: newId,
            registeredAt: now,
          },
          payload
        )
      );
    }
    saveSheetRegistry(registry);
    var targetId = adminSetupEditId || parseSpreadsheetId(adminSetupUrl);
    var savedEntry = registry.find(function (item) {
      return item && item.id === targetId;
    });
    if (savedEntry) {
      try {
        await SurveyForm.syncRegistryEntryAfterEdit(savedEntry);
      } catch (pubErr) {
        console.warn(pubErr);
      }
    }
    sessionStorage.removeItem(ADMIN_SETUP_DRAFT_KEY);
    location.href = INDEX_PAGE_PATH;
  }

  function fitHeaderTitleToMetaRow() {
    var block = document.querySelector(".header-brand-block");
    if (!block) return;
    var meta = block.querySelector(".header-meta-row");
    var h1 = block.querySelector("h1");
    if (!meta || !h1) return;
    var target = meta.getBoundingClientRect().width;
    if (target < 8) return;
    h1.style.fontSize = "";
    h1.style.letterSpacing = "";
    var rootPx = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
    var px = rootPx * 1.75;
    h1.style.fontSize = px + "px";
    var step = 0;
    while (h1.getBoundingClientRect().width > target + 1 && px > rootPx * 0.9 && step < 80) {
      px -= 0.5;
      h1.style.fontSize = px + "px";
      step++;
    }
    var spacing = 0;
    step = 0;
    while (h1.getBoundingClientRect().width < target - 1 && spacing < 0.24 && step < 100) {
      spacing += 0.008;
      h1.style.letterSpacing = spacing + "em";
      step++;
    }
  }

  async function launchAdminSetup(label, url, restoreView) {
    if (analysisInFlight) return;
    adminSetupMode = true;
    adminSetupLabel = SurveyForm.normalizeDisplayText(label) || label;
    adminSetupUrl = url;
    currentLaunchEntry = null;
    document.body.classList.add("admin-setup-mode");
    setSiteHeaderAdminMode(true);

    if (setupPanel) setupPanel.hidden = false;

    var metaEl = document.getElementById("adminSetupMeta");
    if (titleEl) {
      titleEl.textContent =
        (adminSetupEditId ? "[수정] " : "") + label + " · 시트 구성 미리보기";
    }
    if (metaEl) metaEl.textContent = url;
    applyAdminSetupStep("configure");
    showResultsView();

    var errorEl = document.getElementById("error");
    if (errorEl) errorEl.hidden = true;
    document.getElementById("results").classList.remove("visible");
    document.getElementById("results").innerHTML = "";
    teardownScrollStudentTracker();
    setFabStackVisible(false);
    analysisInFlight = true;

    try {
      var id = parseSpreadsheetId(url);
      var sheetInputs = await fetchAllSheetsGviz(id);
      var masterRoster = await fetchClassRosterFromMaster();
      var hasData = sheetInputs.some(function (s) {
        return s.values && s.values.length;
      });
      if (!hasData) throw new Error("시트에 데이터가 없습니다. 공개 공유 설정을 확인하세요.");
      sheetsData[id] = sheetInputs;
      lastMultiResult = analyzeAllSheets(sheetInputs, masterRoster);
      var draftRaw = sessionStorage.getItem(ADMIN_SETUP_DRAFT_KEY);
      var draft = null;
      try {
        if (draftRaw) draft = JSON.parse(draftRaw);
      } catch (e) { /* ignore */ }
      adminSetupCategories = deriveCategoriesFromAnalysis(lastMultiResult);
      if (draft && draft.categories && draft.categories.length) {
        adminSetupCategories = mergeSavedCategoryPrefs(
          adminSetupCategories,
          draft.categories
        );
      }
      adminCategorySelectAll = false;
      if (draft && draft.categorySelectAll != null) {
        adminCategorySelectAll = !!draft.categorySelectAll;
      } else if (adminSetupEditId) {
        var editEntry = findRegistryEntry(adminSetupEditId);
        if (editEntry) adminCategorySelectAll = !!editEntry.categorySelectAll;
      }
      if (adminCategorySelectAll) {
        adminSetupCategories.forEach(function (c) {
          if (c.id !== "all") c.enabled = true;
        });
      }
      var editEntryForLayout = adminSetupEditId ? findRegistryEntry(adminSetupEditId) : null;
      if (draft && draft.resultsLayout) {
        adminSetupResultsLayout = draft.resultsLayout;
      } else {
        adminSetupResultsLayout = detectResultsLayoutFromAnalysis(
          lastMultiResult,
          editEntryForLayout
        );
      }
      if (adminSetupResultsLayout === "class") adminCategorySelectAll = true;
      bindAdminLayoutPicker();
      syncAdminLayoutUi();
      renderAdminSetupPanels();
      activeSubjectView = "all";
      activeClassFilter = null;
      var setupSheets = lastMultiResult.sheets.filter(function (s) {
        return !isListSheetTab(s.sheetName);
      });
      activeSheetView = setupSheets.length ? setupSheets[0].sheetName : null;
      applyInitialClassView(null, getClassTabsConfig());
      ensureClassSelectionForResults();
      applyRestoreView(
        Object.assign({}, restoreView || {}, {
          classFilter:
            restoreView && restoreView.classFilter
              ? restoreView.classFilter
              : restoreView && restoreView.class
                ? restoreView.class
                : activeClassFilter,
        })
      );
      updateAdminSetupPromptLivePreview();
      applyAdminSetupStep("configure");
      document.getElementById("results").classList.remove("visible");
      document.getElementById("results").innerHTML = "";
      setFabStackVisible(false);
      syncViewUrl();
      document.getElementById("adminSetupPanel").scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
      alert(err.message || "시트 분석에 실패했습니다.");

    } finally {
      analysisInFlight = false;

  function resolveSheetByClassKey(classKey, multi) {
    if (!classKey || !multi || !multi.sheets) return null;
    var target = normalizeSheetClassKey(classKey);
    var sheets = multi.sheets.filter(function (s) {
      return !isListSheetTab(s.sheetName);
    });
    for (var i = 0; i < sheets.length; i++) {
      if (normalizeSheetClassKey(sheets[i].sheetName) === target) return sheets[i];
    }
    for (var j = 0; j < sheets.length; j++) {
      var sheet = sheets[j];
      if (
        (sheet.rows || []).some(function (row) {
          return rowMatchesClassFilter(row, target);
        })
      ) {
        return sheet;
      }
    }
    return null;
  }

  function getActiveSheetAnalysis() {
    if (!lastMultiResult) return null;
    if (activeClassFilter) {
      var byClass = resolveSheetByClassKey(activeClassFilter, lastMultiResult);
      if (byClass) return byClass;
    }
    if (!activeSheetView) return null;
    return (
      lastMultiResult.sheets.find(function (s) {
        return s.sheetName === activeSheetView;
      }) || null
    );
  }

  function getActiveAnalysis() {
    var sheet = getActiveSheetAnalysis();
    if (!sheet) return null;
    return filterSheetAnalysisByClass(sheet, activeClassFilter);
  }

  function parseClassOrder(classLabel) {
    var m = String(classLabel || "").match(/(\d+)\s*반/);
    if (m) return parseInt(m[1], 10);
    if (String(classLabel || "").indexOf("미지정") >= 0) return 999;
    return 500;
  }

  function filterMissingNotInRows(rows, missing, sheetName) {
    var present = {};
    (rows || []).forEach(function (r) {
      var key = participationMatchKey(r, sheetName);
      if (key) present[key] = true;
      if (r.번호 != null && r.번호 > 0) present["#" + Number(r.번호)] = true;
    });
    return (missing || []).filter(function (student) {
      return !isParticipationPresent(student, present, sheetName);
    });
  }

  function cleanStudentNameForDisplay(name, num) {
    var nameStr = name ? String(name).trim() : "";
    if (!nameStr || num == null || num === "") return nameStr;
    var numStr = String(num).replace(/\s*번\s*$/, "").trim();
    var lead = nameStr.match(/^(\d{1,2})\s*(?:번\s*)?(.+)?$/);
    if (lead && String(lead[1]) === numStr) {
      return (lead[2] || "").trim();
    }
    return nameStr;
  }

  function formatStudentCompactLabel(num, name) {
    var numStr =
      num != null && num !== "" ? String(num).replace(/\s*번\s*$/, "").trim() : "";
    var nameStr = cleanStudentNameForDisplay(name, numStr || num);
    if (numStr && nameStr) return numStr + "번 " + nameStr;
    if (numStr) return numStr + "번";
    return nameStr;
  }

  function resolveStudentDisplayName(row, sheetName, classKey) {
    if (!row) return "";
    var name = row.이름 || (row._raw && row._raw.이름) || "";
    if (name) return cleanStudentNameForDisplay(name, row.번호);
    var meta = lastMultiResult && lastMultiResult.participationMeta;
    if (!meta || !meta.roster || !meta.roster.length || row.번호 == null) return "";
    var rosterKey = classKey || sheetName || row.반 || "";
    var entries = rosterEntriesForSheet(meta.roster, rosterKey);
    var num = Number(row.번호);
    var found = entries.find(function (entry) {
      return Number(entry.번호) === num;
    });
    return found && found.이름 ? String(found.이름) : "";
  }

  function dedupeMissingStudents(list) {
    var seen = {};
    return (list || []).filter(function (student) {
      var key =
        String(student.학번 || "") +
        "|" +
        String(student.번호 != null ? student.번호 : "") +
        "|" +
        String(student.이름 || "");
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
  }

  function setActiveClassFromTab(cls) {
    if (!cls) return;
    var classKey = cls.classKey || normalizeSheetClassKey(cls.label);
    var resolved =
      lastMultiResult && classKey
        ? resolveSheetByClassKey(classKey, lastMultiResult)
        : null;
    activeSheetView = (resolved && resolved.sheetName) || cls.sheetName;
    var hostKey = normalizeSheetClassKey(activeSheetView);
    activeClassFilter = classKey && classKey !== hostKey ? classKey : classKey || null;
  }

  function applyInitialClassView(entry, classTabs) {
    if (!classTabs || !classTabs.length || !lastMultiResult) return;
    var ordered = sortClassTabsByBanOrder(classTabs);
    setActiveClassFromTab(ordered[0]);
    if (entry && entry.tab) {
      var sheetList = lastMultiResult.sheets.map(function (s) {
        return { sheetName: s.sheetName };
      });
      activeSheetView = resolvePreferredSheetTab(sheetList, entry.tab) || activeSheetView;
      var match = classTabs.find(function (cls) {
        return (

  function sectionMatchesSubjectFilter(sec, subjectId) {
    if (!isMeaningfulSection(sec)) return false;
    if (subjectId === "teacher") return isTeacherMessageSection(sec);
    if (!subjectId || subjectId === "all") return !isTeacherMessageSection(sec);
    if (isTeacherMessageSection(sec)) return false;
    if (sec.subject) {
      var secSubj = matchKnownSubjectId(sec.subject) || sec.subject;
      if (secSubj === subjectId) return true;
      if (secSubj === "teacher" && subjectId === "teacher") return true;
    }
    var title = simplifySectionTitle(sec.title || "");
    if (matchKnownSubjectId(sec.title || "") === subjectId) return true;
    if (title === subjectId) return true;
    if (title.indexOf(subjectId) >= 0) return true;
    var catOpt = getSubjectFilterOptions().find(function (o) {
      return o.id === subjectId;

    if (catOpt && catOpt.label && (title === catOpt.label || title.indexOf(catOpt.label) >= 0)) {
      return true;

    return false;

  var SUBJECT_SECTOR_ORDER = [
    "국어",
    "수학",

    "한국사",
    "통합사회",
    "통합과학",
    TEACHER_MESSAGE_TITLE,
    "teacher",
  ];
  var SURVEY_SUBJECT_IDS = ["국어", "수학", "영어", "한국사", "통합사회", "통합과학"];
  var CORE_RESULTS_SUBJECT_IDS = SURVEY_SUBJECT_IDS.slice();

  function formatFieldLabelFromSheet(key) {
    return String(key || "")
      .trim()
      .replace(/^\[|\]$/g, "")
      .replace(/\s*:\s*$/, "")
      .replace(/^-\s*/, "");
  }

  function collectSubjectResponsesFromRow(row) {
    var bySubject = {};
    (row.sections || []).forEach(function (sec) {
      if (!isMeaningfulSection(sec)) return;
      if (isTeacherMessageSection(sec)) return;
      var subjId = matchKnownSubjectId(sec.subject || "") || matchKnownSubjectId(sec.title || "");
      if (!subjId) return;
      if (!bySubject[subjId]) {
        bySubject[subjId] = { id: subjId, fields: [], body: "" };
      }
      if (sec.fields && sec.fields.length) {
        sec.fields.forEach(function (f) {
          var label = formatFieldLabelFromSheet(f.key);
          if (!label) return;
          var existing = bySubject[subjId].fields.find(function (x) {
            return formatFieldLabelFromSheet(x.key) === label;
          });
          if (existing) {
            if (f.value) existing.value = f.value;
          } else {
            bySubject[subjId].fields.push({ key: label, value: f.value || "" });
          }
        });
      } else if (sec.body) {
        var parsed = parseSectionFields(sec.body);
        if (parsed.length) {
          parsed.forEach(function (f) {
            bySubject[subjId].fields.push({ key: formatFieldLabelFromSheet(f.key), value: f.value || "" });
          });
        } else {
          bySubject[subjId].body += (bySubject[subjId].body ? "\n" : "") + sec.body;
        }
      }
    });
    return bySubject;
  }

  function getTeacherSectionFromRow(row) {

    if (fromSheet && fromSheet.length) return fromSheet;
    return SURVEY_SUBJECT_IDS.slice();
  }

  function getSectionSubjectLabel(sec) {
    if (!sec) return "";
    if (isTeacherMessageSection(sec)) return TEACHER_MESSAGE_TITLE;
    var fromSubject = matchKnownSubjectId(sec.subject || "");
    if (fromSubject) return fromSubject === "teacher" ? TEACHER_MESSAGE_TITLE : fromSubject;
    var fromTitle = matchKnownSubjectId(sec.title || "");
    if (fromTitle) return fromTitle === "teacher" ? TEACHER_MESSAGE_TITLE : fromTitle;
    return "";

  function getSectionTopicLabel(sec) {
    if (!sec) return "";
    if (isTeacherMessageSection(sec)) return "";
    if (sec.fields && sec.fields.length) return "";
    var title = simplifySectionTitle(sec.title || "");
    if (isInternalSurveyFieldTitle(title)) return "";
    var subject = getSectionSubjectLabel(sec);
    if (subject && title && subject !== title && !matchKnownSubjectId(title)) return title;
    if (subject && title === subject) return "";
    if (matchKnownSubjectId(title)) return "";
    return title || "";

  function subjectSectorSortIndex(label) {
    var norm = label === "teacher" ? TEACHER_MESSAGE_TITLE : label;
    var idx = SUBJECT_SECTOR_ORDER.indexOf(norm);
    return idx >= 0 ? idx : 900;
