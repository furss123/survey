  function buildIndexPageUrl(state) {

  /** 설문 시트 기본 레이아웃: 1행=카테고리(헤더), B열=학번(4자리: 학년+반+번호), C열=이름 */

  const SURVEY_COL_NAME = 2;

  const CLASS_ALIASES = ["반", "class", "학급", "클래스", "반명"];
  const STUDENT_ID_ALIASES = ["학번", "student_id", "학생번호", "studentid"];
  const NUMBER_ALIASES = ["번호", "number", "no", "no."];
  const NAME_ALIASES = ["이름", "name", "성명", "학생"];
  const STUDENT_SELECTOR_HEADER_HINTS = ["번호와 이름을 선택", "번호와 이름"];
  const ROSTER_NAME_ALIASES = ["이름", "name", "성명", "성함", "studentname", "학생이름"];
  const COMPLETION_ALIASES = ["완료", "제출", "응답", "status", "상태", "completed", "done", "체크"];
  const CONTENT_ALIASES = ["상담", "내용", "응답", "메모", "비고", "고민", "주제", "프로필", "기록", "comment", "note"];
  const THEME_KEYWORDS = [
    { key: "진로", label: "진로·진학" },
    { key: "친구", label: "대인관계" },
    { key: "가족", label: "가정" },
    { key: "스트레스", label: "스트레스·정서" },
    { key: "학습", label: "학습" },
    { key: "건강", label: "건강" },
    { key: "또래", label: "또래 관계" },
    { key: "불안", label: "불안" },
  ];

  function groupBy(arr, keyFn) {
    const groups = {};
    for (const item of arr) {
      const key = keyFn(item);
      if (!groups[key]) groups[key] = [];
      groups[key].push(item);
    }
    return groups;
  }

  function sumBy(arr, fn) {
    return arr.reduce((s, x) => s + fn(x), 0);
  }

  function parseSpreadsheetId(url) {
    if (!url || typeof url !== "string") {
      throw new Error("유효한 Google Sheets URL이 필요합니다.");
    }
    const trimmed = url.trim();
    const match = trimmed.match(SPREADSHEET_ID_PATTERN);
    if (match && match[1]) return match[1];
    if (/^[a-zA-Z0-9-_]{20,}$/.test(trimmed)) return trimmed;
    throw new Error("스프레드시트 ID를 URL에서 찾을 수 없습니다. 공유 링크 형식을 확인해 주세요.");
  }

  function parseGvizJson(text) {
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if (start < 0 || end <= start) throw new Error("gviz 응답을 파싱할 수 없습니다.");
    return JSON.parse(text.slice(start, end + 1));
  }

  function parseTabsFromHtml(html) {
    var tabs = [];
    var re = /docs-sheet-tab[^>]*data-sheet-id="(\d+)"[^>]*aria-label="([^"]+)"/g;
    var m;
    while ((m = re.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: m[2] });
    }
    if (tabs.length) return tabs;
    var captionRe = /docs-sheet-tab-caption">([^<]+)</g;
    while ((m = captionRe.exec(html)) !== null) {
      tabs.push({ gid: null, title: m[1].trim() });
    }
    if (tabs.length) return tabs;
    var re2 = /"sheetId":(\d+)[^}]*"title":"((?:\\.|[^"\\])*)"/g;
    while ((m = re2.exec(html)) !== null) {
      var title = m[2].replace(/\\u([0-9a-fA-F]{4})/g, function (_, hex) {
        return String.fromCharCode(parseInt(hex, 16));
      });
      tabs.push({ gid: m[1], title: title });
    }
    if (tabs.length) return tabs;
    var re3 = /"gid":(\d+),"name":"((?:\\.|[^"\\])*)"/g;
    while ((m = re3.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: m[2] });
    }
    return tabs;
  }

  function sheetProbeSignature(values) {
    if (!values || !values.length) return "";
    var sample = values.slice(0, 3).map(function (row) {
      return (row || []).map(function (c) { return String(c || "").trim(); }).join(" ");
    }).join(" ");
    var m = sample.match(/\[(\d+반)\]/);
    return m ? m[1] : sample.slice(0, 80);
  }

  async function probeTabsByClassNames(spreadsheetId) {
    var probed = [];
    var seen = {};
    for (var i = 1; i <= 20; i++) {
      var title = i + "반";
      try {
        var values = await fetchSheetValuesGviz(spreadsheetId, { title: title });
        if (!values || !values.length) break;
        var sig = sheetProbeSignature(values);
        if (!sig || seen[sig]) break;
        seen[sig] = true;
        if (sig.indexOf("반") < 0 && probed.length) break;
        probed.push({ gid: null, title: title });
      } catch (err) {
        break;
      }
    }
    return probed;
  }

  async function probeTabsBySheetIndex(spreadsheetId) {
    var probed = [];
    var seen = {};
    for (var i = 1; i <= 20; i++) {
      try {
        var values = await fetchSheetValuesGviz(spreadsheetId, { title: "Sheet" + i });
        if (!values || !values.length) break;
        var sig = sheetProbeSignature(values);
        if (!sig || seen[sig]) break;
        seen[sig] = true;
        probed.push({ gid: null, title: "Sheet" + i });
      } catch (err) {
        break;
      }
    }
    return probed;
  }

  async function fetchSpreadsheetTabs(spreadsheetId) {
    var urls = [
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit?usp=sharing",
      "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit",
    ];
    for (var u = 0; u < urls.length; u++) {
      try {
        var res = await fetch(urls[u]);
        if (!res.ok) continue;
        var tabs = parseTabsFromHtml(await res.text());
        if (tabs.length) return tabs;
      } catch (err) { /* CORS or network */ }
    }
    var feedUrl = "https://spreadsheets.google.com/feeds/worksheets/" + spreadsheetId + "/public/full?alt=json";
    try {
      var feedRes = await fetch(feedUrl);
      if (feedRes.ok) {
        var feed = await feedRes.json();
        var entries = (feed && feed.feed && feed.feed.entry) || [];
        if (entries.length) {
          return entries.map(function (entry) {
            var gidMatch = String(entry.id || "").match(/gid=(\d+)/);
            return {
              gid: gidMatch ? gidMatch[1] : null,
              title: String(entry.title && entry.title.$t || entry.title || "시트").trim(),
            };
          });
        }
      }
    } catch (e) { /* feed unavailable */ }
    var classTabs = await probeTabsByClassNames(spreadsheetId);
    if (classTabs.length) return classTabs;
    var sheetTabs = await probeTabsBySheetIndex(spreadsheetId);
    if (sheetTabs.length) return sheetTabs;
    throw new Error("시트 탭을 찾을 수 없습니다. URL·공개 공유 설정을 확인하세요.");
  }

  function gvizTableToValues(json) {
    var table = json && json.table;
    if (!table || !table.rows || !table.rows.length) return [];
    var headers = (table.cols || []).map(function (c) { return String((c && c.label) || "").trim(); });
    var rows = table.rows.map(function (row) {
      return (row.c || []).map(function (cell) {
        if (cell == null) return "";
        if (cell.v != null) return String(cell.v);
        if (cell.f != null) return String(cell.f);
        return "";
      });
    });
    return [headers].concat(rows);
  }

  async function fetchSheetValuesGviz(spreadsheetId, tab) {
    var params = new URLSearchParams({ tqx: "out:json" });
    if (tab && tab.gid) params.set("gid", tab.gid);
    else if (tab && tab.title) params.set("sheet", tab.title);
    var url = "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/gviz/tq?" + params;
    var res = await fetch(url);
    if (!res.ok) throw new Error("공개 시트 조회 실패 (HTTP " + res.status + "). 시트가 '링크가 있는 모든 사용자'에게 공개되어 있는지 확인하세요.");
    return gvizTableToValues(parseGvizJson(await res.text()));
  }

  async function fetchAllSheetsGviz(spreadsheetId) {
    var tabs = await fetchSpreadsheetTabs(spreadsheetId);
    if (!tabs.length) tabs = [{ gid: null, title: null }];
    return Promise.all(tabs.map(async function (tab) {
      var values = await fetchSheetValuesGviz(spreadsheetId, tab);
      return {
        sheetName: tab.title || "시트1",
        gid: tab.gid,
        values: values,
        analysis: analyzeSheetData(values),

  }

  var PROFILE_HEADER_PATTERN = /^(?:👤\s*)?\[\d+반\]\s*\[\d+\]\s*\[[^\]]+\]\s*학생\s*프로필\s*/i;

  var PROFILE_KEYWORD_THEMES = [

    { re: /자신감|불안|긴장|걱정/gi, label: "시험·정서" },

  function escapeRegex(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

  function isMarkerOnlyTitle(title) {
    var t = String(title || "").trim();
    if (!t) return true;
    if (/^[\s💌📚📖📝✏️🎯⭐🔖•\-👤]+$/.test(t)) return true;
    if (/^👤\s*\[\d+반\]/.test(t)) return true;
    if (/학생\s*프로필\s*$/i.test(t) && t.length < 120) return true;
    return false;
  }

  function isMeaningfulSection(sec) {
    if (!sec) return false;
    if (sec.body && String(sec.body).trim()) return true;
    if (sec.fields && sec.fields.length) return true;
    return !isMarkerOnlyTitle(sec.title);
  }

  function hasProfileContent(text) {
    var s = String(text || "").trim();
    if (!s) return false;
    return PROFILE_PATTERN.test(s) || PROFILE_MARKERS_RE.test(s);
  }

  function longestCellText(cells) {
    var best = "";
    for (var i = 0; i < (cells || []).length; i++) {
      var c = String(cells[i] || "").trim();
      if (c.length > best.length) best = c;
    }
    return best;
  }

  function stripProfileHeader(text, meta) {
    var s = String(text || "").trim().replace(/^👤\s*/, "");
    if (meta && meta.반 != null && meta.번호 != null && meta.이름) {
      var classNum = String(meta.반).replace(/반$/, "");
      var specific = new RegExp(
        "^\\[?" + escapeRegex(classNum) + "반\\]?\\s*\\[?" + meta.번호 + "\\]?\\s*\\[?" + escapeRegex(meta.이름) + "\\]?\\s*학생\\s*프로필\\s*",
        "i"
      );
      s = s.replace(specific, "");
    }
    return s.replace(PROFILE_HEADER_PATTERN, "").trim();
  }

  function parseSectionFields(body) {
    var fields = [];
    var text = String(body || "").trim();
    if (!text) return fields;
    var re = /(?:^|[\n\r]|\s)-\s*([^:\n]+?)\s*:\s*([\s\S]*?)(?=(?:[\n\r]|\s)-\s*[^:]+:|$)/g;
    var m;
    while ((m = re.exec(text)) !== null) {
      var key = m[1].trim();
      var val = m[2].trim().replace(/\s+/g, " ");
      if (key && val) fields.push({ key: key, value: val });
    }
    if (!fields.length) {
      var inline = /-\s*([^:]+?)\s*:\s*([^-]+?)(?=\s*-\s*[^:]+:|$)/g;
      while ((m = inline.exec(text)) !== null) {
        fields.push({ key: m[1].trim(), value: m[2].trim() });
      }
    }
    return fields;
  }

  /** 과목 블록 제목에서 과목명만 추출 (예: 국어, 수학, 통합과학) */
  function simplifySectionTitle(title) {
    if (!title) return "응답";
    var t = String(title).trim();
    if (/💌|선생님께/.test(t)) return TEACHER_MESSAGE_TITLE;
    var subjectMatch = t.match(/과목\s*\d+\s*\(([^)]+)\)/);
    if (subjectMatch) return subjectMatch[1].trim();
    var lastParen = t.match(/\(([^)]+)\)\s*$/);
    if (lastParen) {
      var name = lastParen[1].trim();
      if (/^(국어|수학|영어|한국사|통합사회|통합과학|과학|사회|음악|체육|미술|역사|도덕|기술|정보)$/.test(name)) {
        return name;
      }
    }
    return t;
  }

  function parseTeacherSection(chunk) {
    var headerMatch = chunk.match(/^(💌[^\n"]*)/);
    var title = TEACHER_MESSAGE_TITLE;
    var quoteMatch = chunk.match(/[""]([^""]+)[""]/s) || chunk.match(/[""]([^""]+)[""]/);
    var body = quoteMatch ? quoteMatch[1].trim() : chunk.replace(/^💌[^\n]*\n?/, "").replace(title, "").trim();
    return { title: title, body: body, fields: [] };
  }

  function parseSubjectSections(chunk, parentTitle) {
    var sections = [];
    var parent = parentTitle || "";
    var parts = chunk.split(SUBJECT_START_RE).map(function (p) { return p.trim(); }).filter(Boolean);
    if (parts.length <= 1 && /과목\s*\d+\s*\(/.test(chunk)) parts = [chunk];
    for (var i = 0; i < parts.length; i++) {
      var part = parts[i];
      var subjMatch = part.match(/^(과목\s*\d+\s*\([^)]+\))/);
      if (!subjMatch) continue;
      var title = simplifySectionTitle(subjMatch[1].trim());
      var bodyStart = part.slice(subjMatch[0].length).trim();
      sections.push({ title: title, body: "", fields: parseSectionFields(bodyStart) });
    }
    return sections;
  }

  function parseSections(text, meta) {
    var body = stripProfileHeader(text, meta);
    if (!body) return [];
    body = body.replace(/^👤\s*/, "").trim();
    var sections = [];
    var chunks = body.split(SECTION_START_RE).map(function (c) { return c.trim(); }).filter(Boolean);
    var surveyParent = "";
    for (var ci = 0; ci < chunks.length; ci++) {
      var chunk = chunks[ci];
      if (/^💌/.test(chunk)) {
        sections.push(parseTeacherSection(chunk));
        continue;
      }
      if (/^📚|^영역별/.test(chunk)) {
        var parentMatch = chunk.match(/^((?:📚\s*)?영역별\s*\([^)]+\)\s*학습\s*설문[^\n]*)/)
          || chunk.match(/^(📚[^\n]+)/)
          || chunk.match(/^(영역별\s*\([^)]+\)[^\n]*)/);
        surveyParent = parentMatch ? parentMatch[1].trim() : chunk.split(/\n/)[0].trim();
        if (/과목\s*\d+\s*\(/.test(chunk)) {
          sections = sections.concat(parseSubjectSections(chunk, surveyParent));
        } else if (!SUBJECT_START_RE.test(chunk)) {
          var remainder = chunk.replace(surveyParent, "").trim();
          if (remainder && !isMarkerOnlyTitle(surveyParent)) {
            sections.push({ title: simplifySectionTitle(surveyParent), body: remainder, fields: [] });
          }
        }
        continue;
      }
      if (/^과목\s*\d+\s*\(/.test(chunk)) {
        sections = sections.concat(parseSubjectSections(chunk, surveyParent));
        continue;
      }
      var firstLine = chunk.split(/\n/)[0].trim();
      if (firstLine) {
        sections.push({
          title: simplifySectionTitle(firstLine),
          body: chunk.slice(firstLine.length).trim(),
          fields: parseSectionFields(chunk),
        });
      }
    }
    return sections.filter(isMeaningfulSection);
  }

  function parseProfileCategories(text, meta) {
    return parseSections(text, meta);
  }

  function rowHasSections(row) {
    return !!(row && row.sections && row.sections.length);
  }

  function enrichRowWithProfile(row, profileText, meta) {
    if (!hasProfileContent(profileText)) return row;
    var m = meta || extractProfileMeta(profileText);
    row.sections = parseSections(profileText, m);
    if (m) {
      if (!row.반 || row.반 === "(미입력)") row.반 = m.반;
      if (row.번호 == null) row.번호 = m.번호;
      if (!row.이름) row.이름 = m.이름;
    }
    row._raw = row._raw || {};
    row._raw.프로필 = profileText;
    return row;
  }

  function extractCommonThemes(rows) {
    var categoryFill = {};
    var keywordHits = {};
    for (var ri = 0; ri < rows.length; ri++) {
      var row = rows[ri];
      var sections = row.sections || parseSections((row._raw && row._raw.프로필) || "", null);
      for (var si = 0; si < sections.length; si++) {
        var title = sections[si].title;
        if (!title || /^[\s💌📚📖📝✏️🎯⭐🔖•\-]+$/.test(title)) continue;
        categoryFill[title] = (categoryFill[title] || 0) + 1;
      }
      var corpus = sections.map(function (s) {
        return (s.body || "") + " " + (s.fields || []).map(function (f) { return f.value; }).join(" ");
      }).join(" ");
      for (var ti = 0; ti < PROFILE_KEYWORD_THEMES.length; ti++) {
        var theme = PROFILE_KEYWORD_THEMES[ti];
        var matches = corpus.match(theme.re);
        if (matches && matches.length) {
          keywordHits[theme.label] = (keywordHits[theme.label] || 0) + matches.length;
        }
      }
    }
    var themes = [];
    for (var ckey in categoryFill) {
      themes.push({ 주제: ckey, 언급수: categoryFill[ckey], 유형: "category" });
    }
    for (var kkey in keywordHits) {
      themes.push({ 주제: kkey, 언급수: keywordHits[kkey], 유형: "keyword" });
    }
    themes.sort(function (a, b) { return b.언급수 - a.언급수; });
    return themes.slice(0, 10);
  }

  function extractProfileMeta(text) {
    const match = String(text || "").match(PROFILE_PATTERN);
    if (!match) return null;
    return { 반: match[1] + "반", 번호: Number(match[2]), 이름: match[3].trim() };
  }

  function isProfileSheetFormat(rawValues) {
    if (!rawValues || !rawValues.length) return false;
    var sampleRows = rawValues.slice(0, Math.min(8, rawValues.length));
    var hits = 0, checked = 0;
    for (var i = 0; i < sampleRows.length; i++) {
      var cells = sampleRows[i] || [];
      var joined = cells.map(function (c) { return String(c || "").trim(); }).join(" ");
      var longest = longestCellText(cells);
      var text = longest.length > joined.length * 0.55 ? longest : joined;
      if (!text) continue;
      checked += 1;
      if (hasProfileContent(text)) hits += 1;
    }
    return checked > 0 && hits >= Math.ceil(checked / 2);
  }

  function normalizeProfileSheet(rawValues) {
    var dataRows = rawValues.filter(function (row) {
      return row && row.some(function (cell) { return String(cell || "").trim() !== ""; });
    });
    var rows = dataRows.map(function (raw, rowIndex) {
      var text = longestCellText(raw.map(function (c) { return String(c || "").trim(); }));
      if (!text) text = raw.map(function (c) { return String(c || "").trim(); }).join("\n").trim();
      var meta = extractProfileMeta(text);
      if (!meta && !hasProfileContent(text)) return null;
      if (!meta) meta = { 반: "(미입력)", 번호: rowIndex + 1, 이름: "" };
      var sections = parseSections(text, meta);
      return {
        id: rowIndex + 1,
        반: meta.반,
        번호: meta.번호,
        이름: meta.이름,
        sections: sections,
        _raw: { 이름: meta.이름, 프로필: text, 본문: stripProfileHeader(text, meta) },
        완료: true,
      };
    }).filter(Boolean);
    rows.sort(function (a, b) {
      var c = String(a.반).localeCompare(String(b.반), "ko");
      if (c !== 0) return c;
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return {
      headers: ["반", "번호", "이름"],
      rows: rows,
      meta: { classColumn: "반", numberColumn: "번호", completionColumn: "(프로필 제출)", format: "profile" },
    };
  }

  function normalizeHeader(cell) {
    return String(cell || "").trim().toLowerCase().replace(/\s+/g, "");
  }

  function findColumnIndex(headers, aliases) {
    var normalized = headers.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (normalized[i] === key || normalized[i].indexOf(key) >= 0) return i;
      }
    }
    return -1;
  }

  /** 학번 4자리: 학년(1)+반(1)+번호(2). 예) 1101→1학년1반1번, 1320→1학년3반20번 */
  function normalizeStudentIdDigits(digits) {
    if (!digits) return "";
    if (digits.length > 4) return digits.slice(-4);
    if (digits.length === 3) return "1" + digits;
    return digits;
  }

  function formatStudentIdFromParsed(parsed) {
    if (parsed.grade == null || parsed.반 == null || parsed.번호 == null) return "";
    return (
      String(parsed.grade) +
      String(parsed.반) +
      String(parsed.번호).padStart(2, "0")
    );
  }

  function parseStudentId(value) {
    var s = coerceText(value);
    if (!s) return { grade: null, 반: null, 번호: null, 학번: "" };
    var cleaned = s.replace(/,/g, "");
    var asNum = Number(cleaned);
    if (Number.isFinite(asNum) && asNum >= 0 && asNum === Math.floor(asNum)) {
      cleaned = String(Math.floor(asNum));
    }
    var digits = normalizeStudentIdDigits(cleaned.replace(/\D/g, ""));
    if (digits.length === 4) {
      var parsed4 = {
        grade: parseInt(digits.charAt(0), 10),
        반: parseInt(digits.charAt(1), 10),
        번호: parseInt(digits.slice(2), 10),
      };
      parsed4.학번 = formatStudentIdFromParsed(parsed4);
      return parsed4;
    }
    if (digits.length === 5) {
      var parsed5 = {
        grade: parseInt(digits.charAt(0), 10),
        반: parseInt(digits.slice(1, 3), 10),
        번호: parseInt(digits.slice(3), 10),
      };
      parsed5.학번 = formatStudentIdFromParsed(parsed5);
      return parsed5;
    }
    var num = coerceNumber(s);
    return { grade: null, 반: null, 번호: num, 학번: "" };
  }

  function isStudentSelectorHeader(name) {
    var n = normalizeHeader(name);
    if (!n) return false;
    for (var i = 0; i < STUDENT_SELECTOR_HEADER_HINTS.length; i++) {
      if (n.indexOf(normalizeHeader(STUDENT_SELECTOR_HEADER_HINTS[i])) >= 0) return true;
    }
    return false;
  }

  function findStudentSelectorColumnIndices(headerRow) {
    var indices = [];
    (headerRow || []).forEach(function (h, idx) {
      if (isStudentSelectorHeader(h)) indices.push(idx);
    });
    return indices;
  }

  /** Google Forms 「번호와 이름을 선택하세요」 응답 파싱 */
  function parseStudentSelectorValue(value) {
    var text = coerceText(value);
    if (!text) return { 반: null, 번호: null, 이름: null };

    var profile = text.match(PROFILE_PATTERN);
    if (profile) {
      return {
        반: parseInt(profile[1], 10),
        번호: parseInt(profile[2], 10),
        이름: profile[3].trim(),
      };
    }

    var sidParsed = parseStudentId(text);
    if (sidParsed.반 != null && sidParsed.번호 != null) {
      return {
        반: sidParsed.반,
        번호: sidParsed.번호,
        이름: null,
      };
    }

    var classMatch = text.match(/(\d+)\s*반/);
    var ban = classMatch ? parseInt(classMatch[1], 10) : null;

    var triple = text.match(/^(\d+)\s*반\s+(\d+)\s+(.+)$/);
    if (triple) {
      return {
        반: parseInt(triple[1], 10),
        번호: parseInt(triple[2], 10),
        이름: triple[3].trim(),
      };
    }

    var numName = text.match(/^(\d+)\s+(.+)$/);
    if (numName) {
      return {
        반: ban,
        번호: parseInt(numName[1], 10),
        이름: numName[2].trim(),
      };
    }

    if (ban != null) return { 반: ban, 번호: null, 이름: null };
    return { 반: null, 번호: null, 이름: text };
  }

  function extractStudentFromSelectorCells(raw, selectorIndices) {
    var merged = { 반: null, 번호: null, 이름: null };
    (selectorIndices || []).forEach(function (idx) {
      var parsed = parseStudentSelectorValue(raw[idx]);
      if (parsed.반 != null && merged.반 == null) merged.반 = parsed.반;
      if (parsed.번호 != null && merged.번호 == null) merged.번호 = parsed.번호;
      if (parsed.이름 && !merged.이름) merged.이름 = parsed.이름;
    });
    return merged;
  }

  function findSurveyHeaderRowIndex(rawValues) {
    if (!rawValues || !rawValues.length) return SURVEY_HEADER_ROW_INDEX;
    var max = Math.min(10, rawValues.length);
    for (var i = 0; i < max; i++) {
      var headerRow = rawValues[i].map(coerceText);
      if (findStudentSelectorColumnIndices(headerRow).length) return i;
      if (findColumnIndex(headerRow, STUDENT_ID_ALIASES) >= 0) return i;
      if (findColumnIndex(headerRow, NAME_ALIASES) >= 0) return i;
      if (
        headerRow.some(function (h) {
          return normalizeHeader(h).indexOf("타임스탬프") >= 0;
        })
      ) {
        return i;
      }
    }
    return SURVEY_HEADER_ROW_INDEX;
  }

  function findIdentityColumnIndex(headerRow, aliases, excludeIndices) {
    var exclude = {};
    (excludeIndices || []).forEach(function (i) {
      exclude[i] = true;
    });
    var normalized = headerRow.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (exclude[i] || isStudentSelectorHeader(headerRow[i])) continue;
        if (normalized[i] === key || normalized[i].indexOf(key) >= 0) return i;
      }
    }
    return -1;
  }

  function resolveSurveyColumnIndices(headerRow) {
    var studentSelectorIndices = findStudentSelectorColumnIndices(headerRow);
    var studentIdIdx = findIdentityColumnIndex(headerRow, STUDENT_ID_ALIASES, studentSelectorIndices);
    var nameIdx = findIdentityColumnIndex(headerRow, NAME_ALIASES, studentSelectorIndices);
    var classIdx = findIdentityColumnIndex(headerRow, CLASS_ALIASES, studentSelectorIndices);
    var numberIdx = findIdentityColumnIndex(headerRow, NUMBER_ALIASES, studentSelectorIndices);
    var completionIdx = findIdentityColumnIndex(headerRow, COMPLETION_ALIASES, studentSelectorIndices);

    if (studentIdIdx < 0 && headerRow.length > SURVEY_COL_STUDENT_ID) {
      if (studentSelectorIndices.indexOf(SURVEY_COL_STUDENT_ID) < 0) {
        studentIdIdx = SURVEY_COL_STUDENT_ID;
      }
    }
    if (nameIdx < 0 && headerRow.length > SURVEY_COL_NAME) {
      if (studentSelectorIndices.indexOf(SURVEY_COL_NAME) < 0) {
        nameIdx = SURVEY_COL_NAME;
      }
    }
    if (numberIdx === studentIdIdx) numberIdx = -1;
    if (classIdx === studentIdIdx || classIdx === nameIdx) classIdx = -1;

    return {
      studentIdIdx: studentIdIdx,
      nameIdx: nameIdx,
      classIdx: classIdx,
      numberIdx: numberIdx,
      completionIdx: completionIdx,
      studentSelectorIndices: studentSelectorIndices,
    };
  }

  function isFixedSurveyColumnIndex(colIdx) {
    return colIdx === SURVEY_COL_STUDENT_ID || colIdx === SURVEY_COL_NAME;
  }

  function enrichRowWithTableCategories(row, headerRow, cells) {
    var sections = [];
    headerRow.forEach(function (title, colIdx) {
      if (isSkippableCategoryHeader(title, colIdx)) return;
      var body = coerceText(cells[colIdx]);
      if (!body) return;
      var sec = {
        title: categoryDisplayLabel(title) || coerceText(title) || "응답",
        body: body,
        fields: parseSectionFields(body),
      };
      if (isMeaningfulSection(sec)) sections.push(sec);
    });
    if (sections.length) {
      row.sections = sections;
    }
    return row;
  }

  function findColumnIndexExact(headers, aliases) {
    var normalized = headers.map(normalizeHeader);
    for (var a = 0; a < aliases.length; a++) {
      var key = normalizeHeader(aliases[a]);
      for (var i = 0; i < normalized.length; i++) {
        if (normalized[i] === key) return i;
      }
    }
    return -1;
  }

  function looksLikePersonName(value) {
    var t = coerceText(value);
    if (!t || t.length < 2 || t.length > 20) return false;
    if (/^\d+([.,]\d+)?$/.test(t)) return false;
    if (/[@./:\\]|https?:|^\d{4}[-/]/.test(t)) return false;
    return /[가-힣a-zA-Z]/.test(t);
  }

  function inferRosterNameColumnIndex(headerRow, dataRows, excludeIndices) {
    var exclude = {};
    (excludeIndices || []).forEach(function (i) {
      if (i >= 0) exclude[i] = true;
    });
    var exact = findColumnIndexExact(headerRow, ROSTER_NAME_ALIASES);
    if (exact >= 0 && !exclude[exact]) return exact;

    var sample = (dataRows || []).slice(0, 20);
    var bestIdx = -1;
    var bestScore = 0;
    for (var col = 0; col < headerRow.length; col++) {
      if (exclude[col]) continue;
      var score = 0;
      for (var r = 0; r < sample.length; r++) {
        if (looksLikePersonName(sample[r][col])) score += 1;
      }
      if (score > bestScore) {
        bestScore = score;
        bestIdx = col;
      }
    }
    return bestScore >= 2 ? bestIdx : -1;
  }

  function rosterEntriesForSheet(roster, sheetName) {
    if (!roster || !roster.length) return [];
    var filtered = rosterForSheet(roster, sheetName);
    var byNumber = {};
    filtered.forEach(function (entry) {
      if (entry.번호 == null || entry.번호 <= 0) return;
      var num = Number(entry.번호);
      var prev = byNumber[num];
      if (!prev) {
        byNumber[num] = {
          반: entry.반 || "",
          번호: num,
          이름: coerceText(entry.이름),
        };
        return;
      }
      if (!prev.이름 && entry.이름) prev.이름 = coerceText(entry.이름);
      if (!prev.반 && entry.반) prev.반 = entry.반;
    });
    return Object.keys(byNumber)
      .map(function (k) {
        return byNumber[k];
      })
      .sort(function (a, b) {
        return a.번호 - b.번호;
      });
  }

  function coerceNumber(value) {
    if (value === null || value === undefined || value === "") return null;
    var n = Number(String(value).replace(/[^\d.-]/g, ""));
    return Number.isFinite(n) ? n : null;
  }

  function coerceText(value) {
    if (value === null || value === undefined) return "";
    return String(value).trim();
  }

  function isCompletedValue(value) {
    var v = coerceText(value).toLowerCase();
    if (!v) return false;
    var done = ["y", "yes", "true", "1", "o", "완료", "제출", "응답완료", "done", "complete", "completed", "✓", "v"];
    if (done.indexOf(v) >= 0) return true;
    return v.indexOf("완료") >= 0 || v.indexOf("제출") >= 0;
  }

  function inferCompletionFromRow(cells, skipIndices) {
    var skip = {};
    for (var i = 0; i < skipIndices.length; i++) skip[skipIndices[i]] = true;
    for (var j = 0; j < cells.length; j++) {
      if (!skip[j] && isCompletedValue(cells[j])) return cells[j];
    }
    return "";
  }

  function pickContentPreview(headers, cells) {
    var contentIdx = findColumnIndex(headers, CONTENT_ALIASES);
    if (contentIdx >= 0) {
      var text = cells[contentIdx];
      return text.length > 120 ? text.slice(0, 120) + "…" : text;
    }
    var sorted = cells.filter(function (c) { return c.length > 8; }).sort(function (a, b) { return b.length - a.length; });
    var longest = sorted[0];
    if (!longest) return "";
    return longest.length > 120 ? longest.slice(0, 120) + "…" : longest;
  }

  function emptyAnalysis() {
    return {
      summary: { 총응답: 0, 완료건수: 0, 완료율: 0, 학급수: 0, 번호입력: 0, 이름입력: 0, 반미입력: 0 },
      byClass: [], columnInsights: [], themes: [], headers: [], rows: [], meta: { format: "empty" },
    };
  }

  function buildColumnInsights(headers, rows) {
    if (!headers || !headers.length || !rows.length) return [];
    return headers
      .map(function (name, colIdx) {
        if (isSkippableCategoryHeader(name, colIdx)) return null;
        var filled = rows.filter(function (r) {
          var val = (r._raw || {})[name || "col_" + colIdx];
          if (val == null) val = Object.values(r._raw || {})[colIdx];
          return coerceText(val) !== "";
        }).length;
        var isContent = CONTENT_ALIASES.some(function (a) {
          return normalizeHeader(name).indexOf(normalizeHeader(a)) >= 0;
        });
        return {
          열: name || "열" + (colIdx + 1),
          colIdx: colIdx,
          입력건수: filled,
          입력률: rows.length ? Math.round((filled / rows.length) * 1000) / 10 : 0,
          상담내용열: isContent,
        };
      })
      .filter(function (c) {
        return c && c.입력건수 > 0;
      })
      .sort(function (a, b) {
        return b.입력건수 - a.입력건수;
      })
      .slice(0, 12);
  }

  function detectThemes(rows) {
    var corpus = rows.map(function (r) {
      return Object.values(r._raw || {}).join(" ");
    }).join(" ").toLowerCase();
    var hits = THEME_KEYWORDS.map(function (t) {
      var regex = new RegExp(t.key, "gi");
      var count = (corpus.match(regex) || []).length;
      return { 주제: t.label, 언급수: count };
    }).filter(function (t) { return t.언급수 > 0; });
    hits.sort(function (a, b) { return b.언급수 - a.언급수; });
    return hits.slice(0, 6);
  }

  function buildAnalysisPayload(headers, rows, meta) {
    var grouped = groupBy(rows, function (r) { return r.반; });
    var total = rows.length;
    var completed = sumBy(rows, function (r) { return r.완료 ? 1 : 0; });
    var withNumber = rows.filter(function (r) { return r.번호 !== null; }).length;
    var withName = rows.filter(function (r) { return r.이름; }).length;
    var missingClass = rows.filter(function (r) { return r.반 === "(미입력)"; }).length;

    var byClass = Object.keys(grouped).map(function (className) {
      var classRows = grouped[className];
      var classTotal = classRows.length;
      var classCompleted = sumBy(classRows, function (r) { return r.완료 ? 1 : 0; });
      return {
        반: className,
        인원: classTotal,
        완료: classCompleted,
        완료율: classTotal ? Math.round((classCompleted / classTotal) * 1000) / 10 : 0,
      };
    }).sort(function (a, b) { return String(a.반).localeCompare(String(b.반), "ko"); });

    return {
      summary: {
        총응답: total,
        완료건수: completed,
        완료율: total ? Math.round((completed / total) * 1000) / 10 : 0,
        학급수: Object.keys(grouped).length,
        번호입력: withNumber,
        이름입력: withName,
        반미입력: missingClass,
      },
      byClass: byClass,
      columnInsights: buildColumnInsights(headers, rows),
      themes: detectThemes(rows),
      commonThemes: (meta.format === "profile" || rows.some(rowHasSections)) ? extractCommonThemes(rows) : [],
      headers: headers,
      rows: rows,
      meta: Object.assign({}, meta, { totalRows: total, classCount: Object.keys(grouped).length }),
    };
  }

  function analyzeSheetData(rawValues) {
    if (!rawValues || !rawValues.length) return emptyAnalysis();

    if (isProfileSheetFormat(rawValues)) {
      var profile = normalizeProfileSheet(rawValues);
      return buildAnalysisPayload(profile.headers, profile.rows, Object.assign({}, profile.meta, { format: "profile" }));
    }

    var headerRowIndex = findSurveyHeaderRowIndex(rawValues);
    var headerRow = rawValues[headerRowIndex].map(coerceText);
    var dataRows = rawValues.slice(headerRowIndex + 1).filter(function (row) {
      return row.some(function (cell) { return coerceText(cell) !== ""; });
    });

    var cols = resolveSurveyColumnIndices(headerRow);

    var rows = dataRows.map(function (raw, rowIndex) {
      var cells = headerRow.map(function (_, i) { return coerceText(raw[i]); });
      var sidRaw = cols.studentIdIdx >= 0 ? raw[cols.studentIdIdx] : "";
      var sidParsed = parseStudentId(sidRaw);
      var studentId =
        sidParsed.학번 ||
        formatStudentIdFromParsed(sidParsed) ||
        coerceText(sidRaw).replace(/\D/g, "");
      var classVal = cols.classIdx >= 0 ? coerceText(raw[cols.classIdx]) : "";
      if (!classVal && sidParsed.반 != null) classVal = sidParsed.반 + "반";
      var numberVal =
        cols.numberIdx >= 0
          ? coerceNumber(raw[cols.numberIdx])
          : sidParsed.번호;
      var nameVal = cols.nameIdx >= 0 ? coerceText(raw[cols.nameIdx]) : "";
      var fromSelectors = extractStudentFromSelectorCells(
        raw,
        cols.studentSelectorIndices
      );
      if (!classVal && fromSelectors.반 != null) classVal = fromSelectors.반 + "반";
      if (numberVal == null && fromSelectors.번호 != null) numberVal = fromSelectors.번호;
      if (!nameVal && fromSelectors.이름) nameVal = fromSelectors.이름;
      if (!studentId && fromSelectors.반 != null && fromSelectors.번호 != null) {
        var gradeHint = sidParsed.grade != null ? sidParsed.grade : 1;
        studentId = formatStudentIdFromParsed({
          grade: gradeHint,
          반: fromSelectors.반,
          번호: fromSelectors.번호,
        });
        if (sidParsed.grade == null) sidParsed.grade = gradeHint;
        if (sidParsed.반 == null) sidParsed.반 = fromSelectors.반;
        if (sidParsed.번호 == null) sidParsed.번호 = fromSelectors.번호;
      }
      var skipCols = [
        cols.classIdx,
        cols.studentIdIdx,
        cols.numberIdx,
        cols.nameIdx,
        cols.completionIdx,
      ]
        .concat(cols.studentSelectorIndices || [])
        .filter(function (i) {
          return i >= 0;
        });
      var skipUnique = [];
      skipCols.forEach(function (i) {
        if (skipUnique.indexOf(i) < 0) skipUnique.push(i);
      });
      skipCols = skipUnique;
      var completionRaw =
        cols.completionIdx >= 0
          ? raw[cols.completionIdx]
          : inferCompletionFromRow(cells, skipCols);
      var row = {
        id: rowIndex + 1,
        학번: studentId || null,
        학년: sidParsed.grade,
        반: classVal || "(미입력)",
        번호: numberVal,
        이름: nameVal,
        완료: isCompletedValue(completionRaw),
        미리보기: pickContentPreview(headerRow, cells),
        _raw: Object.fromEntries(
          headerRow.map(function (h, i) {
            return [h || "col_" + i, cells[i]];
          })
        ),
      };
      enrichRowWithTableCategories(row, headerRow, cells);
      var profileText = longestCellText(cells);
      if (hasProfileContent(profileText)) {
        return enrichRowWithProfile(row, profileText, extractProfileMeta(profileText));
      }
      return row;
    });

    return buildAnalysisPayload(headerRow, rows, {
      classColumn: cols.classIdx >= 0 ? headerRow[cols.classIdx] : "반(학번)",
      numberColumn:
        cols.numberIdx >= 0
          ? headerRow[cols.numberIdx]
          : headerRow[cols.studentIdIdx] || "학번(B열)",
      nameColumn: cols.nameIdx >= 0 ? headerRow[cols.nameIdx] : "이름(C열)",
      studentIdColumn:
        cols.studentIdIdx >= 0 ? headerRow[cols.studentIdIdx] : "학번(B열)",
      completionColumn:
        cols.completionIdx >= 0 ? headerRow[cols.completionIdx] : "(자동 추론)",
      format: "table",
      layout: "survey-b-col-student-id-c-col-name",
    });
  }

  function normalizeTabTitle(title) {
    return String(title || "").trim().toLowerCase().replace(/\s+/g, "");
  }

  function isListSheetTab(title) {
    var n = normalizeTabTitle(title);
    return n === "list" || n === "명단" || n === "학생명단" || n === "studentlist";
  }

  function normalizeSheetClassKey(value) {
    var t = String(value || "").trim();
    if (!t) return "";
    var m = t.match(/(\d+)\s*반/);
    if (m) return m[1] + "반";
    return t.toLowerCase().replace(/\s+/g, "");
  }

  function isMatrixClassRoster(rawValues) {
    if (!rawValues || !rawValues.length) return false;
    var headerRow = rawValues[0].map(coerceText);
    var classCols = 0;
    headerRow.forEach(function (h) {
      if (/^\d+\s*반$/.test(String(h || "").trim())) classCols += 1;
    });
    return classCols >= 2;
  }

  function parseMatrixClassRoster(rawValues) {
    if (!rawValues || !rawValues.length) return [];
    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });
    var numberIdx = findColumnIndexExact(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = 0;

    var classColumns = [];
    headerRow.forEach(function (h, idx) {
      if (idx === numberIdx) return;
      var m = String(h || "").trim().match(/^(\d+)\s*반$/);
      if (m) classColumns.push({ idx: idx, 반: m[1] + "반" });
    });
    if (!classColumns.length) return [];

    var roster = [];
    dataRows.forEach(function (raw, rowIndex) {
      var numberVal = numberIdx >= 0 ? coerceNumber(raw[numberIdx]) : null;
      if (numberVal == null) numberVal = rowIndex + 1;
      classColumns.forEach(function (col) {
        var nameVal = coerceText(raw[col.idx]);
        if (!nameVal) return;
        roster.push({ 반: col.반, 번호: numberVal, 이름: nameVal });
      });
    });
    roster.sort(function (a, b) {
      var classCmp = String(a.반).localeCompare(String(b.반), "ko");
      if (classCmp !== 0) return classCmp;
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return roster;
  }

  async function fetchClassRosterFromMaster() {
    var probeTitles = ["1반", "명단", "list"];
    for (var i = 0; i < probeTitles.length; i++) {
      try {
        var values = await fetchSheetValuesGviz(getClassRosterSpreadsheetId(), { title: probeTitles[i] });
        if (isMatrixClassRoster(values)) return parseMatrixClassRoster(values);
      } catch (err) { /* try next tab */ }
    }
    try {
      var tabs = await fetchSpreadsheetTabs(getClassRosterSpreadsheetId());
      if (tabs.length) {
        var values = await fetchSheetValuesGviz(getClassRosterSpreadsheetId(), tabs[0]);
        if (isMatrixClassRoster(values)) return parseMatrixClassRoster(values);
      }
    } catch (err) { /* master roster unavailable */ }
    return [];
  }

  function parseListRoster(rawValues) {
    if (!rawValues || !rawValues.length) return [];
    if (isMatrixClassRoster(rawValues)) return parseMatrixClassRoster(rawValues);
    var headerRow = rawValues[0].map(coerceText);
    var dataRows = rawValues.slice(1).filter(function (row) {
      return row && row.some(function (cell) { return coerceText(cell) !== ""; });
    });
    var classIdx = findColumnIndexExact(headerRow, CLASS_ALIASES);
    if (classIdx < 0) classIdx = findColumnIndex(headerRow, CLASS_ALIASES);
    var numberIdx = findColumnIndexExact(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0) numberIdx = findColumnIndex(headerRow, NUMBER_ALIASES);
    if (numberIdx < 0 && headerRow.length > 0) numberIdx = 0;
    var nameIdx = inferRosterNameColumnIndex(headerRow, dataRows, [classIdx, numberIdx]);

    var roster = [];
    dataRows.forEach(function (raw, rowIndex) {
      var classVal = classIdx >= 0 ? coerceText(raw[classIdx]) : "";
      var numberVal = numberIdx >= 0 ? coerceNumber(raw[numberIdx]) : null;
      var nameVal = nameIdx >= 0 ? coerceText(raw[nameIdx]) : "";
      if (numberVal == null && !nameVal) return;
      if (numberVal == null) numberVal = rowIndex + 1;
      roster.push({ 반: classVal, 번호: numberVal, 이름: nameVal });
    });
    roster.sort(function (a, b) {
      return (a.번호 || 0) - (b.번호 || 0);
    });
    return roster;
  }

  function rosterForSheet(roster, sheetName) {
    if (!roster || !roster.length) return [];
    var hasClass = roster.some(function (r) { return r.반; });
    if (!hasClass) return roster.slice();
    var sheetKey = normalizeSheetClassKey(sheetName);
    if (!sheetKey) return roster.slice();
    var filtered = roster.filter(function (r) {
      var classKey = normalizeSheetClassKey(r.반);
      return classKey === sheetKey || classKey.indexOf(sheetKey) >= 0 || sheetKey.indexOf(classKey) >= 0;
    });
    return filtered.length ? filtered : roster.slice();
  }

  function computeParticipationMeta(sheetAnalyses) {
    if (!sheetAnalyses || !sheetAnalyses.length) {
      return { maxExpected: 0, referenceSheetName: "", rosterSource: "responses" };
    }
    var ref = { name: sheetAnalyses[0].sheetName, count: sheetAnalyses[0].summary.총응답 || 0 };
    for (var i = 1; i < sheetAnalyses.length; i++) {
      var c = sheetAnalyses[i].summary.총응답 || 0;
      if (c > ref.count) ref = { name: sheetAnalyses[i].sheetName, count: c };
    }
    return {
      maxExpected: ref.count,
      referenceSheetName: ref.name,
      rosterSource: "responses",
      roster: [],
    };
  }

  function participationMatchKey(entry) {
    if (!entry) return "";
    var num = entry.번호 != null ? Number(entry.번호) : 0;
    if (!num || num <= 0) return "";
    var ban = entry.반 && entry.반 !== "(미입력)" ? normalizeSheetClassKey(entry.반) : "";
    return ban ? ban + ":" + num : String(num);
  }

  function computeSheetParticipation(rows, rosterOrMax, referenceSheetName, rosterSource, sheetName) {
    if (Array.isArray(rosterOrMax) && rosterOrMax.length) {
      var rosterSlice = sheetName
        ? rosterEntriesForSheet(rosterOrMax, sheetName)
        : rosterOrMax.slice();
      var present = {};
      (rows || []).forEach(function (r) {
        var key = participationMatchKey(r);
        if (key) present[key] = true;
      });
      var missingStudents = rosterSlice.filter(function (entry) {
        var key = participationMatchKey(entry);
        return key && !present[key];
      });
      return {
        referenceSheetName: referenceSheetName || "list",
        rosterSource: rosterSource || "list",
        maxExpected: rosterSlice.length,
        participated: rosterSlice.length - missingStudents.length,
        missingNumbers: missingStudents.map(function (s) { return s.번호; }),
        missingStudents: missingStudents,
        missingCount: missingStudents.length,
      };
    }

    var maxExpected = typeof rosterOrMax === "number" ? rosterOrMax : 0;
    if (!maxExpected) {
      return {
        referenceSheetName: referenceSheetName || "",
        rosterSource: rosterSource || "responses",
        maxExpected: 0,
        participated: 0,
        missingNumbers: [],
        missingStudents: [],
        missingCount: 0,
      };
    }
    var presentNums = {};
    (rows || []).forEach(function (r) {
      if (r.번호 != null && r.번호 > 0) presentNums[r.번호] = true;
    });
    var missing = [];
    for (var n = 1; n <= maxExpected; n++) {
      if (!presentNums[n]) missing.push(n);
    }
    return {
      referenceSheetName: referenceSheetName,
      rosterSource: rosterSource || "responses",
      maxExpected: maxExpected,
      participated: maxExpected - missing.length,
      missingNumbers: missing,
      missingStudents: missing.map(function (num) { return { 번호: num, 이름: "" }; }),
      missingCount: missing.length,
    };
  }

  function analyzeAllSheets(sheetInputs, externalRoster) {
    var listInput = null;
    var responseInputs = [];
    (sheetInputs || []).forEach(function (item) {
      if (isListSheetTab(item.sheetName)) listInput = item;
      else responseInputs.push(item);
    });
    var fullRoster =
      externalRoster && externalRoster.length
        ? externalRoster
        : listInput
          ? parseListRoster(listInput.values)
          : [];
    var rosterSource =
      externalRoster && externalRoster.length
        ? "master-roster"
        : listInput
          ? "list"
          : "responses";

    var sheetAnalyses = responseInputs.map(function (item) {
      var analysis = analyzeSheetData(item.values);
      analysis.meta = Object.assign({}, analysis.meta, { sheetName: item.sheetName });
      return Object.assign({ sheetName: item.sheetName }, analysis);
    });

    var partMeta = fullRoster.length
      ? {
          maxExpected: fullRoster.length,
          referenceSheetName:
            rosterSource === "master-roster"
              ? "명렬표"
              : listInput
                ? listInput.sheetName
                : "",
          rosterSource: rosterSource,
          roster: fullRoster,
          listTabName: listInput ? listInput.sheetName : null,
        }
      : computeParticipationMeta(sheetAnalyses);

    if (fullRoster.length) {
      partMeta.maxExpected = Math.max.apply(
        null,
        sheetAnalyses.map(function (sheet) {
          return rosterEntriesForSheet(fullRoster, sheet.sheetName).length;
        }).concat([0])
      );
    }

    sheetAnalyses.forEach(function (sheet) {
      if (fullRoster.length) {
        sheet.participation = computeSheetParticipation(
          sheet.rows,
          fullRoster,
          partMeta.referenceSheetName,
          rosterSource,
          sheet.sheetName
        );
      } else {
        sheet.participation = computeSheetParticipation(
          sheet.rows,
          partMeta.maxExpected,
          partMeta.referenceSheetName,
          partMeta.rosterSource,
          sheet.sheetName
        );
      }
    });
    var allRows = [];
    sheetAnalyses.forEach(function (sheet) {
      sheet.rows.forEach(function (row) {
        allRows.push(Object.assign({}, row, { 시트: sheet.sheetName }));
      });
    });
    var combined = buildAnalysisPayload(
      sheetAnalyses[0] && sheetAnalyses[0].headers ? sheetAnalyses[0].headers : [],
      allRows,
      { format: "multi", sheetCount: sheetAnalyses.length, sheetNames: sheetAnalyses.map(function (s) { return s.sheetName; }) }
    );
    return {
      sheets: sheetAnalyses,
      combined: combined,
      participationMeta: partMeta,
      sheetsMeta: {
        total: sheetAnalyses.length,
        listTab: listInput
          ? { name: listInput.sheetName, rosterCount: fullRoster.length }
          : null,
        recognized: sheetAnalyses.filter(function (s) { return s.summary.총응답 > 0; }).length,
        names: sheetAnalyses.map(function (s) { return s.sheetName; }),
        perSheet: sheetAnalyses.map(function (s) {
          return { name: s.sheetName, rows: s.summary.총응답 };
        }),
      },
    };
  }

  var sheetsData = {};
  var lastMultiResult = null;
  var analysisInFlight = false;

      "https://docs.google.com/spreadsheets/d/" + DEFAULT_RESPONSE_SHEET_ID + "/edit";

  function parseClassNumberFromLabel(label) {
    var m = String(label || "").trim().match(/^(\d+)\s*반$/);
    return m ? m[1] : null;
  }

  function expandRegistryForLaunch(registry) {
    var expanded = [];
    (registry || []).forEach(function (entry) {
      var classes = (entry.classes || []).filter(function (cls) {
        return cls.enabled !== false;
      });
      if (classes.length) {
        classes
          .slice()
          .sort(sortCategoriesByOrder)
          .forEach(function (cls) {
            expanded.push({
              id: entry.id + "::" + cls.id,
              label: cls.label || cls.sheetName,
              url: entry.url,
              tab: cls.sheetName,
              categories: entry.categories,
              classes: entry.classes,
              registryId: entry.id,
            });
          });
      } else {
        expanded.push(entry);
      }
    });
    return expanded;
  }

  /** 메인 화면: 설문 이름만 (이과·문과 등), 반별 분리 없음 */
  function getHomeSurveyEntries() {
    return SurveyForm.filterSheetEntriesOnly(loadSheetRegistry());
  }

  function stripDefaultClassButtons(registry) {
    if (!Array.isArray(registry)) return [];
    return registry.filter(function (item) {
      return !/^class-[1-8]$/.test(String(item && item.id || ""));
    });

  function loadSheetRegistry() {
    try {
      var raw = localStorage.getItem(SHEET_REGISTRY_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          var cleaned = SurveyForm.filterSheetEntriesOnly(
            stripDefaultClassButtons(parsed)
          );
          cleaned = SurveyForm.dedupeRegistryEntries(cleaned);
          if (cleaned.length !== parsed.length) saveSheetRegistry(cleaned);
          return cleaned;
        }
      }
    } catch (err) { /* ignore */ }
    return getDefaultSheetRegistry();
  }

  function saveSheetRegistry(registry) {
    localStorage.setItem(SHEET_REGISTRY_KEY, JSON.stringify(registry));
    try {
      window.dispatchEvent(new CustomEvent("survey-registry-updated"));

  async function refreshHomeSurveyList(options) {
    options = options || {};
    var token = ++homeSurveyListRefreshToken;
    var groups = document.getElementById("surveyListGroups");
    var refreshBtn = document.getElementById("homeListRefreshBtn");
    if (groups) groups.classList.add("is-refreshing");
    if (refreshBtn) refreshBtn.disabled = true;
    setHomeListStatus(options.loadingMessage || "목록 새로고침 중…", "is-busy");
    renderSheetButtonGrid();
    try {
      var merged =
        options.sync === false

  function mergeSavedClassPrefs(derived, saved) {
    if (!saved || !saved.length) return derived;

    derived.forEach(function (cls) {
      var prev = map[cls.id];
      if (!prev) return;
      if (prev.label) cls.label = prev.label;
      if (prev.sheetName) cls.sheetName = prev.sheetName;
      if (prev.classKey) cls.classKey = prev.classKey;
      if (prev.enabled !== undefined) cls.enabled = prev.enabled !== false;
      if (prev.order != null) cls.order = prev.order;
    });
    var derivedIds = {};
    derived.forEach(function (cls) {
      derivedIds[cls.id] = true;
    });
    saved.forEach(function (cls) {
      if (!derivedIds[cls.id] && cls.sheetName) {
        derived.push({
          id: cls.id,
          sheetName: cls.sheetName,
          label: cls.label || cls.sheetName,
          enabled: cls.enabled !== false,
          order: cls.order != null ? cls.order : derived.length,

  function matchCategoryIdForTitle(title) {
    var t = simplifySectionTitle(title || "");
    if (!t) return null;
    if (t === TEACHER_MESSAGE_TITLE) return "teacher";
    var known = ["국어", "수학", "영어", "한국사", "통합사회", "통합과학"];
    for (var i = 0; i < known.length; i++) {
      if (t === known[i] || t.indexOf(known[i]) >= 0) return known[i];
    }
    return slugCategoryId(t);
  }

  function deriveCategoriesFromAnalysis(multi) {
    var registry = {};
    var orderList = [];

    function registerTitle(rawTitle) {
      var label = categoryDisplayLabel(rawTitle);
      if (!label || isMarkerOnlyTitle(label)) return;
      var id = matchCategoryIdForTitle(rawTitle || label);
      if (!registry[id]) {
        registry[id] = {
          id: id,
          label: label,
          enabled: true,
          count: 0,
          firstOrder: orderList.length,
        };
        orderList.push(id);
      }
      registry[id].count += 1;
    }

    (multi && multi.sheets ? multi.sheets : []).forEach(function (sheet) {
      (sheet.rows || []).forEach(function (row) {
        if (!rowHasSections(row)) return;
        (row.sections || []).forEach(function (sec) {
          if (!isMeaningfulSection(sec)) return;
          registerTitle(sec.title || "");
        });
      });
      (sheet.headers || []).forEach(function (headerName, colIdx) {
        if (isSkippableCategoryHeader(headerName, colIdx)) return;
        registerTitle(headerName);
      });
      (sheet.columnInsights || []).forEach(function (col) {
        if (!col || !col.열 || col.입력건수 <= 0) return;
        if (isSkippableCategoryHeader(col.열, col.colIdx)) return;
        registerTitle(col.열);
      });
    });

    if (multi && multi.combined && multi.combined.commonThemes) {
      multi.combined.commonThemes.forEach(function (theme) {
        if (theme && theme.주제) registerTitle(theme.주제);
      });
    }

    orderList.sort(function (a, b) {
      var ca = registry[a].count;
      var cb = registry[b].count;
      if (cb !== ca) return cb - ca;
      return registry[a].firstOrder - registry[b].firstOrder;
    });

    var categories = [{ id: "all", label: "전체 선택", enabled: true, order: 0 }];
    orderList.forEach(function (id, idx) {
      var item = registry[id];
      categories.push({
        id: item.id,
        label: item.label,
        enabled: true,
        order: idx + 1,
        count: item.count,
      });
    });

    if (categories.length === 1) {
      categories.push({
        id: "cat-responses",
        label: "설문 응답",
        enabled: true,
        order: 1,
        count: 0,
      });
    }
    return categories;
  }

  function slugClassId(classKey) {
    var norm = normalizeSheetClassKey(classKey);
    if (!norm) return "class-unknown";
    return "class-" + norm.replace(/[^a-z0-9가-힣]/g, "-").slice(0, 32);
  }

  function isClassLikeSheetName(name) {
    return /(\d+)\s*반/.test(String(name || "").trim());
  }

  function resolveRowClassLabel(row) {
    if (!row) return "";
    if (row.학번) {
      var fromId = parseStudentId(row.학번);
      if (fromId.반 != null) return fromId.반 + "반";
    }
    var classVal = row.반 && row.반 !== "(미입력)" ? coerceText(row.반) : "";
    if (classVal) {
      var m = classVal.match(/(\d+)\s*반/);
      return m ? m[1] + "반" : classVal;
    }
    var raw = row._raw || {};
    var sid = "";
    Object.keys(raw).forEach(function (k) {
      if (sid) return;
      var nk = normalizeHeader(k);
      if (
        STUDENT_ID_ALIASES.some(function (a) {
          return normalizeHeader(a) === nk || nk.indexOf(normalizeHeader(a)) >= 0;
        })
      ) {
        sid = raw[k];
      }
    });
    if (!sid && raw[Object.keys(raw)[SURVEY_COL_STUDENT_ID]]) {
      sid = raw[Object.keys(raw)[SURVEY_COL_STUDENT_ID]];
    }
    var parsed = parseStudentId(sid);
    if (parsed.반 != null) return parsed.반 + "반";
    return "";
  }

  function rowMatchesClassFilter(row, classKey) {
    if (!classKey) return true;
    var target = normalizeSheetClassKey(classKey);
    if (!target) return true;
    var rowClass = resolveRowClassLabel(row);
    return normalizeSheetClassKey(rowClass) === target;
  }

  function countRowsForClass(sheet, classKey) {
    if (!sheet || !sheet.rows) return 0;
    if (!classKey || normalizeSheetClassKey(classKey) === normalizeSheetClassKey(sheet.sheetName)) {
      return sheet.summary ? sheet.summary.총응답 : sheet.rows.length;
    }
    return sheet.rows.filter(function (row) {
      return rowMatchesClassFilter(row, classKey);
    }).length;
  }

  function filterSheetAnalysisByClass(sheet, classKey) {
    if (!sheet) return null;
    if (!classKey || normalizeSheetClassKey(classKey) === normalizeSheetClassKey(sheet.sheetName)) {
      return sheet;
    }
    var rows = (sheet.rows || []).filter(function (row) {
      return rowMatchesClassFilter(row, classKey);
    });
    var payload = buildAnalysisPayload(
      sheet.headers || [],
      rows,
      Object.assign({}, sheet.meta || {}, { classFilter: classKey })
    );
    return Object.assign({}, sheet, payload, {
      rows: rows,
      participation: sheet.participation,
    });
  }

  function deriveClassesFromAnalysis(multi) {
    var registry = {};
    var orderList = [];

    function registerClass(hostSheetName, classKey, label, count) {
      var host = coerceText(hostSheetName);
      var key = normalizeSheetClassKey(classKey || label);
      if (!host || !key || isListSheetTab(host)) return;
      var m = String(label || classKey || "").match(/(\d+)\s*반/);
      var display = m ? m[1] + "반" : coerceText(label || classKey);
      var id = slugClassId(key);
      if (!registry[id]) {
        registry[id] = {
          id: id,
          sheetName: host,
          classKey: key,
          label: display,
          enabled: true,
          count: 0,
          firstOrder: orderList.length,
        };
        orderList.push(id);
      }
      registry[id].count += count || 0;
    }

    (multi && multi.sheets ? multi.sheets : []).forEach(function (sheet) {
      if (isListSheetTab(sheet.sheetName)) return;
      if (isClassLikeSheetName(sheet.sheetName)) {
        registerClass(
          sheet.sheetName,
          normalizeSheetClassKey(sheet.sheetName),
          sheet.sheetName,
          sheet.summary ? sheet.summary.총응답 : sheet.rows.length
        );
      }
      (sheet.rows || []).forEach(function (row) {
        var rowClass = resolveRowClassLabel(row);
        if (!rowClass) return;
        registerClass(sheet.sheetName, rowClass, rowClass, 1);
      });
    });

    orderList.sort(function (a, b) {
      var oa = parseClassOrder(registry[a].label || registry[a].classKey);
      var ob = parseClassOrder(registry[b].label || registry[b].classKey);
      if (oa !== ob) return oa - ob;
      return registry[a].firstOrder - registry[b].firstOrder;
    });

    return orderList.map(function (id, idx) {
      var item = registry[id];
      return {
        id: item.id,
        sheetName: item.sheetName,
        classKey: item.classKey,
        label: item.label,
        enabled: true,
        order: idx,
        count: item.count,
      };
    });

  function compareRowsByStudentId(a, b) {
    var pa = parseStudentId(a.학번 || "");
    var pb = parseStudentId(b.학번 || "");
    if (pa.반 != null && pb.반 != null && pa.반 !== pb.반) return pa.반 - pb.반;
    if (pa.번호 != null && pb.번호 != null && pa.번호 !== pb.번호) {
      return pa.번호 - pb.번호;
    }
    var na = a.번호 != null ? Number(a.번호) : 9999;
    var nb = b.번호 != null ? Number(b.번호) : 9999;
    if (na !== nb) return na - nb;
    return String(a.학번 || "").localeCompare(String(b.학번 || ""), "ko", {
      numeric: true,
    });
  }

  function fitHeaderTitleToMetaRow() {
    var block = document.querySelector(".header-brand-block");
    if (!block) return;
    var meta = block.querySelector(".header-meta-row");
    var h1 = block.querySelector("h1");
    if (!meta || !h1) return;
    var target = meta.getBoundingClientRect().width;
    if (target < 8) return;
    h1.style.fontSize = "";
    h1.style.letterSpacing = "";
    var rootPx = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
    var px = rootPx * 1.75;
    h1.style.fontSize = px + "px";
    var step = 0;
    while (h1.getBoundingClientRect().width > target + 1 && px > rootPx * 0.9 && step < 80) {
      px -= 0.5;
      h1.style.fontSize = px + "px";
      step++;
    }
    var spacing = 0;
    step = 0;
    while (h1.getBoundingClientRect().width < target - 1 && spacing < 0.24 && step < 100) {
      spacing += 0.008;
      h1.style.letterSpacing = spacing + "em";
      step++;
    }
  }

    if (analysisInFlight) return;

    currentLaunchEntry = null;
    document.body.classList.add("admin-setup-mode");

    var confirmBtn = document.getElementById("adminSetupConfirm");
    if (confirmBtn) {
      confirmBtn.textContent = adminSetupEditId ? "구성 저장" : "메인에 등록";

    document.getElementById("results").classList.remove("visible");
    document.getElementById("results").innerHTML = "";
    teardownScrollStudentTracker();
    setFabStackVisible(false);
    analysisInFlight = true;

    try {
      var id = parseSpreadsheetId(url);
      var sheetInputs = await fetchAllSheetsGviz(id);
      var masterRoster = await fetchClassRosterFromMaster();
      var hasData = sheetInputs.some(function (s) {
        return s.values && s.values.length;
      });
      if (!hasData) throw new Error("시트에 데이터가 없습니다. 공개 공유 설정을 확인하세요.");
      sheetsData[id] = sheetInputs;
      lastMultiResult = analyzeAllSheets(sheetInputs, masterRoster);
      var draftRaw = sessionStorage.getItem(ADMIN_SETUP_DRAFT_KEY);
      var draft = null;
      try {
        if (draftRaw) draft = JSON.parse(draftRaw);
      } catch (e) { /* ignore */ }
      adminSetupCategories = deriveCategoriesFromAnalysis(lastMultiResult);
      if (draft && draft.categories && draft.categories.length) {
        adminSetupCategories = mergeSavedCategoryPrefs(
          adminSetupCategories,
          draft.categories
        );
      }
      adminCategorySelectAll = false;
      if (draft && draft.categorySelectAll != null) {
        adminCategorySelectAll = !!draft.categorySelectAll;
      } else if (adminSetupEditId) {
        var editEntry = findRegistryEntry(adminSetupEditId);
        if (editEntry) adminCategorySelectAll = !!editEntry.categorySelectAll;
      }
      if (adminCategorySelectAll) {
        adminSetupCategories.forEach(function (c) {
          if (c.id !== "all") c.enabled = true;
        });
      }
      renderAdminSetupPanels();
      activeSubjectView = "all";
      activeClassFilter = null;
      var setupSheets = lastMultiResult.sheets.filter(function (s) {
        return !isListSheetTab(s.sheetName);
      });
      activeSheetView = setupSheets.length ? setupSheets[0].sheetName : null;
      applyInitialClassView(null, getClassTabsConfig());
      ensureClassSelectionForResults();
      applyRestoreView(
        Object.assign({}, restoreView || {}, {
          classFilter:

              ? restoreView.classFilter
              : restoreView && restoreView.class
                ? restoreView.class
                : activeClassFilter,
        })
      );
      renderResults(getActiveAnalysis(), id, lastMultiResult);
      syncViewUrl();

    } catch (err) {
      alert(err.message || "시트 분석에 실패했습니다.");

  function parseClassOrder(classLabel) {
    var m = String(classLabel || "").match(/(\d+)\s*반/);
    if (m) return parseInt(m[1], 10);
    if (String(classLabel || "").indexOf("미지정") >= 0) return 999;
    return 500;
  }

  function buildClassGroupsFromSheet(sheet) {
    if (!sheet) return [];
    var groupsMap = {};
    (sheet.rows || []).forEach(function (row) {
      var label = row.반 && row.반 !== "(미입력)" ? String(row.반) : "반 미지정";
      var key = normalizeSheetClassKey(label) || label;
      if (!groupsMap[key]) {
        groupsMap[key] = { classKey: key, label: label, rows: [], missing: [] };
      }
      groupsMap[key].rows.push(row);
    });
    var groups = Object.keys(groupsMap).map(function (k) {
      return groupsMap[k];
    });
    groups.forEach(function (g) {
      g.rows.sort(function (a, b) {
        var na = a.번호 != null ? Number(a.번호) : 9999;
        var nb = b.번호 != null ? Number(b.번호) : 9999;
        if (na !== nb) return na - nb;
        return String(a.이름 || "").localeCompare(String(b.이름 || ""), "ko");
      });
      var participated = g.rows.length;
      var missing = [];
      if (sheet.participation && sheet.participation.missingStudents) {
        missing = sheet.participation.missingStudents.filter(function (s) {
          var sk = normalizeSheetClassKey(s.반 || "");
          return sk === g.classKey || sk.indexOf(g.classKey) >= 0 || g.classKey.indexOf(sk) >= 0;
        });
        missing.sort(function (a, b) {
          return (a.번호 || 9999) - (b.번호 || 9999);
        });
      }
      g.missing = missing;
      g.participated = participated;
      g.total = participated + missing.length;
    });
    groups.sort(function (a, b) {
      return parseClassOrder(a.label) - parseClassOrder(b.label);
    });
    return groups;
  }

  function setActiveClassFromTab(cls) {
    if (!cls) return;
    activeSheetView = cls.sheetName;
    var classKey = cls.classKey || normalizeSheetClassKey(cls.label);
    var hostKey = normalizeSheetClassKey(cls.sheetName);
    activeClassFilter = classKey && classKey !== hostKey ? classKey : classKey || null;
  }

  function applyInitialClassView(entry, classTabs) {
    if (!classTabs || !classTabs.length || !lastMultiResult) return;
    var ordered = sortClassTabsByBanOrder(classTabs);
    setActiveClassFromTab(ordered[0]);
    if (entry && entry.tab) {
      var sheetList = lastMultiResult.sheets.map(function (s) {
        return { sheetName: s.sheetName };
      });
      activeSheetView = resolvePreferredSheetTab(sheetList, entry.tab) || activeSheetView;
      var match = classTabs.find(function (cls) {
        return (
          normalizeSheetClassKey(cls.sheetName) === normalizeSheetClassKey(activeSheetView) ||
          normalizeSheetClassKey(cls.classKey) === normalizeSheetClassKey(entry.tab) ||
          normalizeSheetClassKey(cls.label) === normalizeSheetClassKey(entry.tab)
        );
      });
      if (match) setActiveClassFromTab(match);
    }
  }

  function isTeacherMessageSection(sec) {
    return !!sec && simplifySectionTitle(sec.title || "") === TEACHER_MESSAGE_TITLE;
  }

  function sectionMatchesSubjectFilter(sec, subjectId) {
    if (!isMeaningfulSection(sec)) return false;
    if (subjectId === "teacher") return isTeacherMessageSection(sec);
    if (!subjectId || subjectId === "all") return !isTeacherMessageSection(sec);
    if (isTeacherMessageSection(sec)) return false;
    var title = simplifySectionTitle(sec.title || "");
    if (matchCategoryIdForTitle(sec.title || "") === subjectId) return true;

      return o.id === subjectId;

    if (catOpt && catOpt.label && (title === catOpt.label || title.indexOf(catOpt.label) >= 0)) {

    }
    return false;
  }

    if (!enabledIds.length) return isMeaningfulSection(sec);

  function teardownScrollStudentTracker() {
    if (scrollStudentObserver) {
      scrollStudentObserver.disconnect();
      scrollStudentObserver = null;
    }
    scrollStudentRatioMap = null;
    updateViewTracker(null);
  }

  function setupScrollStudentTracker() {
    teardownScrollStudentTracker();
    var results = document.getElementById("results");
    if (!results || !results.classList.contains("visible")) return;
    var cards = results.querySelectorAll(".student-card[data-student-num], .student-card[data-student-name]");
    if (!cards.length) return;

    scrollStudentRatioMap = new Map();
    var thresholds = [];
    for (var t = 0; t <= 20; t++) thresholds.push(t / 20);

    function pickCurrentCard() {
      var best = null;
      var bestRatio = 0;
      cards.forEach(function (card) {
        var ratio = scrollStudentRatioMap.get(card) || 0;
        if (ratio > bestRatio) {
          bestRatio = ratio;
          best = card;
        }
      });
      if (best && bestRatio > 0) {
        updateViewTracker(best);
      }
    }

    scrollStudentObserver = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          scrollStudentRatioMap.set(entry.target, entry.intersectionRatio);
        });
        pickCurrentCard();
      },
      { root: null, rootMargin: "-12% 0px -50% 0px", threshold: thresholds }
    );

    cards.forEach(function (card) {
      scrollStudentRatioMap.set(card, 0);
      scrollStudentObserver.observe(card);
    });
    updateViewTracker(cards[0]);
  }

    activeClassFilter = null;
    activeSubjectView = null;
    if (!adminSetupMode) currentLaunchEntry = null;
    if (errorEl) errorEl.hidden = true;
    if (homePanel) homePanel.hidden = false;
    if (results) {
      results.classList.remove("visible");
      results.innerHTML = "";
    }
    teardownScrollStudentTracker();
    setFabStackVisible(false);
    replaceIndexPageUrl({});
    refreshHomeSurveyList();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function syncResultsPrintState(el) {
    if (!el) return;
    var isTeacher = activeSubjectView === "teacher";
    el.classList.toggle("results-print-teacher", isTeacher);
    el.setAttribute("data-subject-view", activeSubjectView || "all");
  }

  function applyTeacherPrintGrid() {
    var list = document.querySelector("#results .student-cards-list");
    if (!list) return;
    var count = list.querySelectorAll(".student-card").length;
    var cols = 4;
    if (count > 32) cols = 6;
    else if (count > 24) cols = 5;
    list.style.setProperty("--teacher-print-cols", String(cols));
  }

  function shouldPrintOneStudentPerPage() {
    if (activeSubjectView === "teacher") return false;
    if (!activeClassFilter) return false;
    return (activeSubjectView || "all") === "all";
  }

  function setPrintMode(enabled) {
    var isTeacher = activeSubjectView === "teacher";
    var onePerPage = enabled && shouldPrintOneStudentPerPage();
    document.body.classList.toggle("is-printing-results", enabled);
    document.body.classList.toggle("print-teacher-mode", enabled && isTeacher);
    document.body.classList.toggle("print-one-student-per-page", onePerPage);
    var results = document.getElementById("results");
    if (results) results.classList.toggle("results-print-teacher", enabled && isTeacher);
    if (enabled && isTeacher) applyTeacherPrintGrid();
    else {
      var list = document.querySelector("#results .student-cards-list");
      if (list) list.style.removeProperty("--teacher-print-cols");
    }
  }

  function wrapResultsHtml(chromeHtml, bodyHtml) {
    var chrome = chromeHtml || "";
    var body = bodyHtml || "";
    if (!chrome) return body;
    return (
      '<div class="results-layout">' +
      '<div class="results-sticky-chrome no-print">' +
      chrome +
      "</div>" +
      '<div class="results-main">' +
      body +
      "</div></div>"
    );
  }

  function renderResultsChrome() {
    return renderSurveyViewHeader() + renderClassPickerBar();
  }

  function renderResults(data, spreadsheetId, multi) {
    var el = document.getElementById("results");
    ensureClassSelectionForResults();
    var sheet = getActiveSheetAnalysis();
    var analysis = data || getActiveAnalysis();
    showResultsView();
    setFabStackVisible(true);
    ensureActiveSubjectViewValid();

    var chromeHtml = renderResultsChrome();
    var bodyHtml = renderCategoryPickerBar();
    if (!sheet) {
      bodyHtml += '<p class="student-cards-empty">조회할 설문을 선택해 주세요.</p>';
      el.innerHTML = wrapResultsHtml(chromeHtml, bodyHtml);
      el.classList.add("visible");
      syncResultsPrintState(el);
      teardownScrollStudentTracker();
      bindResultTabs(el, spreadsheetId);
      return;
    }

    var s = sheet.summary;
    if (!s.총응답 && !(sheet.participation && sheet.participation.missingCount)) {
      bodyHtml += '<p class="student-cards-empty">이 설문에 분석할 데이터가 없습니다.</p>';
      el.innerHTML = wrapResultsHtml(chromeHtml, bodyHtml);
      el.classList.add("visible");
      syncResultsPrintState(el);
      teardownScrollStudentTracker();
      bindResultTabs(el, spreadsheetId);
      return;
    }

    bodyHtml += renderClassStudentList(analysis);

    el.innerHTML = wrapResultsHtml(chromeHtml, bodyHtml);
    el.classList.add("visible");
    syncResultsPrintState(el);

    bindResultTabs(el, spreadsheetId);
    setupScrollStudentTracker();
  }

  function bindResultTabs(el, spreadsheetId) {
    if (!el) return;
    var backBtn = document.getElementById("surveyBackBtn");
    if (backBtn) {
      backBtn.addEventListener("click", function () {
        showHomeView();
      });
    }
    el.querySelectorAll(".class-select-option").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var categoryId = btn.getAttribute("data-category");
        if (categoryId != null && categoryId !== "") {
          activeSubjectView = categoryId;
          renderResults(null, spreadsheetId, lastMultiResult);
          syncViewUrl();
          return;
        }
        activeSheetView = btn.getAttribute("data-sheet");
        activeClassFilter = btn.getAttribute("data-class") || null;
        renderResults(null, spreadsheetId, lastMultiResult);
        syncViewUrl();
      });
    });
  }

  var THEME_STORAGE_KEY = "school-theme-v1";

  function applyTheme(theme) {
    var isDark = theme === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
    localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
    var toggle = document.getElementById("themeToggle");
    if (toggle) {
      toggle.setAttribute("aria-label", isDark ? "라이트 모드" : "다크 모드");
      toggle.title = isDark ? "라이트 모드" : "다크 모드";
    }
  }

  function initTheme() {
    var saved = localStorage.getItem(THEME_STORAGE_KEY);
    if (saved === "dark" || saved === "light") {
      applyTheme(saved);
      return;
    }
    applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  }

  initTheme();
  document.getElementById("themeToggle").addEventListener("click", function () {
    var isDark = document.documentElement.getAttribute("data-theme") === "dark";
    applyTheme(isDark ? "light" : "dark");
  });
  scheduleHeaderTitleFit();
  window.addEventListener("resize", scheduleHeaderTitleFit);
  window.addEventListener("load", scheduleHeaderTitleFit);

  refreshHomeSurveyList({ sync: true, loadingMessage: "설문 목록 불러오는 중…" });
  var homeListRefreshBtn = document.getElementById("homeListRefreshBtn");
  if (homeListRefreshBtn) {
    homeListRefreshBtn.addEventListener("click", function () {
      refreshHomeSurveyList({ sync: true });
    });
  }
  window.addEventListener("pageshow", function () {
    refreshHomeSurveyList({ sync: true });
  });
  window.addEventListener("focus", function () {
    refreshHomeSurveyList({ sync: true });
  });
  window.addEventListener("survey-registry-updated", function () {
    refreshHomeSurveyList({ sync: true });
  });
  window.addEventListener("storage", function (e) {
    if (e.key === SHEET_REGISTRY_KEY || e.key === SurveyForm.REGISTRY_KEY) {
      refreshHomeSurveyList({ sync: true });
    }
  });

  document.getElementById("adminSetupConfirm").addEventListener("click", function () {
    confirmAdminSetup();
  });

  (function initAdminSetupFromQuery() {
    var params = new URLSearchParams(location.search);
    if (params.get("adminSetup") !== "1") return;
    if (typeof AdminSession === "undefined" || !AdminSession.isValid()) {
      alert("관리자 로그인이 필요합니다. 다시 로그인해 주세요.");
      location.href = "admin-login.html";
      return;
    }
    AdminSession.touch();
    AdminSession.bindActivity();
    var draft = null;
    try {
      var raw = sessionStorage.getItem(ADMIN_SETUP_DRAFT_KEY);
      if (raw) draft = JSON.parse(raw);
    } catch (err) { /* ignore */ }
    var label = params.get("label") || (draft && draft.label) || "새 시트";
    var url = params.get("url") || (draft && draft.url) || "";
    if (!url) {
      alert("시트 주소가 없습니다. 관리자에서 「카테고리 구성」을 다시 실행해 주세요.");
      location.href = "admin.html";
      return;
    }
    if (draft && draft.ts && Date.now() - draft.ts > 2 * 60 * 60 * 1000) {
      alert("미리보기 세션이 만료되었습니다. 관리자에서 「카테고리 구성」을 다시 실행해 주세요.");
      sessionStorage.removeItem(ADMIN_SETUP_DRAFT_KEY);
      location.href = "admin.html";
      return;
    }
    adminSetupEditId = draft && draft.editId ? draft.editId : null;
    sessionStorage.setItem(
      ADMIN_SETUP_DRAFT_KEY,
      JSON.stringify({
        label: label,
        url: url,
        ts: Date.now(),
        editId: adminSetupEditId,
        categories: draft && draft.categories ? draft.categories : null,
        classes: draft && draft.classes ? draft.classes : null,
        categorySelectAll: adminCategorySelectAll,
      })
    );
    replaceIndexPageUrl({
      adminSetup: "1",
      label: label,
      url: url,
      sheet: params.get("sheet"),
      class: params.get("class"),
      subject: params.get("subject"),
    });
    launchAdminSetup(label, url, {
      sheet: params.get("sheet"),
      class: params.get("class"),
      subject: params.get("subject"),
    });
  })();

  (function openSheetFromQuery() {
    var params = new URLSearchParams(location.search);
    if (params.get("adminSetup") === "1") return;
    var openId = params.get("open");
    if (!openId) return;
    var entry =
      resolveLaunchEntry(openId) ||
      getDefaultClassSheetButtons().find(function (item) {
        return item.id === openId;
      });
    if (entry) {
      var baseId = String(openId).split("::")[0];
      var regEntry = findRegistryEntry(baseId) || entry;
      launchSheetAnalysis(regEntry, null, {
        sheet: params.get("sheet"),
        class: params.get("class"),
        subject: params.get("subject"),
      });
    }
  })();

  var headerLogoHome = document.getElementById("headerLogoHome");
  if (headerLogoHome) {
    headerLogoHome.addEventListener("click", function (e) {
      var results = document.getElementById("results");
      if (results && results.classList.contains("visible")) {
        e.preventDefault();
        showHomeView();
      }
    });
  }

  document.getElementById("fabTop").addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  document.getElementById("fabBottom").addEventListener("click", function () {
    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
  });
  window.addEventListener("beforeprint", function () {
    var results = document.getElementById("results");
    if (results && results.classList.contains("visible")) setPrintMode(true);
  });
  window.addEventListener("afterprint", function () {
    setPrintMode(false);
  });

  document.getElementById("fabPrint").addEventListener("click", function () {
    var results = document.getElementById("results");
    if (!results.classList.contains("visible")) {
      alert("먼저 시트를 조회한 뒤 인쇄해 주세요.");
      return;
    }
    syncResultsPrintState(results);
    setPrintMode(true);
    window.print();
  });

})();
  </script>
</body>
</html>
