<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>설문 관리자 · 남악고</title>
  <!-- build: purge-active-btn -->
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --school-navy: #1e3a5f;
      --school-navy-dark: #0f2440;
      --school-navy-light: #3d6b9e;
      --school-accent: #c4a035;
      --school-accent-soft: #faf6eb;
      --school-danger: #b91c1c;
      --shadow-sm: 0 2px 8px rgba(15, 36, 64, 0.06);
      --shadow-md: 0 8px 24px rgba(15, 36, 64, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --content-max: 980px;
      --content-pad: 20px;
      --text-sm: 0.8125rem;
      --text-base: 0.875rem;
      --text-lg: 1.125rem;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --focus-ring: 0 0 0 3px rgba(61, 107, 158, 0.14);
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #ffffff;
      --theme-bg-muted: #f8fafc;
      --theme-text: #0f172a;
      --theme-text-muted: #475569;
      --theme-border: #c5d0de;
      --theme-border-light: #dce4ee;
      --theme-heading-strong: var(--school-navy-dark);
      --theme-heading: var(--school-navy);
      --theme-heading-accent: var(--school-navy-light);
      --theme-btn-top: #4a7ab0;
      --theme-btn-bottom: var(--school-navy);
      --theme-hover-bg: #eef4fb;
      --theme-hover-surface: #f1f5f9;
      --theme-logo-bg: #ffffff;
      --theme-accent-soft: var(--school-accent-soft);
      --theme-toggle-bg: rgba(255, 255, 255, 0.92);
      --theme-toggle-border: rgba(30, 58, 95, 0.28);
      --theme-toggle-icon: var(--school-navy);
      --border-strong: #b8c5d6;
      --border-accent: var(--school-navy-light);
      --accent: var(--school-navy-light);
      --accent-hover: var(--school-navy);
      --chip-active-text: #ffffff;
      --danger-bg: #fef2f2;
      --danger-text: var(--school-danger);
      --site-footer-h: 32px;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-bg-page: #0c1220;
      --theme-bg-panel: #1a2435;
      --theme-bg-muted: #2a3649;
      --theme-text: #f1f5f9;
      --theme-text-muted: #cbd5e1;
      --theme-border: #5a6d85;
      --theme-border-light: #3d4f66;
      --theme-heading-strong: #f8fafc;
      --theme-heading: #e8f0fc;
      --theme-heading-accent: #a8c9f0;
      --theme-btn-top: #5b8fc9;
      --theme-btn-bottom: #2d5580;
      --theme-accent-soft: rgba(212, 176, 72, 0.22);
      --theme-hover-bg: #33465c;
      --theme-hover-surface: #2f3d52;
      --theme-logo-bg: #243044;
      --theme-toggle-bg: #2a3649;
      --theme-toggle-border: #7b8da8;
      --theme-toggle-icon: #f8fafc;
      --border-strong: #6b7f99;
      --border-accent: #7eb3e8;
      --accent: #7eb3e8;
      --accent-hover: #bfdbfe;
      --chip-active-text: #ffffff;
      --danger-bg: rgba(185, 28, 28, 0.22);
      --danger-text: #fca5a5;
      --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.45);
      --focus-ring: 0 0 0 3px rgba(126, 179, 232, 0.45);
    }
    body {
      margin: 0;
      padding: 0 0 var(--site-footer-h);
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--theme-text);
      background: var(--theme-bg-page);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-header {
      max-width: var(--content-max);
      margin: var(--space-5) auto 0;
      padding: 0 var(--content-pad);
      width: 100%;
    }
    .site-header-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 18px 24px;
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .site-header-inner::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--school-navy-dark) 0%, var(--school-navy-light) 55%, var(--school-accent) 100%);
    }
    .school-logo-link {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      display: block;
      line-height: 0;
      border-radius: 50%;
      text-decoration: none;
      transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .school-logo-link:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .school-logo {
      position: relative;
      z-index: 1;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      background: var(--theme-logo-bg);
      flex-shrink: 0;
      border: 1px solid var(--theme-border-light);
      box-shadow: 0 1px 2px rgba(15, 36, 64, 0.04);
    }
    .site-header-text {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 8px;
    }
    .header-brand-block {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
    }
    .header-meta-row {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px 12px;
    }
    .header-school {
      margin: 0;
      padding: 0;
      font-size: clamp(1.02rem, 1.75vw, 1.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--theme-heading-strong);
      white-space: nowrap;
    }
    .site-header-text h1 {
      margin: 0;
      padding: 0;
      width: 100%;
      box-sizing: border-box;
      font-size: clamp(1.38rem, 2.55vw, 1.75rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1.15;
      color: var(--theme-heading-strong);
      white-space: nowrap;
    }
    .site-header-text h1 .header-em { color: var(--theme-heading-accent); }
    .header-subtitle {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      margin: 0;
      padding: 5px 12px;
      font-size: clamp(0.78rem, 1.1vw, 0.875rem);
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--theme-heading);
      background: var(--theme-accent-soft);
      border: 1px solid var(--theme-border);
      border-radius: 999px;
    }
    .theme-toggle {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--theme-toggle-border);
      border-radius: 50%;
      background: var(--theme-toggle-bg);
      color: var(--theme-toggle-icon);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .theme-toggle:hover {
      background: var(--theme-bg-muted);
      border-color: var(--border-accent);
      color: var(--theme-heading-strong);
      transform: translateY(-1px);
    }
    .theme-toggle svg { width: 20px; height: 20px; display: block; stroke: currentColor; }
    html[data-theme="dark"] .theme-toggle .theme-icon-moon,
    html:not([data-theme="dark"]) .theme-toggle .theme-icon-sun { display: none; }
    .app-layout {
      flex: 1;
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: var(--space-5) var(--content-pad) var(--space-6);
    }
    .search-container {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    html[data-theme="dark"] .school-logo {
      border-color: var(--border-strong);
    }
    html[data-theme="dark"] .search-container,
    html[data-theme="dark"] .site-header-inner {
      border-color: var(--border-strong);
    }
    .panel-section { padding: var(--space-6) 28px; }
    .section-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .section-head-row .section-label {
      margin-bottom: 0;
    }
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: calc(var(--text-lg) + 3pt);
      font-weight: 700;
      line-height: 1.35;
      color: var(--theme-heading);
      margin-bottom: var(--space-4);
    }
    .section-label::before {
      content: "";
      flex-shrink: 0;
      align-self: center;
      width: 3px;
      height: 1em;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--school-accent) 0%, var(--school-navy-light) 100%);
    }
    .login-gate {
      padding: var(--space-5);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      border: 1px solid var(--theme-border-light);
    }
    .login-gate label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--theme-text-muted);
    }
    .login-gate label:first-of-type { margin-top: 0; }
    .login-gate input {
      width: 100%;
      margin-top: 6px;
      padding: 11px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: 1rem;
    }
    .login-gate input:focus {
      outline: none;
      border-color: var(--border-accent);
      box-shadow: var(--focus-ring);
    }
    .admin-actions {
      margin-top: var(--space-4);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .admin-btn {
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), color 0.2s var(--ease);
    }
    .admin-btn:hover {
      border-color: var(--border-accent);
      color: var(--theme-heading);
      background: var(--theme-bg-muted);
    }
    .admin-btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--theme-btn-top) 0%, var(--theme-btn-bottom) 100%);
      color: var(--chip-active-text);
    }
    .admin-btn-primary:hover {
      filter: brightness(1.05);
      color: var(--chip-active-text);
    }
    html[data-theme="dark"] .admin-btn-primary:hover {
      filter: none;
      background: linear-gradient(180deg, #6ba3e0 0%, #3d6b9e 100%);
    }
    .admin-btn-edit {
      border-color: var(--school-accent);
      color: var(--theme-heading-strong);
      background: var(--theme-accent-soft);
    }
    .admin-btn-edit:hover {
      border-color: var(--border-accent);
      background: var(--theme-bg-muted);
      color: var(--theme-heading);
    }
    .admin-btn-danger {
      border-color: var(--danger-text);
      color: var(--danger-text);
      background: var(--danger-bg);
    }
    .registry-actions {
      margin: 0;
      flex-shrink: 0;
    }
    .admin-form label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--theme-text-muted);
    }
    .admin-form label:first-child { margin-top: 0; }
    .admin-form input {
      width: 100%;
      margin-top: 6px;
      padding: 9px 11px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-base);
    }
    .admin-form input:focus {
      outline: none;
      border-color: var(--border-accent);
      box-shadow: var(--focus-ring);
    }
    .admin-url-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-top: 6px;
    }
    .admin-url-row input {
      flex: 1;
      min-width: 0;
      margin-top: 0 !important;
    }
    .admin-url-row .admin-btn {
      flex-shrink: 0;
      align-self: stretch;
      white-space: nowrap;
    }
    .admin-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 14px;
      align-items: center;
    }
    .admin-toolbar .admin-btn,
    .admin-toolbar a.admin-btn {
      text-decoration: none;
    }
    .roster-summary {
      margin: 0 0 var(--space-4);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--theme-border-light);
      background: var(--theme-bg-muted);
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
    }
    .roster-summary.is-set {
      color: #0f766e;
      border-color: rgba(15, 118, 110, 0.35);
      font-weight: 600;
    }
    .auto-publish-panel {
      margin: 0 0 var(--space-4);
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--theme-border-light);
      background: var(--theme-bg-muted);
    }
    .auto-publish-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .auto-publish-title {
      margin: 0;
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--theme-heading);
    }
    .auto-publish-toggle {
      min-width: 84px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-size: var(--text-sm);
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), color 0.2s var(--ease);
    }
    .auto-publish-toggle.is-on {
      border-color: transparent;
      background: linear-gradient(180deg, var(--theme-btn-top) 0%, var(--theme-btn-bottom) 100%);
      color: var(--chip-active-text);
    }
    .auto-publish-toggle:hover {
      border-color: var(--border-accent);
    }
    .auto-publish-note {
      margin: 10px 0 0;
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
      line-height: 1.45;
    }
    .auto-publish-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .admin-form textarea {
      width: 100%;
      margin-top: 6px;
      padding: 9px 11px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-base);
      line-height: 1.45;
      min-height: 68px;
      resize: vertical;
    }
    .admin-form textarea:focus {
      outline: none;
      border-color: var(--border-accent);
      box-shadow: var(--focus-ring);
    }
    .admin-field-hint {
      margin: 6px 0 0;
      font-size: 0.78rem;
      color: var(--theme-text-muted);
    }
    html[data-theme="dark"] .roster-summary.is-set {
      color: #5eead4;
    }
    .roster-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--content-pad);
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(2px);
    }
    .roster-modal-overlay[hidden] {
      display: none !important;
    }
    .roster-modal {
      width: min(520px, 100%);
      max-height: 90vh;
      overflow: auto;
      padding: var(--space-5);
      border-radius: var(--radius-lg);
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      box-shadow: var(--shadow-md);
    }
    .roster-modal h2 {
      margin: 0 0 8px;
      font-size: var(--text-lg);
      color: var(--theme-heading-strong);
    }
    .roster-modal-desc {
      margin: 0 0 var(--space-4);
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
      line-height: 1.5;
    }
    .roster-modal label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--theme-heading);
    }
    .roster-modal input[type="url"] {
      width: 100%;
      margin-top: 0;
    }
    .roster-modal-remember {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: var(--space-4) 0;
      font-size: var(--text-sm);
      color: var(--theme-text);
      cursor: pointer;
    }
    .roster-modal-remember input {
      margin-top: 3px;
      flex-shrink: 0;
    }
    .roster-modal-error {
      margin: 0 0 var(--space-3);
      font-size: var(--text-sm);
      color: var(--danger-text);
      font-weight: 600;
      min-height: 1.2em;
    }
    .roster-modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    #adminSurveyName.is-suggested {
      color: var(--theme-text-muted);
      font-weight: 500;
    }
    #adminSurveyName:not(.is-suggested) {
      color: var(--theme-text);
      font-weight: 600;
    }
    #adminSurveyName.is-loading {
      color: var(--theme-text-muted);
      font-style: italic;
    }
    .admin-registry-list li.is-removing {
      opacity: 0.35;
      pointer-events: none;
    }
    .admin-registry-list {
      margin: var(--space-4) 0 0;
      padding: 0;
      list-style: none;
    }
    .admin-registry-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-top: var(--space-4);
    }
    .admin-registry-status {
      flex: 1;
      min-width: 12rem;
      margin: 0;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--theme-text-muted);
    }
    .admin-registry-status.is-ok {
      color: #047857;
    }
    .admin-registry-status.is-warn {
      color: var(--danger-text);
    }
    .admin-registry-status.is-busy {
      color: var(--theme-heading);
    }
    #adminRegistryGroups.is-refreshing {
      opacity: 0.55;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    #adminRegistryGroups.is-flash {
      animation: registry-flash 0.55s ease;
    }
    @keyframes registry-flash {
      0% { box-shadow: 0 0 0 0 rgba(74, 122, 176, 0.45); }
      100% { box-shadow: 0 0 0 10px rgba(74, 122, 176, 0); }
    }
    .admin-registry-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      margin-bottom: 8px;
      font-size: var(--text-sm);
      color: var(--theme-text);
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease);
    }
    .admin-registry-list li:hover {
      border-color: var(--border-accent);
      background: var(--theme-hover-surface);
    }
    .registry-meta { min-width: 0; flex: 1; }
    .registry-meta strong { display: block; color: var(--theme-heading-strong); }
    .registry-meta span {
      display: block;
      margin-top: 4px;
      color: var(--theme-text-muted);
      word-break: break-all;
    }
    .registry-section-title {
      margin: var(--space-4) 0 10px;
      font-size: 0.875rem;
      font-weight: 800;
      color: var(--theme-heading);
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border-accent);
    }
    .registry-section-title--done {
      color: var(--theme-text-muted);
      border-bottom-color: var(--theme-border-light);
    }
    .survey-status-select {
      padding: 6px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      min-width: 7.5rem;
    }

  <script src="scripts/admin-session.js"></script>
  <script src="scripts/survey-form-shared.js"></script>
  <script>
(function () {
  "use strict";

  var ADMIN_SETUP_DRAFT_KEY = "school-admin-setup-draft-v1";
  var SHEET_REGISTRY_KEY = "school-sheet-registry-v1";
  var AUTO_PUBLISH_ENABLED_KEY = "school-auto-publish-enabled-v2";
  var AUTO_PUBLISH_CMD = ".\\scripts\\start-registry-sync.ps1";
  var SPREADSHEET_ID_PATTERN = /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }

  function coerceText(value) {
    if (value == null) return "";
    return String(value).trim();
  }

  function parseSpreadsheetId(url) {
    var trimmed = String(url || "").trim();
    var match = trimmed.match(SPREADSHEET_ID_PATTERN);
    if (match && match[1]) return match[1];
    if (/^[a-zA-Z0-9-_]{20,}$/.test(trimmed)) return trimmed;
    throw new Error("스프레드시트 ID를 URL에서 찾을 수 없습니다.");
  }

  function normalizeSheetRegistry(registry) {
    return SurveyForm.dedupeRegistryEntries(
      SurveyForm.filterSheetEntriesOnly(registry || []).filter(function (entry) {
        return entry && entry.id && !SurveyForm.isSurveyDeleted(entry.id);
      })
    );
  }

  function loadSheetRegistry() {
    try {
      var raw = localStorage.getItem(SHEET_REGISTRY_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          var cleaned = normalizeSheetRegistry(parsed);
          if (cleaned.length !== parsed.length) {
            saveSheetRegistry(cleaned);
            SurveyForm.saveRegistry(cleaned);
          }
          return cleaned;
        }
      }
    } catch (err) { /* ignore */ }
    return [];
  }

  function saveSheetRegistry(registry) {
    localStorage.setItem(SHEET_REGISTRY_KEY, JSON.stringify(registry));
    try {
      window.dispatchEvent(new CustomEvent("survey-registry-updated"));
    } catch (err) { /* ignore */ }
  }

  function findRegistryEntry(id) {
    return loadSheetRegistry().find(function (item) {
      return item.id === id;
    });
  }

  var editingSheetId = null;
  var surveyNameSuggested = "";
  var surveyNameUserEdited = false;
  var surveyNameFetchToken = 0;
  var urlClearOnNextFocus = true;

  function normalizeSurveyName(text) {
    return String(text || "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function getSurveyNameInput() {
    return document.getElementById("adminSurveyName");
  }

  function getAnalysisPromptValue() {
    var input = document.getElementById("adminAnalysisPromptInput");
    return coerceText(input && input.value).slice(0, 500);
  }

  function getSurveyNameValue() {
    var input = getSurveyNameInput();
    if (!input) return "";
    var value = normalizeSurveyName(input.value);
    if (!value && surveyNameSuggested && !surveyNameUserEdited) {
      return surveyNameSuggested;
    }
    return value;
  }

  function applySuggestedSurveyName(name, asSuggested) {
    var input = getSurveyNameInput();
    if (!input) return;
    surveyNameSuggested = normalizeSurveyName(name);
    if (surveyNameUserEdited && !asSuggested) return;
    input.value = surveyNameSuggested;
    input.classList.toggle("is-suggested", !!asSuggested && !!surveyNameSuggested);
    input.classList.remove("is-loading");
  }

  function setSurveyNameLoading(loading) {
    var input = getSurveyNameInput();
    if (!input || surveyNameUserEdited) return;
    if (loading) {
      input.classList.add("is-loading");
      input.classList.remove("is-suggested");
      input.value = "시트 이름 불러오는 중…";
    } else {
      input.classList.remove("is-loading");
    }
  }

  function parseTabsFromHtml(html) {
    var tabs = [];
    var re = /docs-sheet-tab[^>]*data-sheet-id="(\d+)"[^>]*aria-label="([^"]+)"/g;
    var m;
    while ((m = re.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: m[2] });
    }
    return tabs;
  }

  async function fetchSpreadsheetMeta(spreadsheetId) {
    var docTitle = "";
    var tabTitles = [];
    try {
      var res = await fetch(
        "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit"
      );
      if (res.ok) {
        var html = await res.text();
        var titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
        if (titleMatch) {
          docTitle = titleMatch[1]
            .replace(/\s*-\s*Google\s*Sheets.*$/i, "")
            .replace(/\s*-\s*Google\s*스프레드시트.*$/i, "")
            .trim();
        }
        tabTitles = parseTabsFromHtml(html).map(function (t) {
          return t.title;
        });
      }
    } catch (err) { /* ignore */ }

    return { docTitle: docTitle, tabTitles: tabTitles };
  }

  function buildSurveyNameSuggestion(meta) {
    var name = coerceText(meta && meta.docTitle);
    if (!name && meta && meta.tabTitles && meta.tabTitles.length) {
      var firstTab = coerceText(meta.tabTitles[0]);
      if (firstTab && firstTab !== "Sheet1") name = firstTab;
    }
    if (!name) name = "설문 결과";
    return normalizeSurveyName(name);
  }

  var suggestSurveyNameTimer = null;
  function scheduleSurveyNameSuggestion(url) {
    if (suggestSurveyNameTimer) clearTimeout(suggestSurveyNameTimer);
    suggestSurveyNameTimer = setTimeout(function () {
      suggestSurveyNameTimer = null;
      runSurveyNameSuggestion(url);
    }, 650);
  }

  async function runSurveyNameSuggestion(url) {
    if (surveyNameUserEdited || editingSheetId) return;
    var trimmed = coerceText(url);
    if (!trimmed) {
      surveyNameSuggested = "";
      var input = getSurveyNameInput();
      if (input) {
        input.value = "";
        input.classList.remove("is-suggested", "is-loading");
      }
      return;
    }
    var token = ++surveyNameFetchToken;
    setSurveyNameLoading(true);
    try {
      var spreadsheetId = parseSpreadsheetId(trimmed);
      var meta = await fetchSpreadsheetMeta(spreadsheetId);
      if (token !== surveyNameFetchToken || surveyNameUserEdited) return;
      var suggestion = buildSurveyNameSuggestion(meta);
      applySuggestedSurveyName(suggestion, true);
    } catch (err) {
      if (token !== surveyNameFetchToken || surveyNameUserEdited) return;
      var input = getSurveyNameInput();
      if (input) {
        input.classList.remove("is-loading", "is-suggested");
        if (input.value === "시트 이름 불러오는 중…") input.value = "";
      }
    }
  }

  function bindSurveyNameField() {
    var input = getSurveyNameInput();
    var urlInput = document.getElementById("adminSheetUrl");
    if (!input) return;

    input.addEventListener("focus", function () {
      input.classList.remove("is-suggested", "is-loading");
      if (input.value === "시트 이름 불러오는 중…") input.value = surveyNameSuggested || "";
    });

    input.addEventListener("input", function () {
      surveyNameUserEdited = true;
      input.classList.remove("is-suggested", "is-loading");
    });

    input.addEventListener("blur", function () {
      if (!coerceText(input.value) && surveyNameSuggested && !surveyNameUserEdited) {
        applySuggestedSurveyName(surveyNameSuggested, true);
      }
    });

    if (urlInput) {
      urlInput.addEventListener("focus", function () {
        if (editingSheetId || !urlClearOnNextFocus) return;
        urlClearOnNextFocus = false;
        urlInput.value = "";
        surveyNameSuggested = "";
        surveyNameUserEdited = false;
        surveyNameFetchToken++;
        if (input) {
          input.value = "";
          input.classList.remove("is-suggested", "is-loading");
        }
      });
      urlInput.addEventListener("input", function () {
        if (!editingSheetId) {
          surveyNameUserEdited = false;
          scheduleSurveyNameSuggestion(urlInput.value);
        }
      });
      urlInput.addEventListener("blur", function () {
        if (!editingSheetId) scheduleSurveyNameSuggestion(urlInput.value);
      });
    }
  }

  function setSheetFormMode(mode) {
    var submitBtn = document.getElementById("adminSheetSubmitBtn");
    var cancelBtn = document.getElementById("adminSheetCancelEditBtn");
    var labelInput = getSurveyNameInput();
    if (mode === "edit") {
      if (submitBtn) {
        submitBtn.textContent = "변경 저장";
        submitBtn.hidden = false;
      }
      if (cancelBtn) cancelBtn.hidden = false;
      if (labelInput) labelInput.focus();
    } else {
      editingSheetId = null;
      if (submitBtn) {
        submitBtn.textContent = "시트 추가";
        submitBtn.hidden = true;
      }
      if (cancelBtn) cancelBtn.hidden = true;
    }
  }

  function startEditSheet(id) {
    var entry = findRegistryEntry(id);
    if (!entry) {
      alert("시트 정보를 찾을 수 없습니다.");
      return;
    }
    editingSheetId = id;
    surveyNameUserEdited = true;
    surveyNameSuggested = entry.label || "";
    var nameInput = getSurveyNameInput();
    if (nameInput) {
      nameInput.value = entry.label || "";
      nameInput.classList.remove("is-suggested", "is-loading");
    }
    var promptInput = document.getElementById("adminAnalysisPromptInput");
    if (promptInput) promptInput.value = coerceText(entry.analysisPrompt || "");
    document.getElementById("adminSheetUrl").value = entry.url || "";
    setSheetFormMode("edit");
    document.getElementById("adminSheetForm").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function cancelEditSheet() {
    document.getElementById("adminSheetForm").reset();
    surveyNameUserEdited = false;
    surveyNameSuggested = "";
    surveyNameFetchToken++;
    urlClearOnNextFocus = true;
    var nameInput = getSurveyNameInput();
    if (nameInput) nameInput.classList.remove("is-suggested", "is-loading");
    var promptInput = document.getElementById("adminAnalysisPromptInput");
    if (promptInput) promptInput.value = "";
    setSheetFormMode("add");
  }

  function buildSheetOpenUrl(entry) {
    if (!entry || !entry.id) return "index.html";
    return "index.html?open=" + encodeURIComponent(entry.id);
  }

  function updateRegistryEntry(id, label, url, analysisPrompt) {
    var registry = loadSheetRegistry();
    var idx = registry.findIndex(function (item) {
      return item.id === id;
    });
    if (idx < 0) throw new Error("수정할 시트를 찾을 수 없습니다.");
    registry[idx] = Object.assign({}, registry[idx], {
      label: label,
      url: url,
      analysisPrompt: coerceText(analysisPrompt || "").slice(0, 500),
    });
    registry = normalizeSheetRegistry(registry);
    saveSheetRegistry(registry);
    SurveyForm.saveRegistry(registry);
  }

  var adminRegistryRefreshToken = 0;
  var registryDeleteInFlight = false;

  function setAdminRegistryStatus(text, kind) {
    var el = document.getElementById("adminRegistryStatus");
    if (!el) return;
    el.textContent = text || "";
    el.classList.remove("is-ok", "is-warn", "is-busy");
    if (kind) el.classList.add(kind);
  }

  function flashAdminRegistryGroups() {
    var groups = document.getElementById("adminRegistryGroups");
    if (!groups) return;
    groups.classList.remove("is-flash");
    void groups.offsetWidth;
    groups.classList.add("is-flash");
    window.setTimeout(function () {
      groups.classList.remove("is-flash");
    }, 600);
  }

  async function refreshAdminRegistryList(options) {
    options = options || {};
    var token = ++adminRegistryRefreshToken;
    var groups = document.getElementById("adminRegistryGroups");
    var refreshBtn = document.getElementById("adminRegistryRefreshBtn");
    if (groups) groups.classList.add("is-refreshing");
    if (refreshBtn) refreshBtn.disabled = true;
    setAdminRegistryStatus(
      options.loadingMessage || "목록을 서버와 맞추는 중…",
      "is-busy"
    );
    try {
      if (options.sync !== false) {
        var merged = normalizeSheetRegistry(
          await SurveyForm.refreshRegistryFromServer()
        );
        saveSheetRegistry(merged);
        SurveyForm.saveRegistry(merged);
      }
      if (token !== adminRegistryRefreshToken) return;
      renderAdminRegistryList();
      var count = loadSheetRegistry().length;
      var time = new Date().toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
      setAdminRegistryStatus(
        options.message ||
          "목록을 반영했습니다. (" + count + "개 · " + time + ")",
        options.kind || "is-ok"
      );
      flashAdminRegistryGroups();
    } catch (err) {
      if (token === adminRegistryRefreshToken) {
        renderAdminRegistryList();
        setAdminRegistryStatus(
          (err && err.message) || "목록 새로고침에 실패했습니다.",
          "is-warn"
        );
      }
    } finally {
      if (token === adminRegistryRefreshToken) {
        if (groups) groups.classList.remove("is-refreshing");
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }
  }

  async function deleteRegistryEntries(ids, options) {
    options = options || {};
    if (!ids || !ids.length) {
      setAdminRegistryStatus("삭제할 항목이 없습니다.", "is-warn");
      return;
    }
    if (registryDeleteInFlight) return;
    if (!options.skipConfirm) {
      var label =
        ids.length === 1 ? "이 항목" : "선택한 " + ids.length + "개 항목";
      if (!confirm(label + "을(를) 목록에서 삭제할까요?")) return;
    }
    if (editingSheetId && ids.indexOf(editingSheetId) >= 0) cancelEditSheet();

    registryDeleteInFlight = true;

    var prev = loadSheetRegistry();
    var toDelete = prev.filter(function (item) {
      return ids.indexOf(item.id) >= 0;
    });
    var next = prev.filter(function (item) {
      return ids.indexOf(item.id) < 0;
    });

    ids.forEach(function (id) {
      SurveyForm.markSurveyDeleted(id);
    });
    next = normalizeSheetRegistry(next);
    saveSheetRegistry(next);
    SurveyForm.saveRegistry(next);

    renderAdminRegistryList();
    flashAdminRegistryGroups();
    setAdminRegistryStatus(
      toDelete.length + "개를 목록에서 삭제했습니다.",
      "is-ok"
    );

    var warnings = [];
    try {
      for (var i = 0; i < toDelete.length; i++) {
        var purge = await SurveyForm.purgeSurveyFromServer(toDelete[i]);
        if (purge && purge.warnings && purge.warnings.length) {
          warnings = warnings.concat(purge.warnings);
        }
      }
      await refreshAdminRegistryList({
        sync: false,
        message:
          warnings.length > 0
            ? "삭제 반영 완료. " + warnings[0]
            : "삭제를 반영하고 목록에 반영했습니다.",
        kind: warnings.length > 0 ? "is-warn" : "is-ok",
      });
    } catch (err) {
      setAdminRegistryStatus(
        (err && err.message) || "서버 동기화 중 오류가 발생했습니다.",
        "is-warn"
      );
      renderAdminRegistryList();
    } finally {
      registryDeleteInFlight = false;
    }
  }

  function deleteRegistryEntry(id) {
    if (!id) return;
    deleteRegistryEntries([id]);
  }

  function sortRegistryForDisplay(registry) {
    return (registry || []).slice().sort(function (a, b) {
      var ac = SurveyForm.isSurveyCompleted(a) ? 1 : 0;
      var bc = SurveyForm.isSurveyCompleted(b) ? 1 : 0;
      if (ac !== bc) return ac - bc;
      return String(a.label || "").localeCompare(String(b.label || ""), "ko");
    });
  }

  function buildRegistryItemHtml(item) {
    return (
      "<li><div class=\"registry-meta\"><strong>" +
      esc(item.label) +
      "</strong><span>" +
      esc(item.url || "") +
      "</span></div><div class=\"admin-actions registry-actions\">" +
      "<button type=\"button\" class=\"admin-btn admin-btn-primary\" data-open-id=\"" +
      esc(item.id) +
      "\">조회</button><button type=\"button\" class=\"admin-btn admin-btn-edit\" data-config-id=\"" +
      esc(item.id) +
      "\">구성</button><button type=\"button\" class=\"admin-btn admin-btn-edit\" data-edit-id=\"" +
      esc(item.id) +
      "\">수정</button>" +
      "<button type=\"button\" class=\"admin-btn admin-btn-danger\" data-delete-id=\"" +
      esc(item.id) +
      "\">삭제</button></div></li>"
    );
  }

  function bindRegistryListEvents(listEl) {
    if (!listEl) return;
    listEl.querySelectorAll("[data-open-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-open-id");
        var entry = id ? findRegistryEntry(id) : null;
        if (entry) location.href = buildSheetOpenUrl(entry);
      });
    });
    listEl.querySelectorAll("[data-config-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-config-id");
        var entry = findRegistryEntry(id);
        if (!entry) return;
        sessionStorage.setItem(
          ADMIN_SETUP_DRAFT_KEY,
          JSON.stringify({
            label: entry.label,
            url: entry.url,
            ts: Date.now(),
            editId: entry.id,
            categories: entry.categories || null,
            classes: entry.classes || null,
            analysisPrompt: entry.analysisPrompt || "",
            categorySelectAll: !!entry.categorySelectAll,
          })
        );
        location.href =
          "index.html?adminSetup=1&label=" +
          encodeURIComponent(entry.label) +
          "&url=" +
          encodeURIComponent(entry.url);
      });
    });
    listEl.querySelectorAll("[data-edit-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-edit-id");
        if (id) startEditSheet(id);
      });
    });
    listEl.querySelectorAll("[data-delete-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete-id");
        if (id) deleteRegistryEntry(id);
      });
    });
  }

  function renderRegistrySection(listEl, emptyEl, items) {
    if (!listEl) return;
    if (!items.length) {
      listEl.innerHTML = "";
      listEl.hidden = true;
      if (emptyEl) emptyEl.hidden = false;
      return;
    }
    if (emptyEl) emptyEl.hidden = true;
    listEl.hidden = false;
    listEl.innerHTML = items.map(buildRegistryItemHtml).join("");
    bindRegistryListEvents(listEl);
  }

  function renderAdminRegistryList() {
    var groups = document.getElementById("adminRegistryGroups");
    var listEl = document.getElementById("adminRegistryList");
    var emptyEl = document.getElementById("adminRegistryEmpty");
    var registry = sortRegistryForDisplay(normalizeSheetRegistry(loadSheetRegistry()));
    if (!registry.length) {
      if (groups) groups.hidden = true;
      return;
    }
    if (groups) groups.hidden = false;
    renderRegistrySection(listEl, emptyEl, registry);
    stripLegacyAdminActions();
  }

  function stripLegacyAdminActions() {
    // 구버전 잔재: 전체삭제/선택삭제/지금 사이트 게시 버튼 제거
    [
      "adminRegistryBulkBar",
      "adminRegistrySelectAll",
      "adminRegistryDeleteSelected",
      "adminRegistryDeleteAll",
      "adminRegistryPurgeAll",
      "adminPublishNowBtn",
    ].forEach(function (id) {
      var el = document.getElementById(id);
      if (el && el.parentNode) el.parentNode.removeChild(el);
    });
    document.querySelectorAll("button, label, a").forEach(function (el) {
      var txt = coerceText(el.textContent);
      if (!txt) return;
      if (
        txt.indexOf("전체 삭제") >= 0 ||
        txt.indexOf("선택 삭제") >= 0 ||
        txt.indexOf("전체 선택") >= 0 ||
        txt.indexOf("지금 사이트") >= 0 ||
        txt.indexOf("사이트에 배치") >= 0
      ) {
        el.style.display = "none";
      }
    });
  }

  (function initRegistryLiveRefresh() {
    var refreshBtn = document.getElementById("adminRegistryRefreshBtn");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", function () {
        refreshAdminRegistryList({ sync: true });
      });
    }
    window.addEventListener("pageshow", function () {
      refreshAdminRegistryList({ sync: true });
    });
    window.addEventListener("storage", function (e) {
      if (e.key === SHEET_REGISTRY_KEY || e.key === SurveyForm.REGISTRY_KEY) {
        refreshAdminRegistryList({ sync: false });
      }
    });
    window.addEventListener("survey-registry-updated", function () {
      refreshAdminRegistryList({ sync: false });
    });
  })();

  (function initTheme() {
    var key = "school-theme-v1";
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
      localStorage.setItem(key, theme === "dark" ? "dark" : "light");
      var toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.setAttribute("aria-label", theme === "dark" ? "라이트 모드" : "다크 모드");
        toggle.title = theme === "dark" ? "라이트 모드" : "다크 모드";
      }
    }
    var saved = localStorage.getItem(key);
    if (saved === "dark" || saved === "light") applyTheme(saved);
    else applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.getElementById("themeToggle").addEventListener("click", function () {
      applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });
  })();

  function updateRosterSummary() {
    var el = document.getElementById("adminRosterSummary");
    if (!el) return;
    var cfg = SurveyForm.getActiveRosterConfig();
    if (!cfg || !cfg.id) {
      el.textContent = "명렬표 시트가 설정되지 않았습니다. 「명렬표 입력」을 눌러 주세요.";
      el.classList.remove("is-set");
      return;
    }
    var mode = cfg.remember
      ? "다음에도 기억"
      : "이번 브라우저 세션만";
    el.textContent = "명렬표 연결됨 · " + mode + " · ID " + cfg.id;
    el.classList.add("is-set");
  }

  function loadAutoPublishEnabled() {
    try {
      return localStorage.getItem(AUTO_PUBLISH_ENABLED_KEY) === "1";
    } catch (err) {
      return false;
    }
  }

  function saveAutoPublishEnabled(enabled) {
    try {
      localStorage.setItem(AUTO_PUBLISH_ENABLED_KEY, enabled ? "1" : "0");
    } catch (err) { /* ignore */ }
  }

  function renderAutoPublishState() {
    var btn = document.getElementById("autoPublishToggleBtn");
    var text = document.getElementById("autoPublishStatusText");
    if (!btn || !text) return;
    var enabled = loadAutoPublishEnabled();
    btn.textContent = enabled ? "켜짐" : "꺼짐";
    btn.classList.toggle("is-on", enabled);
    btn.setAttribute("aria-pressed", enabled ? "true" : "false");
    text.textContent = enabled
      ? "자동 게시: 켜짐 — PowerShell 동기화 스크립트가 실행 중이면 등록 변경이 자동 반영됩니다."
      : "자동 게시: 꺼짐 — 아래 버튼으로 PowerShell 명령을 복사해 바로 실행할 수 있습니다.";
  }

  function copyAutoPublishCommand() {
    var cmd = AUTO_PUBLISH_CMD;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(cmd).then(function () {
        setAdminRegistryStatus("PowerShell 명령을 복사했습니다: " + cmd, "is-ok");
      }).catch(function () {
        alert("PowerShell에서 다음 명령을 실행하세요:\n" + cmd);
      });
      return;
    }
    alert("PowerShell에서 다음 명령을 실행하세요:\n" + cmd);
  }

  function initAutoPublishToggle() {
    var btn = document.getElementById("autoPublishToggleBtn");
    var runBtn = document.getElementById("autoPublishRunBtn");
    renderAutoPublishState();
    if (btn) {
      btn.addEventListener("click", function () {
        var next = !loadAutoPublishEnabled();
        saveAutoPublishEnabled(next);
        renderAutoPublishState();
      });
    }
    if (runBtn) {
      runBtn.addEventListener("click", function () {
        copyAutoPublishCommand();
      });
    }
  }

  function openRosterModal() {
    var overlay = document.getElementById("rosterModalOverlay");
    var urlInput = document.getElementById("rosterModalUrl");
    var rememberInput = document.getElementById("rosterModalRemember");
    var errEl = document.getElementById("rosterModalError");
    if (!overlay || !urlInput) return;
    var active = SurveyForm.getActiveRosterConfig();
    var remembered = SurveyForm.loadRosterConfig();
    urlInput.value = (active && active.url) || "";
    rememberInput.checked = !!(remembered && remembered.remember) || !active;
    if (errEl) errEl.textContent = "";
    overlay.hidden = false;
    urlInput.focus();
  }

  function closeRosterModal() {
    var overlay = document.getElementById("rosterModalOverlay");
    if (overlay) overlay.hidden = true;
  }

  function saveRosterFromModal() {
    var urlInput = document.getElementById("rosterModalUrl");
    var rememberInput = document.getElementById("rosterModalRemember");
    var errEl = document.getElementById("rosterModalError");
    var url = coerceText(urlInput && urlInput.value);
    if (!url) {
      if (errEl) errEl.textContent = "구글 시트 주소를 입력해 주세요.";
      return;
    }
    try {
      var id = SurveyForm.parseSpreadsheetId(url);
      var remember = !!(rememberInput && rememberInput.checked);
      SurveyForm.saveRosterConfig({ url: url, id: id }, remember);
      updateRosterSummary();
      closeRosterModal();
    } catch (err) {
      if (errEl) errEl.textContent = err.message || "구글 시트 주소 형식을 확인해 주세요.";
    }
  }

  function initRosterModal() {
    var openBtn = document.getElementById("adminRosterOpenBtn");
    var cancelBtn = document.getElementById("rosterModalCancelBtn");
    var saveBtn = document.getElementById("rosterModalSaveBtn");
    var overlay = document.getElementById("rosterModalOverlay");
    if (openBtn) openBtn.addEventListener("click", openRosterModal);
    if (cancelBtn) cancelBtn.addEventListener("click", closeRosterModal);
    if (saveBtn) saveBtn.addEventListener("click", saveRosterFromModal);
    if (overlay) {
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) closeRosterModal();
      });
    }
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && overlay && !overlay.hidden) closeRosterModal();
    });
    updateRosterSummary();
  }

  if (!AdminSession.require()) return;

  stripLegacyAdminActions();
  initRosterModal();
  initAutoPublishToggle();
  refreshAdminRegistryList({ sync: true, loadingMessage: "설문 목록 불러오는 중…" });
  bindSurveyNameField();

  document.getElementById("adminLogoutBtn").addEventListener("click", function () {
    AdminSession.clear();
    location.href = "admin-login.html";
  });

  document.getElementById("adminSheetCancelEditBtn").addEventListener("click", function () {
    cancelEditSheet();
  });

  document.getElementById("adminSheetPreviewBtn").addEventListener("click", function () {
    var label = getSurveyNameValue();
    var analysisPrompt = getAnalysisPromptValue();
    var url = coerceText(document.getElementById("adminSheetUrl").value);
    if (!url) {
      alert("구글 시트 주소를 입력해 주세요.");
      return;
    }
    try {
      parseSpreadsheetId(url);
    } catch (err) {
      alert(err.message || "구글 시트 주소 형식을 확인해 주세요.");
      return;
    }
    if (!label) {
      alert("설문 이름을 입력하거나 추천 이름이 나올 때까지 잠시 기다려 주세요.");
      return;
    }
    sessionStorage.setItem(
      ADMIN_SETUP_DRAFT_KEY,
      JSON.stringify({
        label: label,
        url: url,
        ts: Date.now(),
        analysisPrompt: analysisPrompt,
      })
    );
    location.href =
      "index.html?adminSetup=1&label=" +
      encodeURIComponent(label) +
      "&url=" +
      encodeURIComponent(url);
  });

  document.getElementById("adminSheetForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var label = getSurveyNameValue();
    var analysisPrompt = getAnalysisPromptValue();
    var url = coerceText(document.getElementById("adminSheetUrl").value);
    if (!editingSheetId) {
      alert("새 시트는 주소 옆 「카테고리 구성」으로 미리보기·구성 후 등록해 주세요.");
      return;
    }
    if (!label || !url) {
      alert("설문 이름과 주소를 입력해 주세요.");
      return;
    }
    try {
      parseSpreadsheetId(url);
    } catch (err) {
      alert(err.message || "구글 시트 주소 형식을 확인해 주세요.");
      return;
    }
    if (editingSheetId) {
      var submitBtn = document.getElementById("adminSheetSubmitBtn");
      if (submitBtn) submitBtn.disabled = true;
      setAdminRegistryStatus("시트 정보 저장 중…", "is-busy");
      try {
        updateRegistryEntry(editingSheetId, label, url, analysisPrompt);
      } catch (err) {
        setAdminRegistryStatus(err.message || "시트 수정에 실패했습니다.", "is-warn");
        if (submitBtn) submitBtn.disabled = false;
        return;
      }
      cancelEditSheet();
      renderAdminRegistryList();
      flashAdminRegistryGroups();
      refreshAdminRegistryList({
        sync: false,
        message: "시트 정보를 수정했습니다.",
        kind: "is-ok",
      }).finally(function () {
        if (submitBtn) submitBtn.disabled = false;
      });
      return;
    }
  });

})();
  </script>
</body>
</html>
