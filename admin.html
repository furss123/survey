<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시트 관리 · 남악고 설문 결과</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --school-navy: #1e3a5f;
      --school-navy-dark: #0f2440;
      --school-navy-light: #3d6b9e;
      --school-accent: #c4a035;
      --school-accent-soft: #faf6eb;
      --school-danger: #b91c1c;
      --shadow-sm: 0 2px 8px rgba(15, 36, 64, 0.06);
      --shadow-md: 0 8px 24px rgba(15, 36, 64, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --content-max: 980px;
      --content-pad: 20px;
      --text-sm: 0.8125rem;
      --text-base: 0.875rem;
      --text-lg: 1.125rem;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --focus-ring: 0 0 0 3px rgba(61, 107, 158, 0.14);
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-bg-muted: #f8fafc;
      --theme-text: #1a2332;
      --theme-text-muted: #64748b;
      --theme-border: #d4dce8;
      --theme-border-light: #e8edf4;
      --site-footer-h: 32px;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-bg-page: #0f172a;
      --theme-bg-panel: #1e293b;
      --theme-bg-muted: #334155;
      --theme-text: #e2e8f0;
      --theme-text-muted: #94a3b8;
      --theme-border: #475569;
      --theme-border-light: #334155;
      --focus-ring: 0 0 0 3px rgba(61, 107, 158, 0.35);
    }
    body {
      margin: 0;
      padding: 0 0 var(--site-footer-h);
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--theme-text);
      background: var(--theme-bg-page);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-header {
      max-width: var(--content-max);
      margin: var(--space-5) auto 0;
      padding: 0 var(--content-pad);
      width: 100%;
    }
    .site-header-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5) 28px;
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .site-header-inner::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--school-navy-dark) 0%, var(--school-navy-light) 55%, var(--school-accent) 100%);
    }
    .school-logo-link {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      display: block;
      line-height: 0;
      border-radius: 50%;
      text-decoration: none;
      transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .school-logo-link:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .school-logo {
      position: relative;
      z-index: 1;
      width: 94px;
      height: 94px;
      border-radius: 50%;
      object-fit: contain;
      background: #fff;
      flex-shrink: 0;
      border: 1px solid var(--theme-border-light);
      box-shadow: 0 1px 2px rgba(15, 36, 64, 0.04);
    }
    .site-header-text {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
      min-height: 94px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 2pt;
    }
    .header-school {
      margin: 0;
      padding: 0;
      font-size: calc(clamp(0.95rem, 1.55vw, 1.125rem) + 1pt);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--school-navy);
    }
    .site-header-text h1 {
      margin: 0;
      padding: 0;
      font-size: calc(clamp(1.5rem, 3.4vw, 1.85rem) + 1pt);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.2;
      color: var(--school-navy-dark);
    }
    .site-header-text h1 .header-em { color: var(--school-navy); }
    .header-subline {
      margin: 0;
      padding: 0;
      line-height: 1;
    }
    .header-subtitle {
      display: inline-flex;
      align-items: center;
      margin: 0;
      padding: 4px 11px;
      font-size: calc(clamp(0.82rem, 1.25vw, 0.95rem) - 1pt);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--school-navy-dark);
      background: var(--school-accent-soft);
      border: 1px solid var(--theme-border-light);
      border-radius: 999px;
    }
    .theme-toggle {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid rgba(30, 58, 95, 0.22);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      color: var(--school-navy);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: var(--school-navy-light);
      transform: translateY(-1px);
    }
    .theme-toggle svg { width: 20px; height: 20px; display: block; }
    html[data-theme="dark"] .theme-toggle {
      border-color: rgba(226, 232, 240, 0.28);
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }
    html[data-theme="dark"] .theme-toggle .theme-icon-moon,
    html:not([data-theme="dark"]) .theme-toggle .theme-icon-sun { display: none; }
    .app-layout {
      flex: 1;
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: var(--space-5) var(--content-pad) var(--space-6);
    }
    .search-container {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .panel-section { padding: var(--space-6) 28px; }
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: calc(var(--text-lg) + 3pt);
      font-weight: 700;
      line-height: 1.35;
      color: var(--school-navy);
      margin-bottom: var(--space-4);
    }
    .section-label::before {
      content: "";
      flex-shrink: 0;
      align-self: center;
      width: 3px;
      height: 1em;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--school-accent) 0%, var(--school-navy-light) 100%);
    }
    .login-gate {
      padding: var(--space-5);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      border: 1px solid var(--theme-border-light);
    }
    .login-gate label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--theme-text);
    }
    .login-gate label:first-of-type { margin-top: 0; }
    .login-gate input {
      width: 100%;
      margin-top: 6px;
      padding: 11px 12px;
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: 1rem;
    }
    .login-gate input:focus {
      outline: none;
      border-color: var(--school-navy-light);
      box-shadow: var(--focus-ring);
    }
    .admin-actions {
      margin-top: var(--space-4);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .admin-btn {
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
    }
    .admin-btn-primary {
      border: none;
      background: linear-gradient(180deg, #4a7ab0 0%, var(--school-navy) 100%);
      color: #fff;
    }
    .admin-btn-edit {
      border-color: var(--school-accent);
      color: var(--school-navy-dark);
      background: var(--school-accent-soft);
    }
    .admin-btn-edit:hover {
      border-color: var(--school-navy-light);
      background: #fff8e6;
    }
    .admin-btn-danger {
      border-color: var(--school-danger);
      color: var(--school-danger);
      background: #fef2f2;
    }
    .registry-actions {
      margin: 0;
      flex-shrink: 0;
    }
    .admin-form label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
    }
    .admin-form label:first-child { margin-top: 0; }
    .admin-form input {
      width: 100%;
      margin-top: 6px;
      padding: 9px 11px;
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-base);
    }
    .admin-form input:focus {
      outline: none;
      border-color: var(--school-navy-light);
      box-shadow: var(--focus-ring);
    }
    .admin-url-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-top: 6px;
    }
    .admin-url-row input {
      flex: 1;
      min-width: 0;
      margin-top: 0 !important;
    }
    .admin-url-row .admin-btn {
      flex-shrink: 0;
      align-self: stretch;
      white-space: nowrap;
    }
    .admin-form-hint {
      margin: 8px 0 0;
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
      line-height: 1.45;
    }
    #adminSurveyName.is-suggested {
      color: var(--theme-text-muted);
      font-weight: 500;
    }
    #adminSurveyName:not(.is-suggested) {
      color: var(--theme-text);
      font-weight: 600;
    }
    #adminSurveyName.is-loading {
      color: var(--theme-text-muted);
      font-style: italic;
    }
    .admin-survey-name-hint {
      margin: 6px 0 0;
      font-size: 0.75rem;
      color: var(--theme-text-muted);
    }
    .admin-registry-list {
      margin: var(--space-4) 0 0;
      padding: 0;
      list-style: none;
    }
    .admin-registry-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--theme-border-light);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      margin-bottom: 8px;
      font-size: var(--text-sm);
    }
    .registry-meta { min-width: 0; flex: 1; }
    .registry-meta strong { display: block; color: var(--theme-text); }
    .registry-meta span {
      display: block;
      margin-top: 4px;
      color: var(--theme-text-muted);
      word-break: break-all;
    }
    .login-hint {
      margin: 10px 0 0;
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
    }
    .site-footer {
      margin-top: auto;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
    }
    #siteFooterRoot {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 850;
    }
    .site-footer-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 3px var(--content-pad);
      font-size: 0.78rem;
      color: var(--theme-text-muted);
      text-align: center;
    }
    @media (max-width: 720px) {
      .panel-section { padding: var(--space-5) var(--space-4); }
      .site-header-inner { flex-wrap: wrap; }
      .admin-registry-list li { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="school-logo-link" aria-label="설문 조회 홈">
        <img src="assets/namak-logo.png" alt="남악고등학교" class="school-logo" width="94" height="94">
      </a>
      <div class="site-header-text">
        <p class="header-school">남악고등학교 1학년</p>
        <h1><span class="header-em">설문조사 결과</span> 조회</h1>
        <p class="header-subline"><span class="header-subtitle">2026학년도</span></p>
      </div>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="다크 모드" title="다크 모드">
        <svg class="theme-toggle-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg class="theme-toggle-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="app-layout">
    <div class="search-container">
      <section class="panel-section">
        <div class="section-label">시트 등록·관리</div>
        <div id="adminPanel">
          <form id="adminSheetForm" class="admin-form">
            <label for="adminSheetUrl">구글 시트 주소</label>
            <div class="admin-url-row">
              <input type="url" id="adminSheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." required />
              <button type="button" class="admin-btn admin-btn-primary" id="adminSheetPreviewBtn">조회</button>
            </div>
            <label for="adminSurveyName">설문 이름</label>
            <input
              type="text"
              id="adminSurveyName"
              placeholder="주소 입력 후 시트 이름이 표시됩니다"
              autocomplete="off"
            />
            <p class="admin-survey-name-hint" id="adminSurveyNameHint">구글 시트 <strong>문서 이름(시트명)</strong>을 그대로 추천합니다. 클릭하면 수정할 수 있습니다.</p>
            <p class="admin-form-hint">새 시트는 <strong>조회</strong>로 카테고리별 미리보기·구성 후 등록합니다. (바로 추가하지 않음)</p>
            <div class="admin-actions">
              <button type="submit" class="admin-btn admin-btn-primary" id="adminSheetSubmitBtn" hidden>시트 추가</button>
              <button type="button" class="admin-btn" id="adminSheetCancelEditBtn" hidden>수정 취소</button>
              <button type="button" class="admin-btn" id="adminLogoutBtn">로그아웃</button>
            </div>
          </form>
          <ul id="adminRegistryList" class="admin-registry-list" aria-label="등록된 시트"></ul>
        </div>
      </section>
    </div>
  </div>

  <footer class="site-footer" id="siteFooterRoot">
    <div class="site-footer-inner">남악고등학교 설문 · 관리자</div>
  </footer>

  <script>
(function () {
  "use strict";

  var ADMIN_SESSION_KEY = "school-admin-session-v1";
  var ADMIN_SETUP_DRAFT_KEY = "school-admin-setup-draft-v1";
  var SHEET_REGISTRY_KEY = "school-sheet-registry-v1";
  var SPREADSHEET_ID_PATTERN = /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }

  function coerceText(value) {
    if (value == null) return "";
    return String(value).trim();
  }

  function isAdminSession() {
    return sessionStorage.getItem(ADMIN_SESSION_KEY) === "1";
  }

  function setAdminSession(active) {
    if (active) sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
    else sessionStorage.removeItem(ADMIN_SESSION_KEY);
  }

  function clearAdminSession() {
    sessionStorage.removeItem(ADMIN_SESSION_KEY);
  }

  window.addEventListener("pagehide", function () {
    var navEntries = performance.getEntriesByType && performance.getEntriesByType("navigation");
    var nav = navEntries && navEntries[0];
    if (nav && nav.type === "reload") return;
    clearAdminSession();
  });

  function parseSpreadsheetId(url) {
    var trimmed = String(url || "").trim();
    var match = trimmed.match(SPREADSHEET_ID_PATTERN);
    if (match && match[1]) return match[1];
    if (/^[a-zA-Z0-9-_]{20,}$/.test(trimmed)) return trimmed;
    throw new Error("스프레드시트 ID를 URL에서 찾을 수 없습니다.");
  }

  function loadSheetRegistry() {
    try {
      var raw = localStorage.getItem(SHEET_REGISTRY_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
      }
    } catch (err) { /* ignore */ }
    return [];
  }

  function saveSheetRegistry(registry) {
    localStorage.setItem(SHEET_REGISTRY_KEY, JSON.stringify(registry));
  }

  function findRegistryEntry(id) {
    return loadSheetRegistry().find(function (item) {
      return item.id === id;
    });
  }

  var editingSheetId = null;
  var surveyNameSuggested = "";
  var surveyNameUserEdited = false;
  var surveyNameFetchToken = 0;

  function normalizeSurveyName(text) {
    return String(text || "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function getSurveyNameInput() {
    return document.getElementById("adminSurveyName");
  }

  function getSurveyNameValue() {
    var input = getSurveyNameInput();
    if (!input) return "";
    var value = normalizeSurveyName(input.value);
    if (!value && surveyNameSuggested && !surveyNameUserEdited) {
      return surveyNameSuggested;
    }
    return value;
  }

  function applySuggestedSurveyName(name, asSuggested) {
    var input = getSurveyNameInput();
    if (!input) return;
    surveyNameSuggested = normalizeSurveyName(name);
    if (surveyNameUserEdited && !asSuggested) return;
    input.value = surveyNameSuggested;
    input.classList.toggle("is-suggested", !!asSuggested && !!surveyNameSuggested);
    input.classList.remove("is-loading");
  }

  function setSurveyNameLoading(loading) {
    var input = getSurveyNameInput();
    if (!input || surveyNameUserEdited) return;
    if (loading) {
      input.classList.add("is-loading");
      input.classList.remove("is-suggested");
      input.value = "시트 이름 불러오는 중…";
    } else {
      input.classList.remove("is-loading");
    }
  }

  function parseTabsFromHtml(html) {
    var tabs = [];
    var re = /docs-sheet-tab[^>]*data-sheet-id="(\d+)"[^>]*aria-label="([^"]+)"/g;
    var m;
    while ((m = re.exec(html)) !== null) {
      tabs.push({ gid: m[1], title: m[2] });
    }
    return tabs;
  }

  async function fetchSpreadsheetMeta(spreadsheetId) {
    var docTitle = "";
    var tabTitles = [];
    try {
      var res = await fetch(
        "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/edit"
      );
      if (res.ok) {
        var html = await res.text();
        var titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
        if (titleMatch) {
          docTitle = titleMatch[1]
            .replace(/\s*-\s*Google\s*Sheets.*$/i, "")
            .replace(/\s*-\s*Google\s*스프레드시트.*$/i, "")
            .trim();
        }
        tabTitles = parseTabsFromHtml(html).map(function (t) {
          return t.title;
        });
      }
    } catch (err) { /* ignore */ }

    return { docTitle: docTitle, tabTitles: tabTitles };
  }

  function buildSurveyNameSuggestion(meta) {
    var name = coerceText(meta && meta.docTitle);
    if (!name && meta && meta.tabTitles && meta.tabTitles.length) {
      var firstTab = coerceText(meta.tabTitles[0]);
      if (firstTab && firstTab !== "Sheet1") name = firstTab;
    }
    if (!name) name = "설문 결과";
    return normalizeSurveyName(name);
  }

  var suggestSurveyNameTimer = null;
  function scheduleSurveyNameSuggestion(url) {
    if (suggestSurveyNameTimer) clearTimeout(suggestSurveyNameTimer);
    suggestSurveyNameTimer = setTimeout(function () {
      suggestSurveyNameTimer = null;
      runSurveyNameSuggestion(url);
    }, 650);
  }

  async function runSurveyNameSuggestion(url) {
    if (surveyNameUserEdited || editingSheetId) return;
    var trimmed = coerceText(url);
    if (!trimmed) {
      surveyNameSuggested = "";
      var input = getSurveyNameInput();
      if (input) {
        input.value = "";
        input.classList.remove("is-suggested", "is-loading");
      }
      return;
    }
    var token = ++surveyNameFetchToken;
    setSurveyNameLoading(true);
    try {
      var spreadsheetId = parseSpreadsheetId(trimmed);
      var meta = await fetchSpreadsheetMeta(spreadsheetId);
      if (token !== surveyNameFetchToken || surveyNameUserEdited) return;
      var suggestion = buildSurveyNameSuggestion(meta);
      applySuggestedSurveyName(suggestion, true);
    } catch (err) {
      if (token !== surveyNameFetchToken || surveyNameUserEdited) return;
      var input = getSurveyNameInput();
      if (input) {
        input.classList.remove("is-loading", "is-suggested");
        if (input.value === "시트 이름 불러오는 중…") input.value = "";
      }
    }
  }

  function bindSurveyNameField() {
    var input = getSurveyNameInput();
    var urlInput = document.getElementById("adminSheetUrl");
    if (!input) return;

    input.addEventListener("focus", function () {
      input.classList.remove("is-suggested", "is-loading");
      if (input.value === "시트 이름 불러오는 중…") input.value = surveyNameSuggested || "";
    });

    input.addEventListener("input", function () {
      surveyNameUserEdited = true;
      input.classList.remove("is-suggested", "is-loading");
    });

    input.addEventListener("blur", function () {
      if (!coerceText(input.value) && surveyNameSuggested && !surveyNameUserEdited) {
        applySuggestedSurveyName(surveyNameSuggested, true);
      }
    });

    if (urlInput) {
      urlInput.addEventListener("input", function () {
        if (!editingSheetId) {
          surveyNameUserEdited = false;
          scheduleSurveyNameSuggestion(urlInput.value);
        }
      });
      urlInput.addEventListener("blur", function () {
        if (!editingSheetId) scheduleSurveyNameSuggestion(urlInput.value);
      });
    }
  }

  function setSheetFormMode(mode) {
    var submitBtn = document.getElementById("adminSheetSubmitBtn");
    var cancelBtn = document.getElementById("adminSheetCancelEditBtn");
    var labelInput = getSurveyNameInput();
    if (mode === "edit") {
      if (submitBtn) {
        submitBtn.textContent = "변경 저장";
        submitBtn.hidden = false;
      }
      if (cancelBtn) cancelBtn.hidden = false;
      if (labelInput) labelInput.focus();
    } else {
      editingSheetId = null;
      if (submitBtn) {
        submitBtn.textContent = "시트 추가";
        submitBtn.hidden = true;
      }
      if (cancelBtn) cancelBtn.hidden = true;
    }
  }

  function startEditSheet(id) {
    var entry = findRegistryEntry(id);
    if (!entry) {
      alert("시트 정보를 찾을 수 없습니다.");
      return;
    }
    editingSheetId = id;
    surveyNameUserEdited = true;
    surveyNameSuggested = entry.label || "";
    var nameInput = getSurveyNameInput();
    if (nameInput) {
      nameInput.value = entry.label || "";
      nameInput.classList.remove("is-suggested", "is-loading");
    }
    document.getElementById("adminSheetUrl").value = entry.url || "";
    setSheetFormMode("edit");
    document.getElementById("adminSheetForm").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function cancelEditSheet() {
    document.getElementById("adminSheetForm").reset();
    surveyNameUserEdited = false;
    surveyNameSuggested = "";
    surveyNameFetchToken++;
    var nameInput = getSurveyNameInput();
    if (nameInput) nameInput.classList.remove("is-suggested", "is-loading");
    setSheetFormMode("add");
  }

  function updateRegistryEntry(id, label, url) {
    var registry = loadSheetRegistry();
    var idx = registry.findIndex(function (item) {
      return item.id === id;
    });
    if (idx < 0) throw new Error("수정할 시트를 찾을 수 없습니다.");
    registry[idx] = Object.assign({}, registry[idx], { label: label, url: url });
    saveSheetRegistry(registry);
  }

  function renderAdminRegistryList() {
    var listEl = document.getElementById("adminRegistryList");
    if (!listEl) return;
    var registry = loadSheetRegistry();
    if (!registry.length) {
      listEl.innerHTML = "<li style=\"justify-content:center;color:var(--theme-text-muted);\">등록된 시트가 없습니다.</li>";
      return;
    }
    listEl.innerHTML = registry
      .map(function (item) {
        return (
          "<li><div class=\"registry-meta\"><strong>" +
          esc(item.label) +
          "</strong><span>" +
          esc(item.url) +
          "</span></div><div class=\"admin-actions registry-actions\"><button type=\"button\" class=\"admin-btn admin-btn-primary\" data-open-id=\"" +
          esc(item.id) +
          "\">조회</button><button type=\"button\" class=\"admin-btn admin-btn-edit\" data-config-id=\"" +
          esc(item.id) +
          "\">구성</button><button type=\"button\" class=\"admin-btn admin-btn-edit\" data-edit-id=\"" +
          esc(item.id) +
          "\">수정</button><button type=\"button\" class=\"admin-btn admin-btn-danger\" data-delete-id=\"" +
          esc(item.id) +
          "\">삭제</button></div></li>"
        );
      })
      .join("");
    listEl.querySelectorAll("[data-open-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-open-id");
        if (id) location.href = "index.html?open=" + encodeURIComponent(id);
      });
    });
    listEl.querySelectorAll("[data-config-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-config-id");
        var entry = findRegistryEntry(id);
        if (!entry) return;
        sessionStorage.setItem(
          ADMIN_SETUP_DRAFT_KEY,
          JSON.stringify({
            label: entry.label,
            url: entry.url,
            ts: Date.now(),
            editId: entry.id,
            categories: entry.categories || null,
            classes: entry.classes || null,
          })
        );
        location.href =
          "index.html?adminSetup=1&label=" +
          encodeURIComponent(entry.label) +
          "&url=" +
          encodeURIComponent(entry.url);
      });
    });
    listEl.querySelectorAll("[data-edit-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-edit-id");
        if (id) startEditSheet(id);
      });
    });
    listEl.querySelectorAll("[data-delete-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete-id");
        if (!confirm("이 시트를 목록에서 삭제할까요?")) return;
        if (editingSheetId === id) cancelEditSheet();
        var next = loadSheetRegistry().filter(function (item) {
          return item.id !== id;
        });
        saveSheetRegistry(next);
        renderAdminRegistryList();
      });
    });
  }

  (function initTheme() {
    var key = "school-theme-v1";
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
      localStorage.setItem(key, theme === "dark" ? "dark" : "light");
      var toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.setAttribute("aria-label", theme === "dark" ? "라이트 모드" : "다크 모드");
        toggle.title = theme === "dark" ? "라이트 모드" : "다크 모드";
      }
    }
    var saved = localStorage.getItem(key);
    if (saved === "dark" || saved === "light") applyTheme(saved);
    else applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.getElementById("themeToggle").addEventListener("click", function () {
      applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });
  })();

  if (!isAdminSession()) {
    location.replace("admin-login.html");
  } else {
    renderAdminRegistryList();
  }

  bindSurveyNameField();

  document.getElementById("adminLogoutBtn").addEventListener("click", function () {
    clearAdminSession();
    location.href = "admin-login.html";
  });

  document.getElementById("adminSheetCancelEditBtn").addEventListener("click", function () {
    cancelEditSheet();
  });

  document.getElementById("adminSheetPreviewBtn").addEventListener("click", function () {
    var label = getSurveyNameValue();
    var url = coerceText(document.getElementById("adminSheetUrl").value);
    if (!url) {
      alert("구글 시트 주소를 입력해 주세요.");
      return;
    }
    try {
      parseSpreadsheetId(url);
    } catch (err) {
      alert(err.message || "구글 시트 주소 형식을 확인해 주세요.");
      return;
    }
    if (!label) {
      alert("설문 이름을 입력하거나 추천 이름이 나올 때까지 잠시 기다려 주세요.");
      return;
    }
    sessionStorage.setItem(
      ADMIN_SETUP_DRAFT_KEY,
      JSON.stringify({ label: label, url: url, ts: Date.now() })
    );
    location.href =
      "index.html?adminSetup=1&label=" +
      encodeURIComponent(label) +
      "&url=" +
      encodeURIComponent(url);
  });

  document.getElementById("adminSheetForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var label = getSurveyNameValue();
    var url = coerceText(document.getElementById("adminSheetUrl").value);
    if (!editingSheetId) {
      alert("새 시트는 주소 옆 「조회」로 미리보기·구성 후 등록해 주세요.");
      return;
    }
    if (!label || !url) {
      alert("설문 이름과 주소를 입력해 주세요.");
      return;
    }
    try {
      parseSpreadsheetId(url);
    } catch (err) {
      alert(err.message || "구글 시트 주소 형식을 확인해 주세요.");
      return;
    }
    if (editingSheetId) {
      try {
        updateRegistryEntry(editingSheetId, label, url);
      } catch (err) {
        alert(err.message || "시트 수정에 실패했습니다.");
        return;
      }
      cancelEditSheet();
      renderAdminRegistryList();
      alert("시트 정보가 수정되었습니다.");
      return;
    }
  });

})();
  </script>
</body>
</html>
