<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시트 관리 · 남악고 설문 결과</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --school-navy: #1e3a5f;
      --school-navy-dark: #0f2440;
      --school-navy-light: #3d6b9e;
      --school-accent: #c4a035;
      --school-accent-soft: #faf6eb;
      --school-danger: #b91c1c;
      --shadow-sm: 0 2px 8px rgba(15, 36, 64, 0.06);
      --shadow-md: 0 8px 24px rgba(15, 36, 64, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --content-max: 980px;
      --content-pad: 20px;
      --text-sm: 0.8125rem;
      --text-base: 0.875rem;
      --text-lg: 1.125rem;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --focus-ring: 0 0 0 3px rgba(61, 107, 158, 0.14);
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-bg-muted: #f8fafc;
      --theme-text: #1a2332;
      --theme-text-muted: #64748b;
      --theme-border: #d4dce8;
      --theme-border-light: #e8edf4;
      --site-footer-h: 32px;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-bg-page: #0f172a;
      --theme-bg-panel: #1e293b;
      --theme-bg-muted: #334155;
      --theme-text: #e2e8f0;
      --theme-text-muted: #94a3b8;
      --theme-border: #475569;
      --theme-border-light: #334155;
      --focus-ring: 0 0 0 3px rgba(61, 107, 158, 0.35);
    }
    body {
      margin: 0;
      padding: 0 0 var(--site-footer-h);
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--theme-text);
      background: var(--theme-bg-page);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-header {
      max-width: var(--content-max);
      margin: var(--space-5) auto 0;
      padding: 0 var(--content-pad);
      width: 100%;
    }
    .site-header-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5) 28px;
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .site-header-inner::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--school-navy-dark) 0%, var(--school-navy-light) 55%, var(--school-accent) 100%);
    }
    .school-logo {
      position: relative;
      z-index: 1;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: contain;
      background: #fff;
      flex-shrink: 0;
      border: 1px solid var(--theme-border-light);
      box-shadow: 0 1px 2px rgba(15, 36, 64, 0.04);
    }
    .site-header-text {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
      min-height: 78px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 2pt;
    }
    .header-school {
      margin: 0;
      padding: 0;
      font-size: calc(clamp(0.95rem, 1.55vw, 1.125rem) + 2pt);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--school-navy);
    }
    .site-header-text h1 {
      margin: 0;
      padding: 0;
      font-size: calc(clamp(1.5rem, 3.4vw, 1.85rem) + 2pt);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.2;
      color: var(--school-navy-dark);
    }
    .site-header-text h1 .header-em { color: var(--school-navy); }
    .header-subline {
      margin: 0;
      padding: 0;
      line-height: 1;
    }
    .header-subtitle {
      display: inline-flex;
      align-items: center;
      margin: 0;
      padding: 4px 11px;
      font-size: clamp(0.82rem, 1.25vw, 0.95rem);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--school-navy-dark);
      background: var(--school-accent-soft);
      border: 1px solid var(--theme-border-light);
      border-radius: 999px;
    }
    .theme-toggle {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid rgba(30, 58, 95, 0.22);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      color: var(--school-navy);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: var(--school-navy-light);
      transform: translateY(-1px);
    }
    .theme-toggle svg { width: 20px; height: 20px; display: block; }
    html[data-theme="dark"] .theme-toggle {
      border-color: rgba(226, 232, 240, 0.28);
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }
    html[data-theme="dark"] .theme-toggle .theme-icon-moon,
    html:not([data-theme="dark"]) .theme-toggle .theme-icon-sun { display: none; }
    .app-layout {
      flex: 1;
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: var(--space-5) var(--content-pad) var(--space-6);
    }
    .search-container {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .panel-section { padding: var(--space-6) 28px; }
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--school-navy);
      margin-bottom: var(--space-4);
    }
    .section-label::before {
      content: "";
      width: 3px;
      height: 1.1em;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--school-accent) 0%, var(--school-navy-light) 100%);
    }
    .login-gate {
      padding: var(--space-5);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      border: 1px solid var(--theme-border-light);
    }
    .login-gate label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--theme-text);
    }
    .login-gate label:first-of-type { margin-top: 0; }
    .login-gate input {
      width: 100%;
      margin-top: 6px;
      padding: 11px 12px;
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: 1rem;
    }
    .login-gate input:focus {
      outline: none;
      border-color: var(--school-navy-light);
      box-shadow: var(--focus-ring);
    }
    .admin-actions {
      margin-top: var(--space-4);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .admin-btn {
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
    }
    .admin-btn-primary {
      border: none;
      background: linear-gradient(180deg, #4a7ab0 0%, var(--school-navy) 100%);
      color: #fff;
    }
    .admin-btn-danger {
      border-color: var(--school-danger);
      color: var(--school-danger);
      background: #fef2f2;
    }
    .admin-form label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
    }
    .admin-form label:first-child { margin-top: 0; }
    .admin-form input {
      width: 100%;
      margin-top: 6px;
      padding: 9px 11px;
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: var(--text-base);
    }
    .admin-form input:focus {
      outline: none;
      border-color: var(--school-navy-light);
      box-shadow: var(--focus-ring);
    }
    .admin-registry-list {
      margin: var(--space-4) 0 0;
      padding: 0;
      list-style: none;
    }
    .admin-registry-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--theme-border-light);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      margin-bottom: 8px;
      font-size: var(--text-sm);
    }
    .registry-meta { min-width: 0; flex: 1; }
    .registry-meta strong { display: block; color: var(--theme-text); }
    .registry-meta span {
      display: block;
      margin-top: 4px;
      color: var(--theme-text-muted);
      word-break: break-all;
    }
    .login-hint {
      margin: 10px 0 0;
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
    }
    .site-footer {
      margin-top: auto;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
    }
    #siteFooterRoot {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 850;
    }
    .site-footer-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 3px var(--content-pad);
      font-size: 0.78rem;
      color: var(--theme-text-muted);
      text-align: center;
    }
    @media (max-width: 720px) {
      .panel-section { padding: var(--space-5) var(--space-4); }
      .site-header-inner { flex-wrap: wrap; }
      .admin-registry-list li { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <img src="assets/namak-logo.png" alt="남악고등학교" class="school-logo" width="78" height="78">
      <div class="site-header-text">
        <p class="header-school">남악고등학교 1학년</p>
        <h1><span class="header-em">설문조사 결과</span> 조회</h1>
        <p class="header-subline"><span class="header-subtitle">2026학년도</span></p>
      </div>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="다크 모드" title="다크 모드">
        <svg class="theme-toggle-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg class="theme-toggle-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="app-layout">
    <div class="search-container">
      <section class="panel-section">
        <div class="section-label">시트 등록·관리</div>
        <div id="adminPanel">
          <form id="adminSheetForm" class="admin-form">
            <label for="adminSheetLabel">시트 이름 (버튼 표시)</label>
            <input type="text" id="adminSheetLabel" placeholder="예: 1반, 상담 3월" required />
            <label for="adminSheetUrl">구글 시트 주소</label>
            <input type="url" id="adminSheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." required />
            <div class="admin-actions">
              <button type="submit" class="admin-btn admin-btn-primary">시트 추가</button>
              <button type="button" class="admin-btn" id="adminLogoutBtn">로그아웃</button>
            </div>
          </form>
          <ul id="adminRegistryList" class="admin-registry-list" aria-label="등록된 시트"></ul>
        </div>
      </section>
    </div>
  </div>

  <footer class="site-footer" id="siteFooterRoot">
    <div class="site-footer-inner">남악고등학교 설문 · 관리자</div>
  </footer>

  <script>
(function () {
  "use strict";

  var ADMIN_SESSION_KEY = "school-admin-session-v1";
  var SHEET_REGISTRY_KEY = "school-sheet-registry-v1";
  var SPREADSHEET_ID_PATTERN = /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }

  function coerceText(value) {
    if (value == null) return "";
    return String(value).trim();
  }

  function isAdminSession() {
    return sessionStorage.getItem(ADMIN_SESSION_KEY) === "1";
  }

  function setAdminSession(active) {
    if (active) sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
    else sessionStorage.removeItem(ADMIN_SESSION_KEY);
  }

  function clearAdminSession() {
    sessionStorage.removeItem(ADMIN_SESSION_KEY);
  }

  window.addEventListener("pagehide", function () {
    var navEntries = performance.getEntriesByType && performance.getEntriesByType("navigation");
    var nav = navEntries && navEntries[0];
    if (nav && nav.type === "reload") return;
    clearAdminSession();
  });

  function parseSpreadsheetId(url) {
    var trimmed = String(url || "").trim();
    var match = trimmed.match(SPREADSHEET_ID_PATTERN);
    if (match && match[1]) return match[1];
    if (/^[a-zA-Z0-9-_]{20,}$/.test(trimmed)) return trimmed;
    throw new Error("스프레드시트 ID를 URL에서 찾을 수 없습니다.");
  }

  function loadSheetRegistry() {
    try {
      var raw = localStorage.getItem(SHEET_REGISTRY_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
      }
    } catch (err) { /* ignore */ }
    return [];
  }

  function saveSheetRegistry(registry) {
    localStorage.setItem(SHEET_REGISTRY_KEY, JSON.stringify(registry));
  }

  function findRegistryEntry(id) {
    return loadSheetRegistry().find(function (item) {
      return item.id === id;
    });
  }

  function renderAdminRegistryList() {
    var listEl = document.getElementById("adminRegistryList");
    if (!listEl) return;
    var registry = loadSheetRegistry();
    if (!registry.length) {
      listEl.innerHTML = "<li style=\"justify-content:center;color:var(--theme-text-muted);\">등록된 시트가 없습니다.</li>";
      return;
    }
    listEl.innerHTML = registry
      .map(function (item) {
        return (
          "<li><div class=\"registry-meta\"><strong>" +
          esc(item.label) +
          "</strong><span>" +
          esc(item.url) +
          "</span></div><div class=\"admin-actions\" style=\"margin:0;\"><button type=\"button\" class=\"admin-btn admin-btn-primary\" data-open-id=\"" +
          esc(item.id) +
          "\">조회</button><button type=\"button\" class=\"admin-btn admin-btn-danger\" data-delete-id=\"" +
          esc(item.id) +
          "\">삭제</button></div></li>"
        );
      })
      .join("");
    listEl.querySelectorAll("[data-open-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-open-id");
        if (id) location.href = "index.html?open=" + encodeURIComponent(id);
      });
    });
    listEl.querySelectorAll("[data-delete-id]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete-id");
        if (!confirm("이 시트를 목록에서 삭제할까요?")) return;
        var next = loadSheetRegistry().filter(function (item) {
          return item.id !== id;
        });
        saveSheetRegistry(next);
        renderAdminRegistryList();
      });
    });
  }

  (function initTheme() {
    var key = "school-theme-v1";
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
      localStorage.setItem(key, theme === "dark" ? "dark" : "light");
      var toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.setAttribute("aria-label", theme === "dark" ? "라이트 모드" : "다크 모드");
        toggle.title = theme === "dark" ? "라이트 모드" : "다크 모드";
      }
    }
    var saved = localStorage.getItem(key);
    if (saved === "dark" || saved === "light") applyTheme(saved);
    else applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.getElementById("themeToggle").addEventListener("click", function () {
      applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });
  })();

  if (!isAdminSession()) {
    location.replace("admin-login.html");
  } else {
    renderAdminRegistryList();
  }

  document.getElementById("adminLogoutBtn").addEventListener("click", function () {
    clearAdminSession();
    location.href = "admin-login.html";
  });

  document.getElementById("adminSheetForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var label = coerceText(document.getElementById("adminSheetLabel").value);
    var url = coerceText(document.getElementById("adminSheetUrl").value);
    if (!label || !url) {
      alert("시트 이름과 주소를 입력해 주세요.");
      return;
    }
    try {
      parseSpreadsheetId(url);
    } catch (err) {
      alert(err.message || "구글 시트 주소 형식을 확인해 주세요.");
      return;
    }
    var registry = loadSheetRegistry();
    registry.push({
      id: "sheet-" + Date.now(),
      label: label,
      url: url,
      tab: null,
    });
    saveSheetRegistry(registry);
    document.getElementById("adminSheetForm").reset();
    renderAdminRegistryList();
    alert("시트가 추가되었습니다. 메인 목록에서 확인할 수 있습니다.");
  });

})();
  </script>
</body>
</html>
