<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>학생 설문 등록 · 남악고</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="styles/admin-sidebar.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-text: #0f172a;
      --theme-text-muted: #475569;
      --theme-border: #c5d0de;
      --theme-heading: #1e3a5f;
      --theme-btn-top: #4a7ab0;
      --theme-btn-bottom: #1e3a5f;
      --content-max: 980px;
      --content-pad: 20px;
      --space-5: 20px;
      --space-6: 24px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-sm: 8px;
      --shadow-md: 0 8px 24px rgba(15, 36, 64, 0.08);
      --theme-bg-muted: #f8fafc;
      --site-footer-h: 32px;
    }
    html[data-theme="dark"] {
      --theme-bg-page: #0c1220;
      --theme-bg-panel: #1a2435;
      --theme-text: #f1f5f9;
      --theme-text-muted: #cbd5e1;
      --theme-border: #5a6d85;
      --theme-heading: #e8f0fc;
      --theme-btn-top: #5b8fc9;
      --theme-btn-bottom: #2d5580;
      --theme-bg-muted: #2a3649;
      --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.45);
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--theme-bg-page);
      color: var(--theme-text);
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: var(--site-footer-h);
    }
    .site-header {
      max-width: var(--content-max);
      margin: var(--space-5) auto 0;
      padding: 0 var(--content-pad);
      width: 100%;
    }
    .site-header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }
    .site-header-inner h1 {
      margin: 0;
      font-size: 1.2rem;
      color: var(--theme-heading);
    }
    .site-header-inner p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: var(--theme-text-muted);
    }
    .panel {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; color: var(--theme-heading); }
    .lead { margin: 0 0 16px; color: var(--theme-text-muted); font-size: 0.9rem; }
    label { display: block; margin: 12px 0 6px; font-size: 0.85rem; font-weight: 600; }
    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
    }
    .q-row {
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .q-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--theme-btn-top), var(--theme-btn-bottom));
      color: #fff;
    }
    .btn-danger { color: #b91c1c; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .link-box {
      margin-top: 12px;
      padding: 10px;
      background: rgba(74, 122, 176, 0.08);
      border-radius: 8px;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .nav-top { margin-bottom: 12px; }
    .site-footer {
      margin-top: auto;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
    }
    .site-footer-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 8px var(--content-pad);
      font-size: 0.78rem;
      color: var(--theme-text-muted);
      text-align: center;
    }
    .hint { font-size: 0.8rem; color: var(--theme-text-muted); margin-top: 4px; }
    .msg { margin-top: 10px; font-size: 0.875rem; }
    .msg.ok { color: #047857; }
    .msg.err { color: #b91c1c; }
    .q-extra { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--theme-border); }
    .q-extra label { margin-top: 8px; }
    .q-options textarea { min-height: 88px; resize: vertical; }
    .likert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .likert-grid label { margin-top: 0; }
    .q-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }
    .q-row {
      border-left: 4px solid var(--theme-btn-top);
    }
    .q-row.is-section {
      border-left-color: var(--theme-heading);
      background: rgba(74, 122, 176, 0.05);
    }
    .q-row-type-badge {
      font-size: 0.75rem;
      color: var(--theme-text-muted);
      font-weight: 600;
    }
    .q-desc-input { min-height: 56px; resize: vertical; }
    .grid-config {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 640px) {
      .grid-config, .likert-grid { grid-template-columns: 1fr; }
    }
    label.inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-top: 10px;
    }
    label.inline-check input { width: auto; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div>
        <h1>학생 설문 등록</h1>
        <p>명렬표 기준 반·번호 선택 후 사이트에서 직접 응답·저장</p>
      </div>
    </div>
  </header>

  <div class="admin-app-shell">
    <div class="admin-app-grid">
      <aside id="adminSidebarMount" aria-label="관리자 좌측 메뉴"></aside>
      <div class="admin-main-content">
        <div class="panel">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button type="button" class="btn" id="adminLogoutBtn">로그아웃</button>
      </div>
      <p class="lead">구글 폼 대신 사이트에서 설문을 만들고, 학생 참여 링크를 공유할 수 있습니다.</p>

      <label for="surveyLabel">설문 제목</label>
      <input type="text" id="surveyLabel" placeholder="예: 1학기 학습·생활 설문" />

      <label for="surveyDescription">설문 설명 (선택)</label>
      <textarea id="surveyDescription" class="q-desc-input" placeholder="설문 목적, 작성 안내, 소요 시간 등을 적어 주세요."></textarea>

      <label for="webAppUrl">Apps Script 웹 앱 URL (제출·등록용)</label>
      <input type="url" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec" />
      <p class="hint"><a href="docs/SURVEY_FORM_SETUP.md" target="_blank" rel="noopener">설치 안내</a>에 따라 스크립트를 배포한 뒤 URL을 붙여 넣으세요.</p>

      <label for="responseSheetId">응답 저장 스프레드시트 ID (선택)</label>
      <input type="text" id="responseSheetId" placeholder="비우면 기본 응답 시트 사용" />

      <label><input type="checkbox" id="categorySelectAll" checked /> 결과 화면에서 문항 탭 숨기기(전체 문항 한 번에 표시)</label>

      <h2 style="font-size:1.05rem;margin:20px 0 8px;color:var(--theme-heading)">문항</h2>
      <p class="hint" style="margin-top:0">구글 폼처럼 단답·장문·객관식·체크·드롭다운·선형 배율·별점·그리드·날짜·시간·섹션을 조합할 수 있습니다.</p>
      <div id="questionList"></div>
      <div class="q-toolbar">
        <button type="button" class="btn btn-primary" id="btnAddQuestion">+ 문항 추가</button>
        <button type="button" class="btn" id="btnAddSection">+ 섹션 추가</button>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="btnSave">메인에 등록</button>
        <button type="button" class="btn" id="btnSyncServer">서버에 설문 동기화</button>
      </div>
      <p class="msg" id="statusMsg" hidden></p>
      <div class="link-box" id="studentLinkBox" hidden>
        <strong>학생 참여 링크</strong>
        <div id="studentLink"></div>
        <button type="button" class="btn" id="btnCopyLink" style="margin-top:8px">링크 복사</button>
      </div>
      </div>
    </div>
  </div>
  </div>

  <footer class="site-footer">
    <div class="site-footer-inner">남악고등학교 설문 · 학생 설문 등록</div>
  </footer>

  <script src="scripts/admin-session.js"></script>
  <script src="scripts/admin-sidebar.js"></script>
  <script src="scripts/survey-form-shared.js"></script>
  <script>
(function () {
  "use strict";
  if (!AdminSession.require()) return;

  AdminSidebar.mount(document.getElementById("adminSidebarMount"), "survey");

  document.getElementById("adminLogoutBtn").addEventListener("click", function () {
    AdminSession.clear();
    location.href = "admin-login.html";
  });

  var editId = new URLSearchParams(location.search).get("edit");
  var questionList = document.getElementById("questionList");
  var statusMsg = document.getElementById("statusMsg");

  function showStatus(text, ok) {
    statusMsg.textContent = text;
    statusMsg.hidden = !text;
    statusMsg.className = "msg " + (ok ? "ok" : "err");
  }

  function makeQuestionRow(q) {
    q = q || { id: "q" + Date.now(), label: "", type: "textarea", required: true };
    var likert = SurveyForm.defaultLikertConfig();
    if (q.likertMin != null) likert.likertMin = q.likertMin;
    if (q.likertMax != null) likert.likertMax = q.likertMax;
    if (q.likertMinLabel) likert.likertMinLabel = q.likertMinLabel;
    if (q.likertMaxLabel) likert.likertMaxLabel = q.likertMaxLabel;
    var rating = SurveyForm.defaultRatingConfig();
    if (q.ratingMax != null) rating.ratingMax = q.ratingMax;

    var row = document.createElement("div");
    row.className = "q-row" + (q.type === "section" ? " is-section" : "");
    row.dataset.qid = q.id;

    row.innerHTML =
      '<div class="q-row-head"><div><strong class="q-row-title">' +
      (q.type === "section" ? "섹션" : "문항") +
      '</strong> <span class="q-row-type-badge"></span></div><button type="button" class="btn btn-danger btn-remove">삭제</button></div>' +
      '<label>질문' +
      (q.type === "section" ? " (섹션 제목)" : "") +
      '</label><input type="text" class="q-label" placeholder="예: 수업 만족도는 어떠합니까?" />' +
      '<label>설명 (선택)</label><textarea class="q-desc-input q-description" placeholder="학생에게 보이는 추가 안내"></textarea>' +
      '<label>입력 형식</label><select class="q-type">' +
      SurveyForm.renderQuestionTypeOptions(q.type || "textarea") +
      "</select>" +
      '<div class="q-extra q-options-wrap" hidden>' +
      '<label>선택지 (한 줄에 하나)</label>' +
      '<textarea class="q-options" placeholder="예:&#10;매우 만족&#10;만족&#10;보통&#10;불만족"></textarea>' +
      '<label class="inline-check q-allow-other-wrap" hidden><input type="checkbox" class="q-allow-other" /> 「기타」 항목 허용</label>' +
      '<p class="hint">객관식·드롭다운·체크박스·순위형에 사용됩니다.</p>' +
      "</div>" +
      '<div class="q-extra q-grid-wrap" hidden>' +
      '<div class="grid-config">' +
      '<div><label>행 (질문 항목, 한 줄에 하나)</label><textarea class="q-grid-rows" placeholder="예:&#10;수학 수업&#10;영어 수업"></textarea></div>' +
      '<div><label>열 (선택지, 한 줄에 하나)</label><textarea class="q-grid-cols" placeholder="예:&#10;매우 그렇다&#10;보통&#10;그렇지 않다"></textarea></div>' +
      "</div>" +
      '<p class="hint">표 형태로 여러 문항에 같은 척도를 적용합니다.</p>' +
      "</div>" +
      '<div class="q-extra q-likert-wrap" hidden>' +
      '<div class="likert-grid">' +
      '<div><label>척도 최소값</label><input type="number" class="q-likert-min" min="1" max="10" value="1" /></div>' +
      '<div><label>척도 최대값</label><input type="number" class="q-likert-max" min="2" max="10" value="5" /></div>' +
      '<div><label>왼쪽 라벨</label><input type="text" class="q-likert-min-label" placeholder="전혀 그렇지 않다" /></div>' +
      '<div><label>오른쪽 라벨</label><input type="text" class="q-likert-max-label" placeholder="매우 그렇다" /></div>' +
      "</div></div>" +
      '<div class="q-extra q-rating-wrap" hidden>' +
      '<label>별점 최대 개수 (3~10)</label><input type="number" class="q-rating-max" min="3" max="10" value="5" />' +
      "</div>" +
      '<div class="q-extra q-number-wrap" hidden>' +
      '<div class="likert-grid">' +
      '<div><label>최소값 (선택)</label><input type="number" class="q-number-min" placeholder="비움 가능" /></div>' +
      '<div><label>최대값 (선택)</label><input type="number" class="q-number-max" placeholder="비움 가능" /></div>' +
      "</div></div>" +
      '<label class="inline-check q-required-wrap"><input type="checkbox" class="q-required" /> 필수 (응답하지 않으면 다음으로 넘어갈 수 없음)</label>';

    row.querySelector(".q-label").value = q.label || "";
    row.querySelector(".q-description").value = q.description || "";
    row.querySelector(".q-type").value = q.type || "textarea";
    row.querySelector(".q-options").value = SurveyForm.normalizeOptions(q.options).join("\n");
    row.querySelector(".q-grid-rows").value = SurveyForm.normalizeGridRows(q).join("\n");
    row.querySelector(".q-grid-cols").value = SurveyForm.normalizeGridColumns(q).join("\n");
    row.querySelector(".q-likert-min").value = likert.likertMin;
    row.querySelector(".q-likert-max").value = likert.likertMax;
    row.querySelector(".q-likert-min-label").value = likert.likertMinLabel;
    row.querySelector(".q-likert-max-label").value = likert.likertMaxLabel;
    row.querySelector(".q-rating-max").value = rating.ratingMax;
    if (q.numberMin != null && q.numberMin !== "") row.querySelector(".q-number-min").value = q.numberMin;
    if (q.numberMax != null && q.numberMax !== "") row.querySelector(".q-number-max").value = q.numberMax;
    row.querySelector(".q-allow-other").checked = !!q.allowOther;
    row.querySelector(".q-required").checked = q.required !== false && q.type !== "section";

    function syncTypePanels() {
      var type = row.querySelector(".q-type").value;
      row.classList.toggle("is-section", type === "section");
      row.querySelector(".q-row-title").textContent = type === "section" ? "섹션" : "문항";
      row.querySelector(".q-row-type-badge").textContent = SurveyForm.questionTypeLabel(type);
      row.querySelector(".q-options-wrap").hidden = !SurveyForm.questionNeedsOptions(type);
      row.querySelector(".q-grid-wrap").hidden = !SurveyForm.questionNeedsGrid(type);
      row.querySelector(".q-likert-wrap").hidden = type !== "likert";
      row.querySelector(".q-rating-wrap").hidden = type !== "rating";
      row.querySelector(".q-number-wrap").hidden = type !== "number";
      row.querySelector(".q-allow-other-wrap").hidden = !(type === "radio" || type === "dropdown" || type === "checkbox");
      row.querySelector(".q-required-wrap").hidden = type === "section";
    }

    row.querySelector(".q-type").addEventListener("change", syncTypePanels);
    syncTypePanels();

    row.querySelector(".btn-remove").addEventListener("click", function () {
      row.remove();
    });
    questionList.appendChild(row);
  }

  function collectQuestions() {
    return Array.prototype.map.call(questionList.querySelectorAll(".q-row"), function (row) {
      var type = row.querySelector(".q-type").value;
      var item = {
        id: row.dataset.qid,
        label: row.querySelector(".q-label").value.trim() || (type === "section" ? "섹션" : "문항"),
        type: type,
        required: type === "section" ? false : row.querySelector(".q-required").checked,
      };
      var desc = row.querySelector(".q-description").value.trim();
      if (desc) item.description = desc;

      if (SurveyForm.questionNeedsOptions(type)) {
        item.options = SurveyForm.normalizeOptions(row.querySelector(".q-options").value);
        if (!item.options.length) {
          throw new Error("「" + item.label + "」 문항에 선택지를 1개 이상 입력해 주세요.");
        }
        if (row.querySelector(".q-allow-other").checked) item.allowOther = true;
      }
      if (SurveyForm.questionNeedsGrid(type)) {
        item.gridRows = SurveyForm.normalizeOptions(row.querySelector(".q-grid-rows").value);
        item.gridColumns = SurveyForm.normalizeOptions(row.querySelector(".q-grid-cols").value);
        item.options = item.gridRows.slice();
        if (!item.gridRows.length || !item.gridColumns.length) {
          throw new Error("「" + item.label + "」 그리드 문항에 행·열을 모두 입력해 주세요.");
        }
      }
      if (type === "likert") {
        var min = Number(row.querySelector(".q-likert-min").value);
        var max = Number(row.querySelector(".q-likert-max").value);
        if (!Number.isFinite(min) || !Number.isFinite(max) || max <= min) {
          throw new Error("「" + item.label + "」 선형 배율의 최소·최대값을 확인해 주세요.");
        }
        item.likertMin = min;
        item.likertMax = max;
        item.likertMinLabel = row.querySelector(".q-likert-min-label").value.trim() || "전혀 그렇지 않다";
        item.likertMaxLabel = row.querySelector(".q-likert-max-label").value.trim() || "매우 그렇다";
      }
      if (type === "rating") {
        var rmax = Number(row.querySelector(".q-rating-max").value);
        item.ratingMax = Number.isFinite(rmax) ? Math.min(10, Math.max(3, rmax)) : 5;
      }
      if (type === "number") {
        var nmin = row.querySelector(".q-number-min").value.trim();
        var nmax = row.querySelector(".q-number-max").value.trim();
        if (nmin !== "") item.numberMin = Number(nmin);
        if (nmax !== "") item.numberMax = Number(nmax);
      }
      return item;
    });
  }

  function buildEntry() {
    var label = document.getElementById("surveyLabel").value.trim();
    if (!label) throw new Error("설문 이름을 입력해 주세요.");
    var qs = collectQuestions();
    if (!qs.length) throw new Error("문항을 1개 이상 추가해 주세요.");
    var id = editId || SurveyForm.generateSurveyId();
    var sheetId = document.getElementById("responseSheetId").value.trim();
    return {
      id: id,
      type: "form",
      label: label,
      description: document.getElementById("surveyDescription").value.trim() || undefined,
      grade: SurveyForm.GRADE,
      questions: qs,
      categories: SurveyForm.questionCategories({ questions: qs }),
      categorySelectAll: document.getElementById("categorySelectAll").checked,
      webAppUrl: document.getElementById("webAppUrl").value.trim(),
      responseSpreadsheetId: sheetId || undefined,
      responseTab: "Responses",
    };
  }

  function updateStudentLink(id) {
    var url =
      location.href.replace(/admin-survey\.html.*$/, "respond.html?s=" + encodeURIComponent(id));
    document.getElementById("studentLink").textContent = url;
    document.getElementById("studentLinkBox").hidden = false;
    document.getElementById("btnCopyLink").onclick = function () {
      navigator.clipboard.writeText(url).then(function () {
        showStatus("참여 링크를 복사했습니다.", true);
      });
    };
  }

  document.getElementById("btnAddQuestion").addEventListener("click", function () {
    makeQuestionRow();
  });

  document.getElementById("btnAddSection").addEventListener("click", function () {
    makeQuestionRow({
      id: "sec" + Date.now(),
      label: "",
      type: "section",
      description: "",
      required: false,
    });
  });

  document.getElementById("btnSave").addEventListener("click", function () {
    try {
      var entry = buildEntry();
      var list = SurveyForm.loadRegistry();
      var idx = list.findIndex(function (x) { return x.id === entry.id; });
      if (idx >= 0) list[idx] = Object.assign({}, list[idx], entry);
      else list.push(entry);
      SurveyForm.saveRegistry(list);
      editId = entry.id;
      history.replaceState({}, "", "admin-survey.html?edit=" + encodeURIComponent(entry.id));
      updateStudentLink(entry.id);
      showStatus("메인 목록에 등록했습니다.", true);
    } catch (err) {
      showStatus(err.message, false);
    }
  });

  document.getElementById("btnSyncServer").addEventListener("click", async function () {
    try {
      var entry = buildEntry();
      if (!entry.webAppUrl) throw new Error("웹 앱 URL을 입력해 주세요.");
      var res = await SurveyForm.registerSurveyOnServer(entry);
      if (res && res.ok === false) throw new Error(res.error || "동기화 실패");
      showStatus("서버(스프레드시트)에 설문 정보를 저장했습니다.", true);
    } catch (err) {
      showStatus(err.message || "동기화 실패", false);
    }
  });

  if (editId) {
    var existing = SurveyForm.findSurvey(editId);
    if (existing && existing.type === "form") {
      document.getElementById("surveyLabel").value = existing.label || "";
      document.getElementById("surveyDescription").value = existing.description || "";
      document.getElementById("webAppUrl").value = existing.webAppUrl || "";
      document.getElementById("responseSheetId").value = existing.responseSpreadsheetId || "";
      document.getElementById("categorySelectAll").checked = !!existing.categorySelectAll;
      (existing.questions || []).forEach(makeQuestionRow);
      updateStudentLink(existing.id);
    }
  }
  if (!questionList.children.length) {
    makeQuestionRow({
      id: "sec1",
      label: "기본 정보",
      type: "section",
      description: "아래 문항에 성실히 응답해 주세요.",
      required: false,
    });
    makeQuestionRow({ id: "q1", label: "가장 관심 있는 진로 분야", type: "radio", options: ["인문", "사회", "자연", "공학", "예체능", "미정"], required: true });
    makeQuestionRow({ id: "q2", label: "학교생활 만족도", type: "likert", required: true });
    makeQuestionRow({ id: "q3", label: "개선이 필요하다고 생각하는 점 (복수 선택)", type: "checkbox", options: ["수업", "급식", "시설", "교우관계", "진로지도"], allowOther: true, required: false });
    makeQuestionRow({ id: "q4", label: "전하고 싶은 말", type: "textarea", required: false });
  }
})();
  </script>
</body>
</html>
