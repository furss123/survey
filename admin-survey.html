<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>학생 설문 등록 · 남악고</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="scripts/survey-form-questions.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-text: #0f172a;
      --theme-text-muted: #475569;
      --theme-border: #c5d0de;
      --theme-heading: #1e3a5f;
      --theme-btn-top: #4a7ab0;
      --theme-btn-bottom: #1e3a5f;
      --content-max: 720px;
      --radius-md: 12px;
    }
    html[data-theme="dark"] {
      --theme-bg-page: #0c1220;
      --theme-bg-panel: #1a2435;
      --theme-text: #f1f5f9;
      --theme-text-muted: #cbd5e1;
      --theme-border: #5a6d85;
      --theme-heading: #e8f0fc;
      --theme-btn-top: #5b8fc9;
      --theme-btn-bottom: #2d5580;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--theme-bg-page);
      color: var(--theme-text);
      line-height: 1.55;
    }
    .wrap { max-width: var(--content-max); margin: 0 auto; padding: 20px 16px 48px; }
    .panel {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; color: var(--theme-heading); }
    .lead { margin: 0 0 16px; color: var(--theme-text-muted); font-size: 0.9rem; }
    label { display: block; margin: 12px 0 6px; font-size: 0.85rem; font-weight: 600; }
    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
    }
    .q-row {
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .q-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .field-input { margin-top: 0; }
    .sq-admin-preview input,
    .sq-admin-preview textarea,
    .sq-admin-preview select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
    }
    .q-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .type-legend {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(74, 122, 176, 0.08);
      font-size: 0.8rem;
      color: var(--theme-text-muted);
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--theme-btn-top), var(--theme-btn-bottom));
      color: #fff;
    }
    .btn-danger { color: #b91c1c; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .link-box {
      margin-top: 12px;
      padding: 10px;
      background: rgba(74, 122, 176, 0.08);
      border-radius: 8px;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .nav-top { margin-bottom: 12px; }
    .hint { font-size: 0.8rem; color: var(--theme-text-muted); margin-top: 4px; }
    .msg { margin-top: 10px; font-size: 0.875rem; }
    .msg.ok { color: #047857; }
    .msg.err { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="nav-top"><a class="btn" href="admin.html">← 시트 관리</a></p>
    <div class="panel">
      <h1>학생 설문 등록</h1>
      <p class="lead">구글 폼과 같은 문항 유형으로 설문을 만듭니다. 저장 후 <strong>참여 링크</strong>를 학생에게 공유하세요.</p>

      <label for="surveyLabel">설문 이름</label>
      <input type="text" id="surveyLabel" placeholder="예: 1학기 상담 설문" />

      <label for="surveyStatus">설문 상태</label>
      <select id="surveyStatus" class="field-input">
        <option value="active">진행중 — 학생 참여 가능</option>
        <option value="completed">완료 — 학생 참여 종료, 메인에서 분석 조회</option>
      </select>

      <label for="webAppUrl">Apps Script 웹 앱 URL (제출·학생 링크용)</label>
      <input type="url" id="webAppUrl" class="field-input" placeholder="https://script.google.com/macros/s/…/exec" />
      <p class="hint">한 번만 입력하면 저장됩니다. 학생이 다른 기기에서 참여 링크를 열 때 설문·제출에 필요합니다.</p>

      <h2 style="font-size:1.05rem;margin:20px 0 8px;color:var(--theme-heading)">문항</h2>
      <p class="type-legend">단답·장문·이메일·숫자·URL·날짜·시간·객관식·체크박스·드롭다운·선형 배율·객관식/체크박스 격자·제목 및 설명. 선택형은 「+ 선택지 추가」로 항목을 하나씩 넣을 수 있습니다.</p>
      <div class="q-toolbar">
        <button type="button" class="btn" id="btnAddQuestion">+ 문항 추가</button>
        <button type="button" class="btn" id="btnAddSection">+ 제목/설명 추가</button>
      </div>
      <div id="questionList"></div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="btnSave">메인에 등록</button>
      </div>
      <p class="msg" id="statusMsg" hidden></p>
      <div class="link-box" id="studentLinkBox" hidden>
        <strong>학생 참여 링크</strong>
        <div id="studentLink"></div>
        <button type="button" class="btn" id="btnCopyLink" style="margin-top:8px">링크 복사</button>
      </div>
    </div>
  </div>

  <script src="scripts/admin-session.js"></script>
  <script src="scripts/survey-form-shared.js"></script>
  <script src="scripts/survey-question-types.js"></script>
  <script>
(function () {
  "use strict";
  if (!AdminSession.require()) return;

  var editId = new URLSearchParams(location.search).get("edit");
  var questionList = document.getElementById("questionList");
  var statusMsg = document.getElementById("statusMsg");

  function showStatus(text, ok) {
    statusMsg.textContent = text;
    statusMsg.hidden = !text;
    statusMsg.className = "msg " + (ok ? "ok" : "err");
  }

  function coerceWebAppUrl() {
    var el = document.getElementById("webAppUrl");
    var url = el ? el.value.trim() : "";
    if (url) SurveyForm.saveWebAppUrl(url);
    return url || SurveyForm.loadWebAppUrl();
  }

  function addQuestion(q) {
    SurveyQuestions.mountAdminQuestionRow(questionList, q);
  }

  function collectQuestions() {
    return Array.prototype.map.call(questionList.querySelectorAll(".q-row"), function (row) {
      return SurveyQuestions.readAdminQuestionFromRow(row);
    });
  }

  function buildEntry() {
    var label = document.getElementById("surveyLabel").value.trim();
    if (!label) throw new Error("설문 이름을 입력해 주세요.");
    var qs = collectQuestions().filter(function (q) {
      return q.type === "section" ? q.label || q.description : true;
    });
    if (!qs.some(function (q) { return SurveyQuestions.hasInput(q.type); })) {
      throw new Error("응답이 있는 문항을 1개 이상 추가해 주세요.");
    }
    var id = editId || SurveyForm.generateSurveyId();
    var existing = editId ? SurveyForm.findSurvey(editId) : null;
    var statusEl = document.getElementById("surveyStatus");
    var surveyStatus =
      statusEl && statusEl.value === "completed" ? "completed" : "active";
    return {
      id: id,
      type: "form",
      label: label,
      grade: SurveyForm.GRADE,
      questions: qs,
      categories: SurveyForm.questionCategories({ questions: qs }),
      categorySelectAll: existing ? !!existing.categorySelectAll : true,
      surveyStatus: surveyStatus,
      completedAt:
        surveyStatus === "completed"
          ? (existing && existing.completedAt) || Date.now()
          : null,
      webAppUrl: coerceWebAppUrl(),
      responseSpreadsheetId:
        (existing && existing.responseSpreadsheetId) ||
        SurveyForm.DEFAULT_RESPONSE_SPREADSHEET_ID,
      responseTab: "Responses",
    };
  }

  function updateStudentLink(id) {
    var url = SurveyForm.buildStudentRespondUrl(id, location.href);
    document.getElementById("studentLink").textContent = url;
    document.getElementById("studentLinkBox").hidden = false;
    document.getElementById("btnCopyLink").onclick = function () {
      navigator.clipboard.writeText(url).then(function () {
        showStatus("참여 링크를 복사했습니다.", true);
      });
    };
  }

  document.getElementById("btnAddQuestion").addEventListener("click", function () {
    addQuestion({ type: "textarea", label: "", required: true });
  });
  document.getElementById("btnAddSection").addEventListener("click", function () {
    addQuestion({ type: "section", label: "섹션 제목", description: "", required: false });
  });

  document.getElementById("btnSave").addEventListener("click", async function () {
    try {
      var entry = buildEntry();
      var list = SurveyForm.loadRegistry();
      var idx = list.findIndex(function (x) { return x.id === entry.id; });
      if (idx >= 0) list[idx] = Object.assign({}, list[idx], entry);
      else list.push(entry);
      SurveyForm.saveRegistry(list);
      editId = entry.id;
      history.replaceState({}, "", "admin-survey.html?edit=" + encodeURIComponent(entry.id));
      updateStudentLink(entry.id);
      var syncMsg = "메인 목록에 등록했습니다.";
      if (entry.webAppUrl) {
        showStatus("서버에 설문을 동기화하는 중…", true);
        var sync = await SurveyForm.registerSurveyOnServer(entry);
        if (sync && sync.ok) {
          syncMsg +=
            " 서버(Config 시트) 동기화 완료 — 상태(" +
            (entry.surveyStatus === "completed" ? "완료" : "진행중") +
            ") 포함.";
        }
        else if (sync && sync.skipped) syncMsg += " (웹 앱 URL 없음 — 학생 링크용 URL을 입력하세요.)";
        else syncMsg += " 서버 동기화 실패: " + ((sync && sync.error) || "알 수 없음");
      } else {
        syncMsg += " 웹 앱 URL을 입력하면 다른 기기에서도 참여 링크가 동작합니다.";
      }
      showStatus(syncMsg, true);
    } catch (err) {
      showStatus(err.message, false);
    }
  });

  document.getElementById("webAppUrl").value = SurveyForm.loadWebAppUrl();

  if (editId) {
    var existing = SurveyForm.findSurvey(editId);
    if (existing && existing.type === "form") {
      document.getElementById("surveyLabel").value = existing.label || "";
      document.getElementById("surveyStatus").value = SurveyForm.isSurveyCompleted(existing)
        ? "completed"
        : "active";
      if (existing.webAppUrl) {
        document.getElementById("webAppUrl").value = existing.webAppUrl;
        SurveyForm.saveWebAppUrl(existing.webAppUrl);
      }
      (existing.questions || []).forEach(addQuestion);
      updateStudentLink(existing.id);
    }
  }
  if (!questionList.children.length) {
    addQuestion({ id: "q1", label: "상담 받고 싶은 주제", type: "textarea" });
    addQuestion({ id: "q2", label: "전하고 싶은 말", type: "textarea" });
  }
})();
  </script>
</body>
</html>
