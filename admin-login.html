<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var k = "school-theme-v1";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 로그인 · 남악고 설문 결과</title>
  <link rel="icon" href="assets/namak-logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --school-navy: #1e3a5f;
      --school-navy-dark: #0f2440;
      --school-navy-light: #3d6b9e;
      --school-accent: #c4a035;
      --school-accent-soft: #faf6eb;
      --shadow-md: 0 8px 24px rgba(15, 36, 64, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --content-max: 980px;
      --content-pad: 20px;
      --text-sm: 0.8125rem;
      --text-lg: 1.125rem;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --focus-ring: 0 0 0 3px rgba(61, 107, 158, 0.14);
      --theme-bg-page: #eef2f7;
      --theme-bg-panel: #fff;
      --theme-bg-muted: #f8fafc;
      --theme-text: #1a2332;
      --theme-text-muted: #64748b;
      --theme-border: #d4dce8;
      --theme-border-light: #e8edf4;
      --theme-heading-strong: var(--school-navy-dark);
      --theme-heading: var(--school-navy);
      --theme-heading-accent: var(--school-navy-light);
      --theme-hover-bg: #eef4fb;
      --theme-hover-surface: #f1f5f9;
      --theme-logo-bg: #ffffff;
      --theme-toggle-bg: rgba(255, 255, 255, 0.92);
      --theme-toggle-border: rgba(30, 58, 95, 0.28);
      --theme-toggle-icon: var(--school-navy);
      --theme-btn-top: #4a7ab0;
      --theme-btn-bottom: var(--school-navy);
      --site-footer-h: 32px;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-bg-page: #0c1220;
      --theme-bg-panel: #1a2435;
      --theme-bg-muted: #2a3649;
      --theme-text: #f1f5f9;
      --theme-text-muted: #cbd5e1;
      --theme-border: #5a6d85;
      --theme-border-light: #3d4f66;
      --theme-heading-strong: #f8fafc;
      --theme-heading: #e8f0fc;
      --theme-heading-accent: #a8c9f0;
      --theme-hover-bg: #33465c;
      --theme-hover-surface: #2f3d52;
      --theme-logo-bg: #243044;
      --theme-toggle-bg: #2a3649;
      --theme-toggle-border: #7b8da8;
      --theme-toggle-icon: #f8fafc;
      --theme-btn-top: #5b8fc9;
      --theme-btn-bottom: #2d5580;
      --school-accent-soft: rgba(212, 176, 72, 0.22);
      --focus-ring: 0 0 0 3px rgba(126, 179, 232, 0.45);
    }
    body {
      margin: 0;
      padding: 0 0 var(--site-footer-h);
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--theme-text);
      background: var(--theme-bg-page);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-header {
      max-width: var(--content-max);
      margin: var(--space-5) auto 0;
      padding: 0 var(--content-pad);
      width: 100%;
    }
    .site-header-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5) 28px;
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .site-header-inner::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--school-navy-dark) 0%, var(--school-navy-light) 55%, var(--school-accent) 100%);
    }
    .school-logo-link {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      display: block;
      line-height: 0;
      border-radius: 50%;
      text-decoration: none;
      transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .school-logo-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(15, 36, 64, 0.06);
    }
    .school-logo {
      position: relative;
      z-index: 1;
      width: 94px;
      height: 94px;
      border-radius: 50%;
      object-fit: contain;
      background: var(--theme-logo-bg);
      flex-shrink: 0;
      border: 1px solid var(--theme-border-light);
      box-shadow: 0 1px 2px rgba(15, 36, 64, 0.04);
    }
    .site-header-text {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
      min-height: 94px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 4pt;
    }
    .header-brand-block {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
    }
    .header-meta-row {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px 12px;
    }
    .header-school {
      margin: 0;
      padding: 0;
      font-size: clamp(1.02rem, 1.75vw, 1.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--theme-heading-strong);
      white-space: nowrap;
    }
    .site-header-text h1 {
      margin: 0;
      padding: 0;
      width: 100%;
      box-sizing: border-box;
      font-size: clamp(1.38rem, 2.55vw, 1.75rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1.15;
      color: var(--theme-heading-strong);
      white-space: nowrap;
    }
    .site-header-text h1 .header-em { color: var(--theme-heading-accent); }
    .header-subline {
      margin: 0;
      padding: 0;
      line-height: 1;
    }
    .header-subtitle {
      display: inline-flex;
      align-items: center;
      margin: 0;
      padding: 4px 11px;
      font-size: calc(clamp(0.82rem, 1.25vw, 0.95rem) - 1pt);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--theme-heading);
      background: var(--school-accent-soft);
      border: 1px solid var(--theme-border-light);
      border-radius: 999px;
    }
    .theme-toggle {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--theme-toggle-border);
      border-radius: 50%;
      background: var(--theme-toggle-bg);
      color: var(--theme-toggle-icon);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .theme-toggle:hover {
      background: var(--theme-hover-bg);
      border-color: var(--school-navy-light);
      color: var(--theme-heading-strong);
      transform: translateY(-1px);
    }
    .theme-toggle svg { width: 20px; height: 20px; display: block; stroke: currentColor; }
    html[data-theme="dark"] .theme-toggle .theme-icon-moon,
    html:not([data-theme="dark"]) .theme-toggle .theme-icon-sun { display: none; }
    .app-layout {
      flex: 1;
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: var(--space-5) var(--content-pad) var(--space-6);
    }
    .search-container {
      background: var(--theme-bg-panel);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .panel-section { padding: var(--space-6) 28px; }
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: calc(var(--text-lg) + 3pt);
      font-weight: 700;
      line-height: 1.35;
      color: var(--theme-heading);
      margin-bottom: var(--space-4);
    }
    .section-label::before {
      content: "";
      flex-shrink: 0;
      align-self: center;
      width: 3px;
      height: 1em;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--school-accent) 0%, var(--school-navy-light) 100%);
    }
    .login-gate label {
      display: block;
      margin-top: 12px;
      font-size: var(--text-sm);
      font-weight: 600;
    }
    .login-gate label:first-of-type { margin-top: 0; }
    .login-gate input {
      width: 100%;
      margin-top: 6px;
      padding: 11px 12px;
      border: 1px solid var(--theme-border);
      border-radius: var(--radius-sm);
      background: var(--theme-bg-panel);
      color: var(--theme-text);
      font-family: inherit;
      font-size: 1rem;
    }
    .login-gate input:focus {
      outline: none;
      border-color: var(--school-navy-light);
      box-shadow: var(--focus-ring);
    }
    .login-gate {
      padding: var(--space-5);
      border-radius: var(--radius-md);
      background: var(--theme-bg-muted);
      border: 1px solid var(--theme-border-light);
    }
    .admin-actions { margin-top: var(--space-4); }
    .admin-btn-primary {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, var(--theme-btn-top) 0%, var(--theme-btn-bottom) 100%);
      color: #fff;
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .admin-btn-primary:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    html[data-theme="dark"] .admin-btn-primary:hover {
      filter: none;
      background: linear-gradient(180deg, #6ba3e0 0%, #3d6b9e 100%);
    }
    .login-hint {
      margin: 10px 0 0;
      font-size: var(--text-sm);
      color: var(--theme-text-muted);
    }
    .login-error {
      margin: 0 0 var(--space-4);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: #fef2f2;
      color: #b91c1c;
      font-size: var(--text-sm);
    }
    .login-error[hidden] { display: none !important; }
    .site-footer {
      margin-top: auto;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-bg-panel);
    }
    #siteFooterRoot {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 850;
    }
    .site-footer-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 3px var(--content-pad);
      font-size: 0.78rem;
      color: var(--theme-text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="school-logo-link" aria-label="설문 조회 홈">
        <img src="assets/namak-logo.png" alt="남악고등학교" class="school-logo" width="94" height="94">
      </a>
      <div class="site-header-text">
        <div class="header-brand-block">
          <div class="header-meta-row">
            <span class="header-subtitle">2026학년도</span>
            <p class="header-school">남악고등학교 1학년</p>
          </div>
          <h1><span class="header-em">설문조사 관리자 모드</span></h1>
        </div>
      </div>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="다크 모드" title="다크 모드">
        <svg class="theme-toggle-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg class="theme-toggle-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="app-layout">
    <div class="search-container">
      <section class="panel-section">
        <div class="section-label">관리자 로그인</div>
        <p id="loginError" class="login-error" hidden>아이디 또는 비밀번호가 올바르지 않습니다.</p>
        <form id="loginForm" class="login-gate">
          <label for="adminIdInput">아이디</label>
          <input type="text" id="adminIdInput" name="username" autocomplete="username" placeholder="아이디" required />
          <label for="adminPasswordInput">비밀번호</label>
          <input type="password" id="adminPasswordInput" name="password" autocomplete="current-password" placeholder="비밀번호" required />
          <div class="admin-actions">
            <button type="submit" class="admin-btn-primary">로그인</button>
          </div>
          <p class="login-hint">로그인 상태는 이 창을 닫거나 로그아웃할 때까지 유지됩니다. 1시간 동안 활동이 없으면 자동 로그아웃됩니다.</p>
        </form>
      </section>
    </div>
  </div>

  <footer class="site-footer" id="siteFooterRoot">
    <div class="site-footer-inner">Created by HyoT. Copyright © 2026 남악고등학교 HyoT. All rights reserved.</div>
  </footer>

  <script src="scripts/admin-session.js"></script>
  <script>
(function () {
  "use strict";

  var ADMIN_LOGIN_ID = "furss123";
  var ADMIN_LOGIN_PASSWORD = "rlagytjd1!";

  function coerceText(value) {
    if (value == null) return "";
    return String(value).trim();
  }

  if (AdminSession.isValid()) {
    AdminSession.touch();
    location.replace("admin.html");
    return;
  }

  (function initTheme() {
    var key = "school-theme-v1";
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
      localStorage.setItem(key, theme === "dark" ? "dark" : "light");
      var toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.setAttribute("aria-label", theme === "dark" ? "라이트 모드" : "다크 모드");
        toggle.title = theme === "dark" ? "라이트 모드" : "다크 모드";
      }
    }
    var saved = localStorage.getItem(key);
    if (saved === "dark" || saved === "light") applyTheme(saved);
    else applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.getElementById("themeToggle").addEventListener("click", function () {
      applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });
  })();

  function fitHeaderTitleToMetaRow() {
    var block = document.querySelector(".header-brand-block");
    if (!block) return;
    var meta = block.querySelector(".header-meta-row");
    var h1 = block.querySelector("h1");
    if (!meta || !h1) return;
    var target = meta.getBoundingClientRect().width;
    if (target < 8) return;
    h1.style.fontSize = "";
    h1.style.letterSpacing = "";
    var rootPx = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
    var px = rootPx * 1.75;
    h1.style.fontSize = px + "px";
    var step = 0;
    while (h1.getBoundingClientRect().width > target + 1 && px > rootPx * 0.9 && step < 80) {
      px -= 0.5;
      h1.style.fontSize = px + "px";
      step++;
    }
    var spacing = 0;
    step = 0;
    while (h1.getBoundingClientRect().width < target - 1 && spacing < 0.24 && step < 100) {
      spacing += 0.008;
      h1.style.letterSpacing = spacing + "em";
      step++;
    }
  }
  function scheduleHeaderTitleFit() {
    requestAnimationFrame(function () {
      requestAnimationFrame(fitHeaderTitleToMetaRow);
    });
  }
  scheduleHeaderTitleFit();
  window.addEventListener("resize", scheduleHeaderTitleFit);
  window.addEventListener("load", scheduleHeaderTitleFit);

  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var errEl = document.getElementById("loginError");
    var id = coerceText(document.getElementById("adminIdInput").value);
    var pw = document.getElementById("adminPasswordInput").value;
    if (id !== ADMIN_LOGIN_ID || pw !== ADMIN_LOGIN_PASSWORD) {
      if (errEl) errEl.hidden = false;
      return;
    }
    if (errEl) errEl.hidden = true;
    AdminSession.touch();
    location.href = "admin.html";
  });
})();
  </script>
</body>
</html>
